            <button onClick={() => onApprove(po)} style={{ background: '#16a34a', border: 'none', borderRadius: 6, padding: '7px 18px', fontSize: 13, fontWeight: 600, color: '#fff', cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif' }}>Approve & lock PO</button>
          </React.Fragment>}
        </div>
      </div>

      {/* PO meta grid */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 8, marginBottom: 16 }}>
        {[
        { l: 'Currency', k: 'currency', v: view.currency, kind: 'select', opts: ['USD', 'AUD', 'EUR', 'GBP', 'SGD', 'JPY', 'CNY'] },
        { l: 'Total value', k: 'value', v: `${view.currency} ${liveTotal.toLocaleString()}`, kind: 'computed' },
        { l: 'Incoterms', k: 'incoterm', v: view.incoterm, kind: 'select', opts: ['CIF', 'FOB', 'EXW', 'DAP', 'DDP', 'FCA', 'CPT', 'CIP'] },
        { l: 'Handover point', k: 'handover', v: view.handover, kind: 'text' },
        { l: 'Owner / Officer', k: 'owner', v: view.owner, kind: 'text' },
        { l: 'Vendor', k: 'vendor', v: view.vendor, kind: 'text' },
        { l: 'ROS date', k: 'ros', v: view.ros, kind: 'text' },
        { l: 'CDD', k: 'cdd', v: view.cdd, kind: 'text' }].
        map((m) =>
        <div key={m.l} style={{ background: '#fff', border: '1px solid #dde3ed', borderRadius: 8, padding: '10px 14px' }}>
            <div style={{ fontSize: 10, fontWeight: 600, color: '#94a3b8', letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 4 }}>{m.l}</div>
            {editing && m.kind !== 'computed' ?
            m.kind === 'select' ?
            <select value={draft[m.k] || ''} onChange={(e) => setHdr(m.k, e.target.value)} style={{ ...inpStyle, padding: '3px 6px', fontSize: 13, fontWeight: 500 }}>{m.opts.map((o) => <option key={o} value={o}>{o}</option>)}</select> :
            <input value={draft[m.k] || ''} onChange={(e) => setHdr(m.k, e.target.value)} style={{ ...inpStyle, padding: '3px 6px', fontSize: 13, fontWeight: 500 }} /> :
            <div style={{ fontSize: 13, fontWeight: 500, color: '#0f172a' }}>{m.v}</div>}
          </div>
        )}
      </div>

      {/* Lock notice */}
      {isLocked &&
      <div style={{ background: 'rgba(22,163,74,0.06)', border: '1px solid rgba(22,163,74,0.2)', borderRadius: 8, padding: '10px 14px', marginBottom: 14, fontSize: 13, color: '#16a34a' }}>
          This PO is approved and locked. No further amendments can be made. It has been passed to Expediting.
        </div>
      }
      {!isLocked && !editing &&
      <div style={{ background: 'rgba(217,119,6,0.06)', border: '1px solid rgba(217,119,6,0.2)', borderRadius: 8, padding: '10px 14px', marginBottom: 14, fontSize: 13, color: '#d97706' }}>
          This PO is pending approval. Click <strong>✎ Edit</strong> to amend header or line items, or <strong>Approve & lock</strong> when ready.
        </div>
      }
      {editing &&
      <div style={{ background: 'rgba(37,99,235,0.06)', border: '1px solid rgba(37,99,235,0.2)', borderRadius: 8, padding: '10px 14px', marginBottom: 14, fontSize: 13, color: '#2563eb' }}>
          ✎ Editing — totals will recalculate from line items on save.
        </div>
      }

      {/* Line items */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: '#94a3b8', letterSpacing: '0.06em', textTransform: 'uppercase' }}>Line items</div>
        {editing && <button onClick={addLine} style={{ background: '#fff', border: '1px solid #c4cedf', borderRadius: 5, padding: '4px 10px', fontSize: 11, color: '#2563eb', cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif', fontWeight: 500 }}>+ Add line</button>}
      </div>
      <div style={{ background: '#fff', border: '1px solid #dde3ed', borderRadius: 10, overflow: 'hidden' }}>
        <div style={{ display: 'grid', gridTemplateColumns: editing ? '50px 1fr 70px 70px 100px 70px 80px 100px 90px 28px' : '60px 1fr 80px 100px 110px 50px 70px 100px 100px', gap: 0, padding: '7px 14px', background: '#f4f7fb', borderBottom: '1px solid #dde3ed' }}>
          {['Line', 'Description', 'Qty', 'UOM', 'Unit value', 'WBS', 'ROS', 'Total value', 'CDD', ...(editing ? [''] : [])].map((h, idx) =>
          <div key={idx} style={{ fontSize: 10, fontWeight: 600, color: '#94a3b8', letterSpacing: '0.06em', textTransform: 'uppercase', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{h}</div>
          )}
        </div>
        {view.lines.map((l, i) => {
          const lineTotal = editing ? Number(l.uomQty || 0) * Number(l.unitValue || 0) : l.totalValue;
          return (
            <div data-tblrow="1" key={l.no + '_' + i} style={{ display: 'grid', gridTemplateColumns: editing ? '50px 1fr 70px 70px 100px 70px 80px 100px 90px 28px' : '60px 1fr 80px 100px 110px 50px 70px 100px 100px', gap: 8, padding: '8px 14px', borderBottom: i < view.lines.length - 1 ? '1px solid #e8ecf2' : 'none', alignItems: 'center', transition: 'background 120ms', textAlign: 'left' }}
            onMouseEnter={(e) => !editing && (e.currentTarget.style.background = '#f8fafc')} onMouseLeave={(e) => !editing && (e.currentTarget.style.background = 'transparent')}>
              <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 12, color: '#94a3b8' }}>{l.no}</div>
              {editing ?
              <input value={l.desc} onChange={(e) => setLine(i, 'desc', e.target.value)} style={{ ...inpStyle, padding: '4px 8px' }} /> :
              <TruncatedCell text={l.desc} style={{ fontSize: 13, color: '#0f172a', paddingRight: 10 }} />}
              {editing ?
              <input type="number" value={l.uomQty} onChange={(e) => setLine(i, 'uomQty', e.target.value)} style={{ ...inpMono, padding: '4px 6px', textAlign: 'right' }} /> :
              <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 12, color: '#0f172a', paddingRight: 8 }}>{l.uomQty.toLocaleString()}</div>}
              {editing ?
              <select value={l.uom} onChange={(e) => setLine(i, 'uom', e.target.value)} style={{ ...inpMono, padding: '4px 4px' }}>{['EA', 'M', 'M2', 'M3', 'KG', 'T', 'LT', 'SET', 'LOT'].map((u) => <option key={u} value={u}>{u}</option>)}</select> :
              <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 12, color: '#475569' }}>{l.uom}</div>}
              {editing ?
              <input type="number" value={l.unitValue} onChange={(e) => setLine(i, 'unitValue', e.target.value)} style={{ ...inpMono, padding: '4px 6px', textAlign: 'right' }} /> :
              <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 12, color: '#475569' }}>{fmtVal(l.unitValue, view.currency)}</div>}
              {editing ?
              <input value={l.wbs} onChange={(e) => setLine(i, 'wbs', e.target.value)} style={{ ...inpMono, padding: '4px 6px', fontSize: 11 }} /> :
              <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 11, color: '#94a3b8' }}>{l.wbs}</div>}
              {editing ?
              <input value={l.ros} onChange={(e) => setLine(i, 'ros', e.target.value)} style={{ ...inpMono, padding: '4px 6px', fontSize: 11 }} /> :
              <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 11, color: '#475569' }}>{l.ros}</div>}
              <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 13, fontWeight: 600, color: '#0f172a' }}>{fmtVal(lineTotal, view.currency)}</div>
              {editing ?
              <input value={l.cdd || ''} onChange={(e) => setLine(i, 'cdd', e.target.value)} placeholder="As PO" style={{ ...inpMono, padding: '4px 6px', fontSize: 11 }} /> :
              <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 11, color: l.cdd ? '#d97706' : '#94a3b8' }}>{l.cdd || 'As PO'}</div>}
              {editing &&
              <button onClick={() => delLine(i)} title="Delete line" style={{ background: 'transparent', border: 'none', color: '#ef4444', cursor: 'pointer', fontSize: 16, padding: 0, fontFamily: 'IBM Plex Sans,sans-serif' }}>×</button>}
            </div>);
        })}
        {/* Totals row */}
        <div style={{ display: 'grid', gridTemplateColumns: editing ? '50px 1fr 70px 70px 100px 70px 80px 100px 90px 28px' : '60px 1fr 80px 100px 110px 50px 70px 100px 100px', gap: 8, padding: '10px 14px', background: '#f4f7fb', borderTop: '2px solid #dde3ed' }}>
          <div></div>
          <div style={{ fontSize: 12, fontWeight: 700, color: '#0f172a' }}>Total</div>
          <div></div><div></div><div></div><div></div><div></div>
          <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 13, fontWeight: 700, color: '#0f172a' }}>{view.currency} {liveTotal.toLocaleString()}</div>
          <div></div>
          {editing && <div></div>}
        </div>
      </div>
    </div>);

};

// ── New PO Modal — entry choice ──
const NewPOEntryModal = ({ onClose, onUpload, onManual }) => (
  <div style={{ position:'fixed', inset:0, background:'rgba(15,23,42,0.5)', zIndex:9999, display:'flex', alignItems:'center', justifyContent:'center', padding:20 }} onClick={onClose}>
    <div style={{ background:'#fff', borderRadius:10, width:560, maxWidth:'100%', boxShadow:'0 12px 40px rgba(15,23,42,0.25)' }} onClick={e=>e.stopPropagation()}>
      <div style={{ padding:'18px 22px', borderBottom:'1px solid #e8ecf2', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <h3 style={{ margin:0, fontSize:16, fontWeight:600, color:'#0f172a' }}>Create new Purchase Order</h3>
          <p style={{ margin:'3px 0 0', fontSize:12, color:'#94a3b8' }}>Choose how to bring this PO into QMAT</p>
        </div>
        <button onClick={onClose} style={{ background:'transparent', border:'none', fontSize:18, color:'#94a3b8', cursor:'pointer' }}>×</button>
      </div>
      <div style={{ padding:22, display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
        <button onClick={onUpload} style={{ background:'#fff', border:'2px solid #2563eb', borderRadius:8, padding:'22px 18px', textAlign:'left', cursor:'pointer', display:'flex', flexDirection:'column', gap:8, fontFamily:'IBM Plex Sans,sans-serif' }}>
          <div style={{ width:36, height:36, borderRadius:8, background:'rgba(37,99,235,0.1)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>📥</div>
          <div style={{ fontSize:14, fontWeight:600, color:'#0f172a' }}>Upload PO document</div>
          <div style={{ fontSize:11, color:'#64748b', lineHeight:1.5 }}>Drop a signed PO PDF, Excel or vendor confirmation. QMAT will auto-extract header, line items and milestones.</div>
          <div style={{ marginTop:'auto', fontSize:11, color:'#2563eb', fontWeight:500, paddingTop:8 }}>Recommended →</div>
        </button>
        <button onClick={onManual} style={{ background:'#fff', border:'1px solid #c4cedf', borderRadius:8, padding:'22px 18px', textAlign:'left', cursor:'pointer', display:'flex', flexDirection:'column', gap:8, fontFamily:'IBM Plex Sans,sans-serif' }}>
          <div style={{ width:36, height:36, borderRadius:8, background:'#f4f7fb', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>✎</div>
          <div style={{ fontSize:14, fontWeight:600, color:'#0f172a' }}>Create manually</div>
          <div style={{ fontSize:11, color:'#64748b', lineHeight:1.5 }}>Enter PO header, line items and milestones by hand. Use this when no source document is available yet.</div>
          <div style={{ marginTop:'auto', fontSize:11, color:'#475569', paddingTop:8 }}>Blank form →</div>
        </button>
      </div>
    </div>
  </div>
);

// ── New PO — Manual creation form ──
const NewPOManualForm = ({ onClose, onSave }) => {
  const [step, setStep] = React.useState(1);
  const [hdr, setHdr] = React.useState({ ref:'', poName:'', desc:'', currency:'USD', value:'', incoterm:'CIF', wbs:'', ros:'', vendor:'', owner:'', group:'' });
  const [lines, setLines] = React.useState([{ id:1, desc:'', qty:'', uom:'EA', unitPrice:'' }]);
  const [milestones, setMilestones] = React.useState([
    { key:'po',  label:'PO',  date:'', done:false },
    { key:'fat', label:'FAT', date:'', done:false },
    { key:'esd', label:'ESD', date:'', done:false },
    { key:'eta', label:'ETA', date:'', done:false },
    { key:'ros', label:'ROS', date:'', done:false }
  ]);

  const addLine = () => setLines([...lines, { id:Date.now(), desc:'', qty:'', uom:'EA', unitPrice:'' }]);
  const updLine = (id, key, v) => setLines(lines.map(l => l.id===id ? { ...l, [key]:v } : l));
  const delLine = (id) => setLines(lines.filter(l => l.id!==id));

  const subtotal = lines.reduce((s,l) => s + (parseFloat(l.qty||0) * parseFloat(l.unitPrice||0)), 0);

  const FieldLabel = ({ children, req }) => <label style={{ fontSize:11, fontWeight:500, color:'#475569', marginBottom:4, display:'block' }}>{children}{req && <span style={{ color:'#ef4444', marginLeft:2 }}>*</span>}</label>;
  const FieldInput = ({ value, onChange, placeholder, type='text' }) => <input value={value} onChange={onChange} placeholder={placeholder} type={type} style={{ width:'100%', padding:'7px 10px', fontSize:13, border:'1px solid #c4cedf', borderRadius:5, background:'#fff', fontFamily:'IBM Plex Sans,sans-serif', color:'#0f172a', outline:'none' }} />;
  const FieldSelect = ({ value, onChange, options }) => <select value={value} onChange={onChange} style={{ width:'100%', padding:'7px 10px', fontSize:13, border:'1px solid #c4cedf', borderRadius:5, background:'#fff', fontFamily:'IBM Plex Sans,sans-serif', color:'#0f172a', outline:'none' }}>{options.map(o => <option key={o} value={o}>{o}</option>)}</select>;

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(15,23,42,0.5)', zIndex:9999, display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
      <div style={{ background:'#fff', borderRadius:10, width:880, maxWidth:'100%', maxHeight:'92vh', display:'flex', flexDirection:'column', boxShadow:'0 12px 40px rgba(15,23,42,0.25)' }}>
        {/* Header */}
        <div style={{ padding:'16px 22px', borderBottom:'1px solid #e8ecf2', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div>
            <h3 style={{ margin:0, fontSize:16, fontWeight:600, color:'#0f172a' }}>New Purchase Order — manual entry</h3>
            <p style={{ margin:'3px 0 0', fontSize:12, color:'#94a3b8' }}>Step {step} of 3 · {step===1?'Header':step===2?'Line items':'Milestones & review'}</p>
          </div>
          <button onClick={onClose} style={{ background:'transparent', border:'none', fontSize:18, color:'#94a3b8', cursor:'pointer' }}>×</button>
        </div>

        {/* Stepper */}
        <div style={{ padding:'10px 22px', borderBottom:'1px solid #e8ecf2', background:'#f8fafd', display:'flex', gap:6 }}>
          {['Header','Line items','Milestones'].map((label, i) => {
            const n = i+1;
            const active = step === n;
            const done = step > n;
            return <div key={n} style={{ flex:1, display:'flex', alignItems:'center', gap:6, padding:'4px 8px', borderRadius:5, background:active?'rgba(37,99,235,0.1)':'transparent' }}>
              <div style={{ width:18, height:18, borderRadius:'50%', background:done?'#16a34a':active?'#2563eb':'#c4cedf', color:'#fff', fontSize:10, fontWeight:600, display:'flex', alignItems:'center', justifyContent:'center' }}>{done?'✓':n}</div>
              <span style={{ fontSize:12, color:active?'#2563eb':done?'#16a34a':'#94a3b8', fontWeight:active?600:400 }}>{label}</span>
            </div>;
          })}
        </div>

        {/* Body */}
        <div style={{ padding:22, overflowY:'auto', flex:1 }}>
          {step === 1 && (
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
              <div><FieldLabel req>PO Reference</FieldLabel><FieldInput value={hdr.ref} onChange={e=>setHdr({...hdr,ref:e.target.value})} placeholder="PO-2024-XXXX" /></div>
              <div><FieldLabel req>WBS</FieldLabel><FieldSelect value={hdr.wbs} onChange={e=>setHdr({...hdr,wbs:e.target.value})} options={['Select WBS...','01.02.01','02.01.01','02.02.01','02.02.02','03.01.01','03.01.02','03.02.01','03.02.04','04.01.01']} /></div>
              <div style={{ gridColumn:'span 2' }}><FieldLabel req>PO Name</FieldLabel><FieldInput value={hdr.poName} onChange={e=>setHdr({...hdr,poName:e.target.value})} placeholder="e.g. Inlet Separator Package" /></div>
              <div style={{ gridColumn:'span 2' }}><FieldLabel>Description</FieldLabel><textarea value={hdr.desc} onChange={e=>setHdr({...hdr,desc:e.target.value})} placeholder="Scope summary..." style={{ width:'100%', minHeight:60, padding:'7px 10px', fontSize:13, border:'1px solid #c4cedf', borderRadius:5, background:'#fff', fontFamily:'IBM Plex Sans,sans-serif', color:'#0f172a', outline:'none', resize:'vertical' }} /></div>
              <div><FieldLabel req>Vendor</FieldLabel><FieldInput value={hdr.vendor} onChange={e=>setHdr({...hdr,vendor:e.target.value})} placeholder="Supplier name" /></div>
              <div><FieldLabel>Group / Category</FieldLabel><FieldSelect value={hdr.group} onChange={e=>setHdr({...hdr,group:e.target.value})} options={['Select...','Mech','Electrical','Instrumentation','Civil','Piping','Structural']} /></div>
              <div><FieldLabel req>Currency</FieldLabel><FieldSelect value={hdr.currency} onChange={e=>setHdr({...hdr,currency:e.target.value})} options={['USD','AUD','EUR','GBP','SGD','JPY','CNY']} /></div>
              <div><FieldLabel>PO Value</FieldLabel><FieldInput value={hdr.value} onChange={e=>setHdr({...hdr,value:e.target.value})} placeholder="0" type="number" /></div>
              <div><FieldLabel req>Incoterms</FieldLabel><FieldSelect value={hdr.incoterm} onChange={e=>setHdr({...hdr,incoterm:e.target.value})} options={['CIF','FOB','EXW','DAP','DDP','FCA','CPT','CIP']} /></div>
              <div><FieldLabel req>Required on Site (ROS)</FieldLabel><FieldInput value={hdr.ros} onChange={e=>setHdr({...hdr,ros:e.target.value})} placeholder="DD MMM YYYY" type="date" /></div>
              <div style={{ gridColumn:'span 2' }}><FieldLabel>Owner / Expeditor</FieldLabel><FieldSelect value={hdr.owner} onChange={e=>setHdr({...hdr,owner:e.target.value})} options={['Assign owner...','J. Hartley','S. Patel','R. Chen','P. Nguyen','K. Morrison','T. Walsh']} /></div>
            </div>
          )}

          {step === 2 && (
            <div>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
                <div style={{ fontSize:12, color:'#475569' }}><strong>{lines.length}</strong> line item{lines.length!==1?'s':''} · Subtotal: <span style={{ fontFamily:'JetBrains Mono,monospace', color:'#0f172a' }}>{hdr.currency} {subtotal.toLocaleString()}</span></div>
                <button onClick={addLine} style={{ background:'#2563eb', color:'#fff', border:'none', padding:'5px 12px', fontSize:12, borderRadius:5, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>+ Add line</button>
              </div>
              <div style={{ border:'1px solid #e8ecf2', borderRadius:6, overflow:'hidden' }}>
                <div style={{ display:'grid', gridTemplateColumns:'40px 1fr 80px 70px 110px 110px 32px', gap:8, padding:'8px 12px', background:'#f4f7fb', fontSize:10, fontWeight:600, color:'#94a3b8', letterSpacing:'0.05em', textTransform:'uppercase', borderBottom:'1px solid #e8ecf2' }}>
                  <div>#</div><div>Description</div><div>Qty</div><div>UoM</div><div>Unit price</div><div>Total</div><div></div>
                </div>
                {lines.map((l, i) => (
                  <div key={l.id} style={{ display:'grid', gridTemplateColumns:'40px 1fr 80px 70px 110px 110px 32px', gap:8, padding:'8px 12px', borderBottom: i===lines.length-1?'none':'1px solid #f0f3f7', alignItems:'center' }}>
                    <div style={{ fontSize:11, color:'#94a3b8', fontFamily:'JetBrains Mono,monospace' }}>{String(i+1).padStart(2,'0')}</div>
                    <input value={l.desc} onChange={e=>updLine(l.id,'desc',e.target.value)} placeholder="Item description" style={{ width:'100%', padding:'5px 8px', fontSize:12, border:'1px solid #dde3ed', borderRadius:4, fontFamily:'IBM Plex Sans,sans-serif', outline:'none' }} />
                    <input value={l.qty} onChange={e=>updLine(l.id,'qty',e.target.value)} placeholder="0" type="number" style={{ width:'100%', padding:'5px 8px', fontSize:12, border:'1px solid #dde3ed', borderRadius:4, fontFamily:'JetBrains Mono,monospace', outline:'none', textAlign:'right' }} />
                    <select value={l.uom} onChange={e=>updLine(l.id,'uom',e.target.value)} style={{ width:'100%', padding:'5px 6px', fontSize:11, border:'1px solid #dde3ed', borderRadius:4, fontFamily:'IBM Plex Sans,sans-serif', outline:'none' }}>{['EA','M','M2','M3','KG','T','LT','SET','LOT'].map(u => <option key={u}>{u}</option>)}</select>
                    <input value={l.unitPrice} onChange={e=>updLine(l.id,'unitPrice',e.target.value)} placeholder="0.00" type="number" style={{ width:'100%', padding:'5px 8px', fontSize:12, border:'1px solid #dde3ed', borderRadius:4, fontFamily:'JetBrains Mono,monospace', outline:'none', textAlign:'right' }} />
                    <div style={{ fontSize:12, color:'#0f172a', fontFamily:'JetBrains Mono,monospace', textAlign:'right' }}>{((parseFloat(l.qty||0))*(parseFloat(l.unitPrice||0))).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
                    <button onClick={()=>delLine(l.id)} disabled={lines.length<=1} style={{ background:'transparent', border:'none', color:lines.length<=1?'#c4cedf':'#ef4444', cursor:lines.length<=1?'not-allowed':'pointer', fontSize:14 }}>×</button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {step === 3 && (
            <div>
              <div style={{ fontSize:12, color:'#475569', marginBottom:10 }}>Set milestone target dates. Leave blank if not yet known.</div>
              <div style={{ border:'1px solid #e8ecf2', borderRadius:6, overflow:'hidden', marginBottom:18 }}>
                {milestones.map((m, i) => (
                  <div key={m.key} style={{ display:'grid', gridTemplateColumns:'80px 1fr 200px', gap:12, padding:'10px 14px', borderBottom: i===milestones.length-1?'none':'1px solid #f0f3f7', alignItems:'center', background: i%2===0?'#fff':'#f8fafd' }}>
                    <div style={{ fontSize:11, fontWeight:600, color:'#94a3b8', letterSpacing:'0.05em', textTransform:'uppercase' }}>{m.label}</div>
                    <div style={{ fontSize:12, color:'#475569' }}>{({po:'Purchase order placed',fat:'Factory acceptance test',esd:'Estimated ship date',eta:'Estimated arrival',ros:'Required on site'})[m.key]}</div>
                    <input type="date" value={m.date} onChange={e=>setMilestones(milestones.map(x => x.key===m.key ? {...x,date:e.target.value} : x))} style={{ width:'100%', padding:'5px 8px', fontSize:12, border:'1px solid #c4cedf', borderRadius:4, fontFamily:'IBM Plex Sans,sans-serif', outline:'none' }} />
                  </div>
                ))}
              </div>
              <div style={{ background:'#f8fafd', border:'1px solid #e8ecf2', borderRadius:6, padding:14 }}>
                <div style={{ fontSize:11, fontWeight:600, color:'#94a3b8', letterSpacing:'0.05em', textTransform:'uppercase', marginBottom:8 }}>Review summary</div>

const ProcurementScreen = () => {
  const critical = window.useQmatCritical();
  const [selectedPO, setSelectedPO] = React.useState(null);
  const [showNewPO, setShowNewPO] = React.useState(false);
  const [criticalOnly, setCriticalOnly] = React.useState(false);
  const [newPOMode, setNewPOMode] = React.useState(null); // 'upload' | 'manual'
  const [view, setView] = React.useState('all');
  const [search, setSearch] = React.useState('');
  const [groupBy, setGroupBy] = React.useState('none');
  const [sortField, setSortField] = React.useState('ref');
  const [sortDir, setSortDir] = React.useState('asc');
  const [pos, setPos] = React.useState(MOCK_PO_REGISTER);
  const [confirmApprove, setConfirmApprove] = React.useState(null);

  const toggleSort = (f) => {if (sortField === f) setSortDir((d) => d === 'asc' ? 'desc' : 'asc');else {setSortField(f);setSortDir('asc');}};
  const SortIcon = ({ field }) => sortField !== field ? <span style={{ color: '#c4cedf', marginLeft: 2, fontSize: 9 }}>↕</span> : <span style={{ color: '#2563eb', marginLeft: 2, fontSize: 9 }}>{sortDir === 'asc' ? '↑' : '↓'}</span>;

  const handleApprove = (po) => setConfirmApprove(po);
  const confirmApproveAction = () => {
    setPos((ps) => ps.map((p) => p.id === confirmApprove.id ? { ...p, approved: true } : p));
    if (selectedPO?.id === confirmApprove.id) setSelectedPO((p) => ({ ...p, approved: true }));
    // Do NOT close the modal here — the wizard advances to its own success step
  };

  const toggleCritical = (po) => {
    window.__qmatToggleCritical(po.ref);
  };

  const filtered = pos.filter((p) => {
    if (view === 'approved' && !p.approved) return false;
    if (view === 'not-approved' && p.approved) return false;
    if (view === 'completed' && !p.completed) return false;
    if (criticalOnly && !critical.isCritical(p.ref)) return false;
    if (search) {
      const q = search.toLowerCase();
      return p.ref.toLowerCase().includes(q) || p.poName.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q) || p.vendor.toLowerCase().includes(q) || p.wbs.includes(q) || p.owner.toLowerCase().includes(q);
    }
    return true;
  }).sort((a, b) => {
    const v = (x) => (x[sortField] || '').toString().toLowerCase();
    return sortDir === 'asc' ? v(a).localeCompare(v(b)) : v(b).localeCompare(v(a));
  });

  const grouped = React.useMemo(() => {
    if (groupBy === 'none') return { 'All POs': filtered };
    if (groupBy === 'critical') {
      const m = { '⭐ Critical path': [], 'Non-critical': [] };
      filtered.forEach((p) => { (critical.isCritical(p.ref) ? m['⭐ Critical path'] : m['Non-critical']).push(p); });
      if (m['⭐ Critical path'].length === 0) delete m['⭐ Critical path'];
      if (m['Non-critical'].length === 0) delete m['Non-critical'];
      return m;
    }
    const key = groupBy === 'vendor' ? 'vendor' : groupBy === 'wbs' ? 'wbs' : 'desc';
    const m = {};
    filtered.forEach((p) => {const k = groupBy === 'wbs' ? p.wbs.split('.').slice(0, 2).join('.') : p[key];if (!m[k]) m[k] = [];m[k].push(p);});
    return m;
  }, [filtered, groupBy]);

  const totalValue = pos.reduce((s, p) => s + p.value, 0);
  const approvedValue = pos.filter((p) => p.approved).reduce((s, p) => s + p.value, 0);
  const counts = { all: pos.length, approved: pos.filter((p) => p.approved && !p.completed).length, notApproved: pos.filter((p) => !p.approved).length, completed: pos.filter((p) => p.completed).length };

  const selStyle = { background: '#fff', border: '1px solid #c4cedf', borderRadius: 6, padding: '5px 10px', fontSize: 12, color: '#0f172a', fontFamily: 'IBM Plex Sans,sans-serif', outline: 'none', height: 32, cursor: 'pointer' };
  const GBtn = ({ id, label }) =>
  <button onClick={() => setGroupBy(id)} style={{ padding: '5px 12px', fontSize: 12, borderRadius: 6, height: 32, border: groupBy === id ? '1px solid #2563eb' : '1px solid #c4cedf', background: groupBy === id ? 'rgba(37,99,235,0.08)' : '#fff', color: groupBy === id ? '#2563eb' : '#475569', cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif', fontWeight: groupBy === id ? 600 : 400 }}>{label}</button>;


  if (selectedPO) {
    return (
      <>

  const TODAY = React.useMemo(() => new Date(2025, 3, 29), []);

    return Math.round((d - TODAY) / 86400000);

                {r.label}

          </div>

            <div>

            <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 11, color: '#475569' }}>
              {f.requiredDate}

{ id: 't2', ref: 'TRF-2025-0087', itemCode: 'SS-001', desc: 'Stainless steel pipe 316L · 2"', qty: 50, wbs: '03.02.04', from: 'WH-B · B-01-02', to: 'WH-A · A-04-05', requestedBy: 'M. Singh', company: 'PipeCo Ltd', estPickup: '29 Apr 2025', status: 'pending-pickup', rag: 'grey' },

{ id: 'requested', label: 'Requested', color: '#94a3b8' },

// ── New Transfer Modal ──
const NewTransferModal = ({ onClose, onSave }) => {
  const [step, setStep] = React.useState(1);
  const [whFrom, setWhFrom] = React.useState('');
  const [itemCode, setItemCode] = React.useState('');
  const [gridLoc, setGridLoc] = React.useState('');
  const [qty, setQty] = React.useState('');
  const [whTo, setWhTo] = React.useState('');
  const [toLoc, setToLoc] = React.useState('');
  const [pickupDate, setPickupDate] = React.useState('');
  const [requiredDate, setRequiredDate] = React.useState('');
  const [requestor, setRequestor] = React.useState('');
  const [reason, setReason] = React.useState('');
  const [itemQuery, setItemQuery] = React.useState('');

  const fromStocks = MOCK_STOCK.filter(s => s.warehouse === whFrom);
  const matCodes = [...new Set(fromStocks.map(s => s.itemCode))];
  const matchingItems = matCodes.filter(c => {
    if (!itemQuery) return true;
    const q = itemQuery.toLowerCase();
    const desc = fromStocks.find(s => s.itemCode === c)?.desc || '';
    return c.toLowerCase().includes(q) || desc.toLowerCase().includes(q);
  });
  const itemLocations = fromStocks.filter(s => s.itemCode === itemCode);
  const selectedLoc = itemLocations.find(l => l.location === gridLoc);
  const availableQty = selectedLoc?.qty || 0;
  const uom = selectedLoc?.uom || (itemLocations[0]?.uom) || 'EA';
  const desc = itemLocations[0]?.desc || '';

  React.useEffect(() => {
    if (itemLocations.length === 1 && !gridLoc) setGridLoc(itemLocations[0].location);
  }, [itemCode, itemLocations.length]);

  const FieldLabel = ({ children, req }) => <label style={{ fontSize:11, fontWeight:500, color:'#475569', marginBottom:4, display:'block' }}>{children}{req && <span style={{ color:'#ef4444', marginLeft:2 }}>*</span>}</label>;
  const inputCss = { width:'100%', padding:'7px 10px', fontSize:13, border:'1px solid #c4cedf', borderRadius:5, background:'#fff', fontFamily:'IBM Plex Sans,sans-serif', color:'#0f172a', outline:'none' };

  const validStep1 = whFrom && itemCode && gridLoc && qty && parseFloat(qty) > 0 && parseFloat(qty) <= availableQty;
  const validStep2 = whTo && whTo !== whFrom;
  const valid = validStep1 && validStep2;

  const handleCreate = () => {
    const ref = `TRF-2025-${String(Math.floor(Math.random()*900)+100)}`;
    const transfer = { ref, itemCode, desc, qty: parseFloat(qty), wbs: selectedLoc?.wbs || '—', from: `${whFrom.split(' · ')[0]} · ${gridLoc}`, to: toLoc ? `${whTo.split(' · ')[0]} · ${toLoc}` : whTo, requestedBy: requestor || 'You', estPickup: pickupDate || '—', requiredDate, reason, status: 'requested', rag: 'grey' };
    onSave && onSave(transfer);
    window.__qmatToast && window.__qmatToast(`✓ Transfer ${ref} created — pending receipt at ${whTo.split(' · ')[0]}`, 'success');
    onClose();
  };

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(15,23,42,0.5)', zIndex:9999, display:'flex', alignItems:'center', justifyContent:'center', padding:20 }} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{ background:'#fff', borderRadius:10, width:760, maxWidth:'100%', maxHeight:'92vh', display:'flex', flexDirection:'column', boxShadow:'0 12px 40px rgba(15,23,42,0.25)' }}>
        <div style={{ padding:'16px 22px', borderBottom:'1px solid #e8ecf2', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div>
            <h3 style={{ margin:0, fontSize:16, fontWeight:600, color:'#0f172a' }}>New warehouse transfer</h3>
            <p style={{ margin:'3px 0 0', fontSize:12, color:'#94a3b8' }}>Step {step} of 2 · {step===1?'Source & material':'Destination & schedule'}</p>
          </div>
          <button onClick={onClose} style={{ background:'transparent', border:'none', fontSize:18, color:'#94a3b8', cursor:'pointer' }}>×</button>
        </div>

        <div style={{ padding:'10px 22px', borderBottom:'1px solid #e8ecf2', background:'#f8fafd', display:'flex', gap:6 }}>
          {['Source & material','Destination & schedule'].map((label, i) => {
            const n = i+1; const active = step === n; const done = step > n;
            return <div key={n} style={{ flex:1, display:'flex', alignItems:'center', gap:6, padding:'4px 8px', borderRadius:5, background:active?'rgba(37,99,235,0.1)':'transparent' }}>
              <div style={{ width:18, height:18, borderRadius:'50%', background:done?'#16a34a':active?'#2563eb':'#c4cedf', color:'#fff', fontSize:10, fontWeight:600, display:'flex', alignItems:'center', justifyContent:'center' }}>{done?'✓':n}</div>
              <span style={{ fontSize:12, color:active?'#2563eb':done?'#16a34a':'#94a3b8', fontWeight:active?600:400 }}>{label}</span>
            </div>;
          })}
        </div>

        <div style={{ padding:22, overflowY:'auto', flex:1 }}>
          {step === 1 && <div style={{ display:'grid', gridTemplateColumns:'1fr', gap:14 }}>
            <div>
              <FieldLabel req>Transfer FROM warehouse</FieldLabel>
              <select value={whFrom} onChange={e=>{setWhFrom(e.target.value);setItemCode('');setGridLoc('');setQty('');}} style={inputCss}>
                <option value="">Select source warehouse...</option>
                {WAREHOUSES.slice(1).map(w => <option key={w} value={w}>{w}</option>)}
              </select>
            </div>

            {whFrom && <div>
              <FieldLabel req>Material / item</FieldLabel>
              <input value={itemQuery} onChange={e=>setItemQuery(e.target.value)} placeholder="Search by code or description..." style={{...inputCss, marginBottom:6}} />
              <div style={{ border:'1px solid #c4cedf', borderRadius:5, maxHeight:160, overflowY:'auto', background:'#fff' }}>
                {matchingItems.length === 0 && <div style={{ padding:'12px 14px', fontSize:12, color:'#94a3b8', textAlign:'center' }}>No items match in {whFrom.split(' · ')[0]}</div>}
                {matchingItems.map(c => {
                  const it = fromStocks.find(s => s.itemCode === c);
                  const locs = fromStocks.filter(s => s.itemCode === c).length;
                  const totQty = fromStocks.filter(s => s.itemCode === c).reduce((sum,s)=>sum+(s.qty||0),0);
                  return <div key={c} onClick={()=>{setItemCode(c);setGridLoc('');setQty('');}} style={{ padding:'8px 12px', borderBottom:'1px solid #f0f3f7', cursor:'pointer', background: itemCode===c?'rgba(37,99,235,0.06)':'transparent', display:'grid', gridTemplateColumns:'90px 1fr auto', gap:10, alignItems:'center' }}>
                    <span style={{ fontFamily:'JetBrains Mono,monospace', fontSize:11, color:'#2563eb', fontWeight:500 }}>{c}</span>
                    <span style={{ fontSize:12, color:'#0f172a', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{it?.desc}</span>
                    <span style={{ fontSize:11, color:'#94a3b8', fontFamily:'JetBrains Mono,monospace' }}>{totQty} {it?.uom} · {locs} loc{locs!==1?'s':''}</span>
                  </div>;
                })}
              </div>
            </div>}

            {itemCode && itemLocations.length > 1 && <div style={{ background:'#fffbeb', border:'1px solid #fde68a', borderRadius:6, padding:'10px 12px' }}>
              <div style={{ fontSize:11, fontWeight:600, color:'#92400e', marginBottom:6 }}>⚠ Multiple grid locations found — select one</div>
              <div style={{ display:'grid', gap:5 }}>
                {itemLocations.map(l => <label key={l.id} style={{ display:'grid', gridTemplateColumns:'18px 90px 1fr auto', gap:8, alignItems:'center', padding:'6px 8px', background:gridLoc===l.location?'rgba(37,99,235,0.08)':'#fff', border: gridLoc===l.location?'1px solid #2563eb':'1px solid #e8ecf2', borderRadius:4, cursor:'pointer' }}>
                  <input type="radio" name="grid" checked={gridLoc===l.location} onChange={()=>setGridLoc(l.location)} />
                  <span style={{ fontFamily:'JetBrains Mono,monospace', fontSize:11, color:'#0f172a', fontWeight:500 }}>{l.location}</span>
                  <span style={{ fontSize:11, color:'#475569' }}>WBS {l.wbs} · {l.po}</span>
                  <span style={{ fontFamily:'JetBrains Mono,monospace', fontSize:11, color:'#16a34a' }}>{l.qty} {l.uom} avail</span>
                </label>)}
              </div>
            </div>}

            {itemCode && gridLoc && <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
              <div>
                <FieldLabel req>Quantity to transfer</FieldLabel>
                <div style={{ display:'flex', gap:6, alignItems:'center' }}>
                  <input value={qty} onChange={e=>setQty(e.target.value)} type="number" min="0" max={availableQty} placeholder="0" style={{...inputCss, fontFamily:'JetBrains Mono,monospace'}} />
                  <span style={{ fontSize:12, color:'#475569', fontFamily:'JetBrains Mono,monospace' }}>{uom}</span>
                </div>
                <div style={{ fontSize:11, color: parseFloat(qty)>availableQty?'#ef4444':'#94a3b8', marginTop:4 }}>{parseFloat(qty)>availableQty ? `Exceeds available ${availableQty} ${uom}` : `Available: ${availableQty} ${uom} at ${gridLoc}`}</div>
              </div>
              <div>
                <FieldLabel>Reason / notes</FieldLabel>
                <input value={reason} onChange={e=>setReason(e.target.value)} placeholder="e.g. Site install — Area 3" style={inputCss} />
              </div>
            </div>}
          </div>}

          {step === 2 && <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
            <div style={{ gridColumn:'span 2', background:'#f8fafd', border:'1px solid #e8ecf2', borderRadius:6, padding:'10px 14px', display:'flex', gap:14, fontSize:12 }}>
              <div><span style={{ color:'#94a3b8' }}>From:</span> <strong style={{ color:'#0f172a' }}>{whFrom.split(' · ')[0]}</strong> · <span style={{ fontFamily:'JetBrains Mono,monospace', color:'#475569' }}>{gridLoc}</span></div>
              <div><span style={{ color:'#94a3b8' }}>Item:</span> <span style={{ fontFamily:'JetBrains Mono,monospace', color:'#2563eb' }}>{itemCode}</span></div>
              <div><span style={{ color:'#94a3b8' }}>Qty:</span> <strong style={{ color:'#0f172a', fontFamily:'JetBrains Mono,monospace' }}>{qty} {uom}</strong></div>
            </div>
            <div>
              <FieldLabel req>Transfer TO warehouse</FieldLabel>
              <select value={whTo} onChange={e=>setWhTo(e.target.value)} style={inputCss}>
                <option value="">Select destination...</option>
                {WAREHOUSES.slice(1).filter(w => w !== whFrom).map(w => <option key={w} value={w}>{w}</option>)}
                <option value="Site laydown · Area 1">Site laydown · Area 1</option>
                <option value="Site laydown · Area 3">Site laydown · Area 3</option>
                <option value="Site laydown · Area 4">Site laydown · Area 4</option>
              </select>
            </div>
            <div>
              <FieldLabel>Destination grid (if known)</FieldLabel>
              <input value={toLoc} onChange={e=>setToLoc(e.target.value.toUpperCase())} placeholder="e.g. A-04-05 (optional)" style={{...inputCss, fontFamily:'JetBrains Mono,monospace'}} />
            </div>
            <div>
              <FieldLabel>Estimated pickup date</FieldLabel>
              <input type="date" value={pickupDate} onChange={e=>setPickupDate(e.target.value)} style={inputCss} />
            </div>
            <div>
              <FieldLabel>Required at destination by</FieldLabel>
              <input type="date" value={requiredDate} onChange={e=>setRequiredDate(e.target.value)} style={inputCss} />
            </div>
            <div style={{ gridColumn:'span 2' }}>
              <FieldLabel>Requested by</FieldLabel>
              <input value={requestor} onChange={e=>setRequestor(e.target.value)} placeholder="Your name" style={inputCss} />
            </div>
            <div style={{ gridColumn:'span 2', background:'rgba(37,99,235,0.06)', border:'1px solid rgba(37,99,235,0.2)', borderRadius:6, padding:'10px 12px', display:'flex', gap:10, alignItems:'flex-start' }}>
              <span style={{ fontSize:14 }}>ℹ</span>
              <span style={{ fontSize:11, color:'#1e40af', lineHeight:1.5 }}>Once created, this transfer will appear in <strong>Receipting</strong> at {whTo? whTo.split(' · ')[0] : 'destination'}, awaiting receipt confirmation when material arrives.</span>
            </div>
          </div>}
        </div>

        <div style={{ padding:'14px 22px', borderTop:'1px solid #e8ecf2', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <button onClick={onClose} style={{ background:'transparent', border:'1px solid #c4cedf', color:'#475569', padding:'7px 14px', fontSize:12, borderRadius:5, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>Cancel</button>
          <div style={{ display:'flex', gap:8 }}>
            {step > 1 && <button onClick={()=>setStep(step-1)} style={{ background:'#fff', border:'1px solid #c4cedf', color:'#475569', padding:'7px 16px', fontSize:12, borderRadius:5, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>← Back</button>}
            {step === 1 && <button disabled={!validStep1} onClick={()=>setStep(2)} style={{ background:validStep1?'#2563eb':'#c4cedf', border:'none', color:'#fff', padding:'7px 18px', fontSize:12, fontWeight:500, borderRadius:5, cursor:validStep1?'pointer':'not-allowed', fontFamily:'IBM Plex Sans,sans-serif' }}>Next →</button>}
            {step === 2 && <button disabled={!valid} onClick={handleCreate} style={{ background:valid?'#16a34a':'#c4cedf', border:'none', color:'#fff', padding:'7px 18px', fontSize:12, fontWeight:500, borderRadius:5, cursor:valid?'pointer':'not-allowed', fontFamily:'IBM Plex Sans,sans-serif' }}>✓ Create transfer</button>}
          </div>
        </div>
      </div>
    </div>
  );
};

const MCTransferScreen = () => {
  const [view, setView] = React.useState('all');
  const [search, setSearch] = React.useState('');
  const [showNew, setShowNew] = React.useState(false);
  const [extraTransfers, setExtraTransfers] = React.useState([]);
  const [trSortField, setTrSortField] = React.useState('ref');
  const [trSortDir, setTrSortDir] = React.useState('desc');
  const trToggleSort = (f) => { if (trSortField === f) setTrSortDir(d => d==='asc'?'desc':'asc'); else { setTrSortField(f); setTrSortDir('asc'); } };
  const TrSortHdr = ({ label, field, align }) => <SortableHeader label={label} field={field} sortField={trSortField} sortDir={trSortDir} toggleSort={trToggleSort} align={align} />;
  const [selected, setSelected] = React.useState(null);

  const counts = { all: MOCK_TRANSFERS.length + extraTransfers.length };
  const allTransfers = [...extraTransfers, ...MOCK_TRANSFERS];
  TRANSFER_STAGES.forEach((s) => {counts[s.id] = allTransfers.filter((t) => t.status === s.id).length;});

  const filtered = allTransfers.filter((t) => {
    if (view !== 'all' && t.status !== view) return false;
    if (search) {const q = search.toLowerCase();return t.ref.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.wbs.includes(q) || t.requestedBy.toLowerCase().includes(q) || t.from.toLowerCase().includes(q) || t.to.toLowerCase().includes(q);}
    return true;
  });

  return (
    <div>
      {selected &&
      <div style={{ position: 'fixed', inset: 0, background: 'rgba(15,23,42,0.4)', zIndex: 200, display: 'flex', alignItems: 'center', justifyContent: 'center', backdropFilter: 'blur(4px)' }} onClick={() => setSelected(null)}>
          <div style={{ background: '#fff', borderRadius: 12, boxShadow: '0 20px 60px rgba(0,0,0,0.18)', width: 580, maxHeight: '85vh', overflow: 'auto' }} onClick={(e) => e.stopPropagation()}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 20px', borderBottom: '1px solid #e8ecf2' }}>
              <div style={{ fontSize: 15, fontWeight: 600, color: '#0f172a' }}>Transfer — {selected.ref}</div>
              <button onClick={() => setSelected(null)} style={{ background: 'none', border: 'none', fontSize: 18, color: '#94a3b8', cursor: 'pointer' }}>✕</button>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 0 }}>
              <div style={{ padding: '16px 20px', borderRight: '1px solid #e8ecf2' }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: '#94a3b8', letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 10 }}>Transfer details</div>
                {[['Ref', selected.ref], ['Item', selected.desc], ['Qty', selected.qty + ' EA'], ['WBS', selected.wbs], ['From', selected.from], ['To', selected.to], ['Requested by', selected.requestedBy + ' · ' + selected.company], ['Est. pickup', selected.estPickup]].map(([l, v]) =>
              <div key={l} style={{ marginBottom: 8 }}>
                    <div style={{ fontSize: 10, fontWeight: 600, color: '#94a3b8', textTransform: 'uppercase', marginBottom: 2 }}>{l}</div>
                    <div style={{ fontSize: 13, color: '#0f172a', fontFamily: l === 'Ref' || l === 'WBS' ? 'JetBrains Mono,monospace' : 'inherit' }}>{v}</div>
                  </div>
              )}
              </div>
              <div style={{ padding: '16px 20px' }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: '#94a3b8', letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 12 }}>Lifecycle</div>
                {TRANSFER_STAGES.map((stage, i) => {
                const stageIdx = TRANSFER_STAGES.findIndex((s) => s.id === selected.status);
                const isDone = i <= stageIdx;
                return (
                  <div key={stage.id} style={{ display: 'flex', gap: 10, marginBottom: i < TRANSFER_STAGES.length - 1 ? 12 : 0 }}>
                      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                        <div style={{ width: 20, height: 20, borderRadius: '50%', background: isDone ? stage.color : '#e8ecf2', border: '2px solid ' + (isDone ? stage.color : '#c4cedf'), display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, color: isDone ? '#fff' : '#94a3b8', flexShrink: 0 }}>{isDone ? '✓' : '○'}</div>
                        {i < TRANSFER_STAGES.length - 1 && <div style={{ width: 2, flex: 1, minHeight: 16, background: isDone ? stage.color + '40' : '#e8ecf2', marginTop: 2 }}></div>}
                      </div>
                      <div style={{ paddingBottom: 8 }}>
                        <div style={{ fontSize: 12, fontWeight: 600, color: isDone ? '#0f172a' : '#94a3b8' }}>{stage.label}</div>
                        {isDone && <div style={{ fontSize: 10, fontFamily: 'JetBrains Mono,monospace', color: '#94a3b8', marginTop: 1 }}>Completed</div>}
                      </div>
                    </div>);

              })}
              </div>
            </div>
          </div>
        </div>
      }

      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 12 }}>
        <div>
          <h2 style={{ fontSize: 20, fontWeight: 600, color: '#0f172a', letterSpacing: '-0.02em', margin: 0 }}>Warehouse Transfer Register</h2>
          <p style={{ fontSize: 13, color: '#94a3b8', margin: '3px 0 0' }}>Pilbara Gas Processing Plant · {MOCK_TRANSFERS.length} transfers</p>
        </div>
        <button onClick={()=>setShowNew(true)} style={{ background: '#2563eb', border: 'none', borderRadius: 6, padding: '6px 16px', fontSize: 13, fontWeight: 500, color: '#fff', cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif' }}>+ New transfer</button>
      </div>

      {showNew && <NewTransferModal onClose={()=>setShowNew(false)} onSave={(t)=>setExtraTransfers([{...t, id:'new-'+Date.now()}, ...extraTransfers])} />}

      {/* Pipeline summary */}
      <div style={{ display: 'flex', background: '#fff', border: '1px solid #dde3ed', borderRadius: 10, overflow: 'hidden', marginBottom: 14 }}>
        {TRANSFER_STAGES.map((s, i) =>
        <div key={s.id} onClick={() => setView((v) => v === s.id ? 'all' : s.id)}
        style={{ flex: 1, padding: '10px 12px', textAlign: 'center', cursor: 'pointer', borderRight: i < TRANSFER_STAGES.length - 1 ? '1px solid #e8ecf2' : 'none', background: view === s.id ? s.color + '10' : 'transparent', transition: 'background 120ms' }}>
            <div style={{ fontSize: 20, fontWeight: 700, fontFamily: 'JetBrains Mono,monospace', color: counts[s.id] > 0 ? s.color : '#c4cedf', lineHeight: 1 }}>{counts[s.id] || 0}</div>
            <div style={{ fontSize: 11, color: '#94a3b8', marginTop: 3 }}>{s.label}</div>
            {view === s.id && <div style={{ width: 20, height: 2, background: s.color, borderRadius: 1, margin: '4px auto 0' }}></div>}
          </div>
        )}
      </div>

      <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
        <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Search ref, item, WBS, location, requester…"
        style={{ flex: 1, background: '#fff', border: '1px solid #c4cedf', borderRadius: 6, padding: '5px 10px', fontSize: 12, color: '#0f172a', outline: 'none', fontFamily: 'IBM Plex Sans,sans-serif', height: 32 }} />
        <button onClick={() => setView('all')} style={{ padding: '5px 12px', fontSize: 12, borderRadius: 6, height: 32, border: view === 'all' ? '1px solid #2563eb' : '1px solid #c4cedf', background: view === 'all' ? 'rgba(37,99,235,0.08)' : '#fff', color: view === 'all' ? '#2563eb' : '#475569', cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif', fontWeight: view === 'all' ? 600 : 400 }}>All ({counts.all})</button>
      </div>

      <div style={{ background: '#fff', border: '1px solid #dde3ed', borderRadius: 10, overflow: 'hidden' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '110px 80px 1fr 50px 70px 150px 130px 100px auto 70px', gap: 8, padding: '6px 14px', background: '#f4f7fb', borderBottom: '1px solid #dde3ed' }}>
          {['Ref', 'Item', 'Description', 'Qty', 'WBS', 'From → To', 'Requested by', 'Est. pickup', 'Status', 'Action'].map((h) =>
          <div key={h} style={{ fontSize: 10, fontWeight: 600, color: '#94a3b8', letterSpacing: '0.06em', textTransform: 'uppercase', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{h}</div>
          )}
        </div>
        {filtered.map((t, i) => {
          const sm = TRANSFER_STATUS_META[t.status] || {};
          return (
            <div data-tblrow="1" key={t.id}
            style={{ display: 'grid', gridTemplateColumns: '110px 80px 1fr 50px 70px 150px 130px 100px auto 70px', gap: 8, padding: '9px 14px', borderBottom: i < filtered.length - 1 ? '1px solid #e8ecf2' : 'none', alignItems: 'center', transition: 'background 120ms' }}
            onMouseEnter={(e) => e.currentTarget.style.background = '#f8fafc'} onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
              <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 11, color: '#2563eb' }}>{t.ref}</div>
              <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 11, color: '#94a3b8' }}>{t.itemCode}</div>
              <TruncatedCell text={t.desc} style={{  fontSize: 13, color: '#0f172a', paddingRight: 6  }} />
              <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 12, color: '#475569' }}>{t.qty}</div>
              <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 11, color: '#94a3b8' }}>{t.wbs}</div>
              <div style={{ fontSize: 11, color: '#475569', lineHeight: 1.4 }}>{t.from}<br /><span style={{ color: '#94a3b8' }}>→ {t.to}</span></div>
              <TruncatedCell text={t.requestedBy} style={{ fontSize: 12, color: '#475569' }} />
              <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 11, color: '#475569' }}>{t.estPickup}</div>
              <div data-pill="1" style={{ overflow: 'visible', minWidth: 0 }}><span style={{ fontSize: 11, fontWeight: 600, color: sm.color, background: sm.bg, border: '1px solid ' + sm.border, padding: '2px 7px', borderRadius: 4 }}>{sm.label}</span></div>
              <div><button onClick={() => setSelected(t)} style={{ background: 'none', border: '1px solid #c4cedf', color: '#475569', fontSize: 11, padding: '2px 8px', borderRadius: 3, cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif' }}>View</button></div>
            </div>);

        })}
        {filtered.length === 0 && <div style={{ padding: '32px', textAlign: 'center', fontSize: 13, color: '#94a3b8' }}>No transfers match current filters.</div>}
      </div>
    </div>);

};

// ── VDRL · Upload modal ───────────────────────────────────────
const VDRLUploadModal = ({ item, onClose, onUploaded }) => {
  const [files, setFiles] = React.useState([]); // [{name,size,heatRef,appliesTo,issuedDate,linkedQty}]
  const [draft, setDraft] = React.useState({ heatRef:'', appliesTo:'', issuedDate:new Date().toISOString().slice(0,10), file:'', size:'', notes:'' });

  const Lbl = ({ children, req }) => <label style={{ fontSize:11, fontWeight:500, color:'#475569', marginBottom:4, display:'block' }}>{children}{req && <span style={{ color:'#ef4444', marginLeft:2 }}>*</span>}</label>;
  const inp = { width:'100%', padding:'7px 10px', fontSize:13, border:'1px solid #c4cedf', borderRadius:5, background:'#fff', fontFamily:'IBM Plex Sans,sans-serif', color:'#0f172a', outline:'none', boxSizing:'border-box' };

  const pickFile = () => {
    if (!window.__qmatPickFile) {
      // Simulate
      setDraft(d => ({ ...d, file:`UPLOAD-${item.poRef.replace('PO-','')}-${Math.floor(Math.random()*900)+100}.pdf`, size:'— pending' }));
      return;
    }
    window.__qmatPickFile({ accept:'.pdf,.jpg,.jpeg,.png,.xlsx,.docx', onPicked:(picked) => {
      const f = picked[0]; if (!f) return;
      const sz = f.size > 1024*1024 ? (f.size/1024/1024).toFixed(1)+' MB' : (f.size/1024).toFixed(0)+' KB';
      setDraft(d => ({ ...d, file:f.name, size:sz }));
    }});
  };
  const addToBatch = () => {
    if (!draft.file) return;
    setFiles(f => [...f, { ...draft, id: Date.now() }]);
    setDraft({ heatRef:'', appliesTo:'', issuedDate:new Date().toISOString().slice(0,10), file:'', size:'', notes:'' });
  };
  const submit = () => {
    const batch = draft.file ? [...files, draft] : files;
    if (window.__qmatToast) window.__qmatToast(`${batch.length} cert${batch.length===1?'':'s'} uploaded for ${item.doc} · pending QA verification`, 'success');
    if (onUploaded) onUploaded(batch);
    onClose();
  };
  const canSubmit = (draft.file && draft.heatRef) || files.length > 0;
  const isMultiCert = item.doc && (item.doc.toLowerCase().includes('heat') || item.doc.toLowerCase().includes('batch') || item.doc.toLowerCase().includes('lot'));

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(15,23,42,0.5)', zIndex:9999, display:'flex', alignItems:'center', justifyContent:'center', padding:20 }} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{ background:'#fff', borderRadius:12, width:780, maxWidth:'100%', maxHeight:'92vh', display:'flex', flexDirection:'column', boxShadow:'0 20px 60px rgba(0,0,0,0.25)' }}>
        <div style={{ padding:'16px 22px', borderBottom:'1px solid #e8ecf2', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div>
            <h3 style={{ margin:0, fontSize:16, fontWeight:600, color:'#0f172a' }}>↑ Upload {item.doc}</h3>
            <p style={{ margin:'3px 0 0', fontSize:12, color:'#94a3b8' }}>{item.poRef} · {item.vendor}{item.tag !== '—' ? ` · ${item.tag}` : ''}</p>
          </div>
          <button onClick={onClose} style={{ background:'transparent', border:'none', fontSize:20, color:'#94a3b8', cursor:'pointer' }}>×</button>
        </div>

        <div style={{ padding:22, overflowY:'auto', flex:1 }}>
          {isMultiCert && (
            <div style={{ marginBottom:14, padding:'10px 14px', background:'rgba(37,99,235,0.05)', border:'1px solid rgba(37,99,235,0.2)', borderRadius:6, fontSize:12, color:'#1e40af', display:'flex', gap:10 }}>
              <span style={{ fontSize:14 }}>ℹ</span>
              <div>This document type can have <strong>multiple certificates</strong> (e.g. one per heat / lot). Use <strong>Add to batch</strong> below to attach several at once, each with its own heat/lot reference and applies-to scope.</div>
            </div>
          )}

          {/* Already-staged batch */}
          {files.length > 0 && (
            <>
              <div style={{ fontSize:11, fontWeight:600, color:'#94a3b8', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:8 }}>Staged ({files.length})</div>
              <div style={{ border:'1px solid #dde3ed', borderRadius:6, overflow:'hidden', marginBottom:16 }}>
                {files.map((f, i) => (
                  <div key={f.id} style={{ display:'grid', gridTemplateColumns:'1.4fr 120px 1fr 80px 30px', gap:10, padding:'8px 12px', borderBottom: i<files.length-1?'1px solid #f0f3f9':'none', alignItems:'center', background:'rgba(22,163,74,0.04)' }}>
                    <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:11, color:'#2563eb' }}>{f.file}</div>
                    <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:11, color:'#0f172a', fontWeight:600 }}>{f.heatRef || <em style={{color:'#94a3b8'}}>no ref</em>}</div>
                    <div style={{ fontSize:11, color:'#475569' }}>{f.appliesTo || <em style={{color:'#94a3b8'}}>full qty</em>}</div>
                    <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:10, color:'#94a3b8' }}>{f.size}</div>
                    <button onClick={()=>setFiles(fs => fs.filter(x => x.id !== f.id))} title="Remove" style={{ background:'#fef2f2', border:'1px solid #fecaca', color:'#dc2626', fontSize:11, padding:'2px 6px', borderRadius:4, cursor:'pointer' }}>×</button>
                  </div>
                ))}
              </div>
            </>
          )}

          {/* Add form */}
          <div style={{ border:'1.5px solid #2563eb', borderRadius:8, padding:'14px 16px', background:'rgba(37,99,235,0.03)' }}>
            <div style={{ fontSize:13, fontWeight:600, color:'#0f172a', marginBottom:10 }}>{files.length > 0 ? 'Add another certificate' : 'Certificate details'}</div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:10 }}>
              <div><Lbl req>Heat / batch / ref number</Lbl><input style={{...inp, fontFamily:'JetBrains Mono,monospace'}} value={draft.heatRef} onChange={e=>setDraft(d=>({...d,heatRef:e.target.value.toUpperCase()}))} placeholder="e.g. A24-887, LOT-44A" /></div>
              <div><Lbl>Issue date</Lbl><input type="date" style={inp} value={draft.issuedDate} onChange={e=>setDraft(d=>({...d,issuedDate:e.target.value}))} /></div>
              <div style={{ gridColumn:'span 2' }}><Lbl>Applies to (qty / scope)</Lbl><input style={inp} value={draft.appliesTo} onChange={e=>setDraft(d=>({...d,appliesTo:e.target.value}))} placeholder="e.g. 1240 m of 4800 m, Drums 1–3, Shell plate only" /></div>
              <div style={{ gridColumn:'span 2' }}>
                <Lbl req>File</Lbl>
                <button onClick={pickFile} style={{ width:'100%', padding:'9px 12px', fontSize:13, border: draft.file ? '1px solid #2563eb' : '1px dashed #2563eb', borderRadius:5, background: draft.file ? 'rgba(37,99,235,0.06)' : '#fff', color: draft.file ? '#2563eb' : '#475569', cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif', textAlign:'left', boxSizing:'border-box', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <span>{draft.file ? `📄 ${draft.file}` : '↑ Choose file (PDF, image, Excel, Word)…'}</span>
                  <span style={{ fontFamily:'JetBrains Mono,monospace', fontSize:11 }}>{draft.size}</span>
                </button>
              </div>
              <div style={{ gridColumn:'span 2' }}><Lbl>Notes (optional)</Lbl><input style={inp} value={draft.notes} onChange={e=>setDraft(d=>({...d,notes:e.target.value}))} placeholder="Verification notes, QA comments, etc." /></div>
            </div>

            {isMultiCert && (
              <div style={{ display:'flex', justifyContent:'flex-end' }}>
                <button onClick={addToBatch} disabled={!draft.file || !draft.heatRef} style={{ background: (draft.file && draft.heatRef) ? '#2563eb' : '#c4cedf', border:'none', color:'#fff', padding:'6px 14px', fontSize:12, fontWeight:500, borderRadius:5, cursor: (draft.file && draft.heatRef) ? 'pointer' : 'not-allowed', fontFamily:'IBM Plex Sans,sans-serif' }}>+ Add to batch</button>
              </div>
            )}
          </div>
        </div>

        <div style={{ padding:'12px 22px', borderTop:'1px solid #e8ecf2', background:'#f8fafd', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <div style={{ fontSize:11, color:'#94a3b8' }}>{files.length + (draft.file ? 1 : 0)} certificate{(files.length + (draft.file ? 1 : 0)) === 1 ? '' : 's'} to upload</div>
          <div style={{ display:'flex', gap:8 }}>
            <button onClick={onClose} style={{ background:'transparent', border:'1px solid #c4cedf', color:'#475569', padding:'7px 14px', fontSize:12, borderRadius:5, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>Cancel</button>
            <button onClick={submit} disabled={!canSubmit} style={{ background: canSubmit ? '#16a34a' : '#c4cedf', border:'none', color:'#fff', padding:'7px 18px', fontSize:12, fontWeight:600, borderRadius:5, cursor: canSubmit ? 'pointer' : 'not-allowed', fontFamily:'IBM Plex Sans,sans-serif' }}>✓ Upload {files.length + (draft.file ? 1 : 0) > 1 ? `${files.length + (draft.file ? 1 : 0)} certs` : 'certificate'}</button>
          </div>
        </div>
      </div>
    </div>);
};

      {/* KPI strip */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:8, marginBottom:14 }}>
        <div style={{ background:'#fff', border:'1px solid #dde3ed', borderRadius:8, padding:'10px 14px' }}>
          <div style={{ fontSize:22, fontWeight:700, fontFamily:'JetBrains Mono,monospace', color:'#16a34a' }}>{vdrlCounts.received}</div>
          <div style={{ fontSize:11, color:'#94a3b8', marginTop:3 }}>VDRL items received</div>
        </div>
        <div style={{ background:'#fff', border:'1px solid #dde3ed', borderRadius:8, padding:'10px 14px' }}>
          <div style={{ fontSize:22, fontWeight:700, fontFamily:'JetBrains Mono,monospace', color:'#d97706' }}>{vdrlCounts.pending}</div>
          <div style={{ fontSize:11, color:'#94a3b8', marginTop:3 }}>VDRL pending</div>
        </div>
        <div style={{ background:'#fff', border:'1px solid #dde3ed', borderRadius:8, padding:'10px 14px' }}>
          <div style={{ fontSize:22, fontWeight:700, fontFamily:'JetBrains Mono,monospace', color:'#dc2626' }}>{vdrlCounts.overdue}</div>
          <div style={{ fontSize:11, color:'#94a3b8', marginTop:3 }}>VDRL overdue</div>
        </div>
        <div style={{ background:'#fff', border:'1px solid #dde3ed', borderRadius:8, padding:'10px 14px' }}>
          <div style={{ fontSize:22, fontWeight:700, fontFamily:'JetBrains Mono,monospace', color:'#dc2626' }}>{MOCK_TRACE_HOLDS.length}</div>

        </div>
      </div>

        <Tab id="queue"  label="Cert approvals"   count={MOCK_CERT_QUEUE.length} color="#d97706" />

        <Tab id="holds"  label="Holds"            count={MOCK_TRACE_HOLDS.length} color="#dc2626" />

        <div>

            {[{id:'all',label:'All'},{id:'received',label:'Received',color:'#16a34a'},{id:'pending',label:'Pending',color:'#d97706'},{id:'overdue',label:'Overdue',color:'#dc2626'}].map(f=>{

                      </div>
                      <div style={{ fontSize:12, color:'#475569', lineHeight:1.5 }}>{step.detail}</div>
                    </div>
                  </div>);
              })}
            </div>
          </div>
        </div>
      )}

      {/* Holds */}
      {tab === 'holds' && (
        <div>
          <div style={{ marginBottom:10, padding:'10px 14px', background:'rgba(220,38,38,0.06)', border:'1px solid rgba(220,38,38,0.25)', borderRadius:6, fontSize:12, color:'#7f1d1d', display:'flex', gap:10, alignItems:'flex-start' }}>
            <span style={{ fontSize:14 }}>⚠</span>
            <div><strong style={{ color:'#dc2626' }}>{MOCK_TRACE_HOLDS.length} items on traceability hold.</strong> <span style={{ color:'#475569' }}>These items cannot be issued via FMR or installed until the underlying cert/doc gap is resolved.</span></div>
          </div>
          <div style={{ background:'#fff', border:'1px solid #dde3ed', borderRadius:8, overflow:'hidden' }}>
            <div style={{ display:'grid', gridTemplateColumns:'90px 1.4fr 1.4fr 1fr 130px 100px 140px', gap:10, padding:'8px 14px', background:'#f4f7fb', borderBottom:'1px solid #dde3ed', fontSize:10, fontWeight:600, color:'#94a3b8', letterSpacing:'0.06em', textTransform:'uppercase' }}>
              <div>Tag</div><div>Item</div><div>Hold reason</div><div>Location</div><div>Since</div><div>Age</div><div>Action</div>
            </div>
            {MOCK_TRACE_HOLDS.map((h, i) => (

                <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:12, color:h.tag==='—'?'#94a3b8':'#0f172a', fontWeight:600 }}>{h.tag}</div>
                <div style={{ fontSize:13, color:'#0f172a' }}>{h.item}</div>
                <div style={{ fontSize:12, color:'#dc2626' }}>{h.reason}</div>
                <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:11, color:'#475569' }}>{h.location}</div>
                <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:11, color:'#475569' }}>{h.since}</div>
                <div style={{ fontSize:12, color:'#dc2626', fontWeight:600 }}>{h.age}</div>
                <div style={{ display:'flex', gap:4 }}>
                  <button style={{ background:'#2563eb', border:'none', color:'#fff', fontSize:11, fontWeight:500, padding:'3px 10px', borderRadius:4, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>📎 Chase cert</button>
                  <button style={{ background:'#f4f7fb', border:'1px solid #c4cedf', color:'#475569', fontSize:11, padding:'3px 9px', borderRadius:4, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>View</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};
