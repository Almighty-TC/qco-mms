<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body, #root { height: 100%; width: 100%; margin: 0; padding: 0; }
  body {
    background: #f1f4f8;
    color: #0f172a;
    font-family: 'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  /* Wide tables scroll horizontally inside their container */
  .tbl-wrap { overflow-x: auto; width: 100%; min-width: 0; }
  /* Content area never pushes wider than viewport */
  .content-pad { min-width: 0; max-width: 100%; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #c4cedf; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #475569; }

  /* ── Global table header rule — headers NEVER wrap ── */
  /* All header row divs inside grids get nowrap */
  div[style*="background: '#f4f7fb'"] > div,
  div[style*="background: '#f0f3f9'"] > div {
    white-space: nowrap !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
  }
  /* Explicit utility — apply to any header cell */
  .th-cell {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  /* RAG Pills */
  .pill { display: inline-flex; align-items: center; gap: 5px; border-radius: 9999px; font-weight: 600; white-space: nowrap; }
  .pill-green { background: rgba(22,163,74,0.10); color: #22c55e; border: 1px solid rgba(34,197,94,0.35); }
  .pill-amber { background: rgba(217,119,6,0.10); color: #f59e0b; border: 1px solid rgba(245,158,11,0.35); }
  .pill-red   { background: rgba(220,38,38,0.10);  color: #ef4444; border: 1px solid rgba(239,68,68,0.35);  }
  .pill-grey  { background: rgba(100,116,139,0.08);color: #8899aa; border: 1px solid rgba(100,116,139,0.35);}
  .pill-blue  { background: rgba(37,99,235,0.10); color: #2563eb; border: 1px solid rgba(59,130,246,0.35); }

  /* Tooltip for truncated text — title attribute shows on hover natively */
  [title] { cursor: default; }
  /* ── Tooltip system ─────────────────────────────────── */
  .qm-tooltip-host {
    position: relative;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
    cursor: default;
  }
  .qm-tooltip-host .qm-tooltip {
    display: none;
    position: fixed;
    z-index: 9999;
    background: #1e293b;
    color: #f1f5f9;
    font-size: 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    padding: 6px 10px;
    border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    white-space: normal;
    max-width: 320px;
    line-height: 1.5;
    pointer-events: none;
    word-break: break-word;
  }
  .qm-tooltip-host:hover .qm-tooltip {
    display: block;
  }
  /* Truncated indicator */
  .qm-ellipsis {
    color: #2563eb;
    cursor: pointer;
    font-weight: 600;
    font-size: 11px;
    display: inline;
    margin-left: 2px;
  }
  /* Table row cell baseline */
  [data-tblrow] {
    align-items: center !important;
  }
  [data-tblrow] > div,
  [data-tblrow] > span {
    min-width: 0;
    align-self: center;
  }
  [data-tblrow] > div[data-pill] {
    overflow: visible !important;
    white-space: normal !important;
  }

</style>

<script type="text/babel">

// QMAT Shared Components
// Pills, badges, alerts, milestone timeline, approval workflow, stat cards, breadcrumb

// ── Upload helper: opens native file picker, shows toast on selection ──
window.__qmatAbbr = {
  'QMAT':'Quality Material & Asset Tracking','PO':'Purchase Order','MTO':'Material Take-Off','SCN':'Shipment Control Note','FMR':'Field Material Request','WBS':'Work Breakdown Structure','AVL':'Approved Vendor List','VDRL':'Vendor Document Requirements List','MC':'Material Control','MCR':'Material Control Register','PM':'Project Manager','QE':'Quality Engineer','QA':'Quality Assurance','QC':'Quality Control','QCO':'Quality Control Officer','MDR':'Manufacturing Data Record','MTC':'Mill Test Certificate','CoA':'Certificate of Authenticity','COA':'Certificate of Analysis','CoC':'Certificate of Conformity','COC':'Certificate of Conformity','COO':'Certificate of Origin','BL':'Bill of Lading','HBL':'House Bill of Lading','MBL':'Master Bill of Lading','CI':'Commercial Invoice','PL':'Packing List','MSDS':'Material Safety Data Sheet','SDS':'Safety Data Sheet','DG':'Dangerous Goods','UN':'United Nations (UN number)','PG':'Packing Group','PWHT':'Post-Weld Heat Treatment','HT':'Heat Treatment','NDT':'Non-Destructive Testing','FAT':'Factory Acceptance Test','SAT':'Site Acceptance Test','TPI':'Third-Party Inspection','ITP':'Inspection & Test Plan','IRN':'Inspection Release Note','ROS':'Required On Site','ETD':'Estimated Time of Departure','ATD':'Actual Time of Departure','ETA':'Estimated Time of Arrival','ATA':'Actual Time of Arrival','CDD':'Contract Delivery Date','EDD':'Estimated Delivery Date','ESD':'Estimated Ship Date','CIF':'Cost, Insurance & Freight','FOB':'Free On Board','EXW':'Ex Works','DAP':'Delivered At Place','DDP':'Delivered Duty Paid','FCA':'Free Carrier','CPT':'Carriage Paid To','CIP':'Carriage & Insurance Paid To','TCCC':'Transfer of Custody, Care & Control','PoC':'Proof of Custody','TRF':'Transfer','RFQ':'Request For Quotation','LOA':'Letter Of Award','LOI':'Letter Of Intent','WO':'Work Order','EA':'Each','LT':'Long Tonne','M':'Metre','M2':'Square Metre','M3':'Cubic Metre','KG':'Kilogram','UoM':'Unit of Measure','UOM':'Unit of Measure','ABF':'Approved for Build / Fabrication','AFC':'Approved For Construction','AFR':'Approved For Review','C1':'Approved (no comments)','C2':'Approved with comments','C3':'Not approved — revise & resubmit','WH':'Warehouse','HV':'High Voltage','MV':'Medium Voltage','LV':'Low Voltage','RAG':'Red / Amber / Green status','API':'American Petroleum Institute','ASME':'American Society of Mechanical Engineers','IEC':'International Electrotechnical Commission','ISO':'International Organization for Standardization','IMO':'International Maritime Organization','IATA':'International Air Transport Association','TEU':'Twenty-foot Equivalent Unit (container)','PDF':'Portable Document Format','PWS':'Post Weld Surface','SUP':'Supplier','TBC':'To Be Confirmed','TBD':'To Be Determined','SLA':'Service Level Agreement'
};
// ── Abbreviation hover tooltips (DOM-safe — no React conflicts) ──
window.__qmatAbbrTooltipInit = false;
window.__qmatInitAbbrTooltip = () => {
  if (window.__qmatAbbrTooltipInit) return;
  window.__qmatAbbrTooltipInit = true;
  const dict = window.__qmatAbbr || {};
  // Build pattern from dict keys, longest-first to match multi-letter acronyms before shorter ones
  const keys = Object.keys(dict).sort((a, b) => b.length - a.length);
  const escaped = keys.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const wordRe = new RegExp('\\b(' + escaped.join('|') + ')\\b');
  const SKIP = new Set(['SCRIPT', 'STYLE', 'TEXTAREA', 'INPUT', 'SELECT', 'OPTION', 'CODE']);

  // Custom tooltip element (single, reused)
  const tip = document.createElement('div');
  tip.style.cssText = 'position:fixed;z-index:99998;background:#0f172a;color:#fff;font-family:IBM Plex Sans,sans-serif;font-size:12px;padding:6px 10px;border-radius:6px;box-shadow:0 4px 14px rgba(15,23,42,0.25);pointer-events:none;opacity:0;transition:opacity 120ms;max-width:280px;line-height:1.4;';
  document.body.appendChild(tip);
  let activeKey = null;

  const showTip = (text, x, y) => {
    tip.textContent = text;
    tip.style.left = Math.min(window.innerWidth - 300, x + 12) + 'px';
    tip.style.top = (y + 18) + 'px';
    tip.style.opacity = '1';
  };
  const hideTip = () => { tip.style.opacity = '0'; activeKey = null; };

  const onMove = (e) => {
    const x = e.clientX, y = e.clientY;
    // Skip when over a control
    let el = e.target;
    while (el && el !== document.body) {
      if (SKIP.has(el.nodeName)) { hideTip(); return; }
      el = el.parentNode;
    }
    // Find word under cursor
    if (!document.caretRangeFromPoint && !document.caretPositionFromPoint) { hideTip(); return; }
    const r = document.caretRangeFromPoint ? document.caretRangeFromPoint(x, y) : null;
    const node = r ? r.startContainer : (document.caretPositionFromPoint(x, y) || {}).offsetNode;
    const offset = r ? r.startOffset : ((document.caretPositionFromPoint(x, y) || {}).offset);
    if (!node || node.nodeType !== 3 || !node.nodeValue) { hideTip(); return; }
    const text = node.nodeValue;
    // Extract token around the cursor (word chars + hyphens between letters/digits)
    let start = offset, end = offset;
    while (start > 0 && /[A-Za-z0-9]/.test(text[start - 1])) start--;
    while (end < text.length && /[A-Za-z0-9]/.test(text[end])) end++;
    const word = text.slice(start, end);
    if (!word || word.length < 2) { hideTip(); return; }
    // Exact dict hit (case-sensitive)
    if (dict[word]) {
      if (activeKey !== word) { activeKey = word; showTip(word + ' — ' + dict[word], x, y); }
      else { tip.style.left = Math.min(window.innerWidth - 300, x + 12) + 'px'; tip.style.top = (y + 18) + 'px'; }
      // Set cursor:help on the parent if possible
      return;
    }
    // Try uppercase variant (handles "PoC" / "POC", "UoM" / "UOM")
    const up = word.toUpperCase();
    if (up !== word && dict[up]) {
      if (activeKey !== up) { activeKey = up; showTip(word + ' — ' + dict[up], x, y); }
      return;
    }
    hideTip();
  };
  const onLeave = () => hideTip();
  document.addEventListener('mousemove', onMove, { passive: true });
  document.addEventListener('mouseleave', onLeave);
  window.addEventListener('blur', onLeave);
};
const startAbbr = () => window.__qmatInitAbbrTooltip();
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', startAbbr);
else setTimeout(startAbbr, 100);

// ── Critical path · cross-module store ──────────────────────
// Single source of truth for items flagged on the critical path.
// Refs are PO refs, SCN refs, FMR refs, PO line keys (`{poRef}::L{lineNo}`).
window.__qmatCritical = window.__qmatCritical || new Set([
  // Seed: PO-2024-0112 + PO-2024-0087 critical at all levels
  'PO-2024-0112', 'PO-2024-0087',
  'PO-2024-0112::L001', 'PO-2024-0112::L002', 'PO-2024-0087::L001', 'PO-2024-0087::L002',
  'SCN-2024-0047', 'SCN-2024-0038', 'SCN-2024-0061',
  'FMR-2025-0038'
]);
window.__qmatCriticalListeners = window.__qmatCriticalListeners || new Set();
window.__qmatToggleCritical = (ref, opts) => {
  opts = opts || {};
  const isCurrentlyCritical = window.__qmatCritical.has(ref);
  // Add → no confirmation. Remove → confirm first.
  if (isCurrentlyCritical && !opts.skipConfirm) {
    if (!window.confirm(`Remove ${ref} from the critical path?\n\nThis will downgrade priority and remove the ⭐ flag wherever it appears (Procurement, Expediting, Logistics, FMR).\n\nClick OK to confirm, or Cancel to keep it on the critical path.`)) return;
  }
  if (isCurrentlyCritical) window.__qmatCritical.delete(ref);
  else window.__qmatCritical.add(ref);
  window.__qmatCriticalListeners.forEach((cb) => cb());
  if (window.__qmatToast) window.__qmatToast(window.__qmatCritical.has(ref) ? `${ref} flagged as critical path` : `${ref} removed from critical path`, 'info');
};
window.__qmatIsCritical = (ref) => window.__qmatCritical.has(ref);
// React hook
window.useQmatCritical = function() {
  const [, force] = React.useReducer((x) => x + 1, 0);
  React.useEffect(() => {
    window.__qmatCriticalListeners.add(force);
    return () => window.__qmatCriticalListeners.delete(force);
  }, []);
  return {
    isCritical: window.__qmatIsCritical,
    toggle: window.__qmatToggleCritical,
    set: window.__qmatCritical
  };
};

// ── Auto-title for overflowing cells (global tooltip on truncated text) ──
window.__qmatAutoTitle = () => {
  if (window.__qmatAutoTitleRunning) return;
  window.__qmatAutoTitleRunning = true;
  try {
    const cells = document.querySelectorAll('[data-tblrow] > *');
    cells.forEach((el) => {
      if (el.children.length > 0 && el.textContent.trim() === '') return;
      const overflowing = el.scrollWidth > el.clientWidth + 1;
      if (overflowing) {
        const txt = (el.textContent || '').trim();
        if (txt && el.getAttribute('title') !== txt) el.setAttribute('title', txt);
      }
    });
  } finally {
    window.__qmatAutoTitleRunning = false;
  }
};
window.__qmatScheduleAutoTitle = (() => { let t; return () => { clearTimeout(t); t = setTimeout(window.__qmatAutoTitle, 200); }; })();
if (typeof MutationObserver !== 'undefined') {
  const _qmatStartAutoTitle = () => {
    window.__qmatAutoTitle();
    new MutationObserver(window.__qmatScheduleAutoTitle).observe(document.body, { subtree: true, childList: true, characterData: true });
    window.addEventListener('resize', window.__qmatScheduleAutoTitle);
  };
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', _qmatStartAutoTitle);
  else setTimeout(_qmatStartAutoTitle, 300);
}

window.__qmatToast = (msg, kind='info') => {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:${kind==='success'?'#16a34a':kind==='error'?'#ef4444':'#0f172a'};color:#fff;padding:10px 18px;border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(15,23,42,0.25);z-index:99999;opacity:0;transition:opacity 200ms`;
  document.body.appendChild(t);
  requestAnimationFrame(()=>t.style.opacity='1');
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),250);},2800);
};
window.__qmatPickFile = (opts={}) => {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = opts.accept || '.pdf,.xlsx,.xls,.csv,.docx,.doc,.png,.jpg,.jpeg';
  if (opts.multiple) inp.multiple = true;
  inp.style.display = 'none';
  document.body.appendChild(inp);
  inp.onchange = () => {
    const files = Array.from(inp.files || []);
    if (files.length) {
      const names = files.map(f=>f.name).join(', ');
      window.__qmatToast(`✓ Uploaded ${files.length===1?names:files.length+' files'}`, 'success');
      if (opts.onPicked) opts.onPicked(files);
    }
    inp.remove();
  };
  inp.click();
};

const RAGPill = ({ status, size = 'md' }) => {
  const map = {
    green: { label: 'On track', cls: 'pill-green' },
    amber: { label: 'At risk', cls: 'pill-amber' },
    red: { label: 'Breached', cls: 'pill-red' },
    grey: { label: 'Not started', cls: 'pill-grey' },
    blue: { label: 'In progress', cls: 'pill-blue' }
  };
  const { label, cls } = map[status] || map.grey;
  const dotColor = { green: '#22c55e', amber: '#f59e0b', red: '#ef4444', grey: '#8899aa', blue: '#2563eb' }[status] || '#8899aa';
  const sm = size === 'sm';
  return (
    <span className={`pill ${cls}`} style={{ fontSize: sm ? 11 : 12, padding: sm ? '2px 7px' : '3px 10px' }}>
      <span style={{ width: sm ? 6 : 7, height: sm ? 6 : 7, borderRadius: '50%', background: dotColor, display: 'inline-block', marginRight: 4, flexShrink: 0 }}></span>
      {label}
    </span>);

};

const Badge = ({ count, color = 'red' }) => {
  const bg = { red: '#ef4444', amber: '#f59e0b', green: '#22c55e', blue: '#2563eb', grey: '#dde3ed' }[color];
  const fg = color === 'amber' || color === 'green' ? '#f1f4f8' : '#fff';
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', minWidth: 20, height: 20, padding: '0 5px', borderRadius: 9999, fontSize: 11, fontWeight: 700, fontFamily: 'JetBrains Mono,monospace', background: bg, color: fg }}>
      {count}
    </span>);

};

const CriticalAlertBanner = ({ alerts }) =>
<div style={{ background: 'rgba(239,68,68,0.08)', border: '1px solid rgba(239,68,68,0.25)', borderRadius: 6, padding: '9px 14px', display: 'flex', alignItems: 'center', gap: 14, marginBottom: 16 }}>
    <span style={{ fontSize: 12, fontWeight: 700, color: '#ef4444', whiteSpace: 'nowrap', fontFamily: 'IBM Plex Sans,sans-serif' }}>Critical alerts</span>
    <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', flex: 1 }}>
      {alerts.map((a, i) =>
    <span key={i} onClick={a.onClick} style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: '#475569', cursor: 'pointer' }}>
          <Badge count={a.count} color={a.color || 'red'} /> {a.label}
        </span>
    )}
    </div>
  </div>;


const Breadcrumb = ({ items, onNavigate }) =>
<div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: '#8899aa', marginBottom: 14 }}>
    {items.map((item, i) =>
  <React.Fragment key={i}>
        {i > 0 && <span style={{ color: '#c4cedf' }}>›</span>}
        {item.onClick ?
    <span onClick={item.onClick} style={{ color: '#2563eb', cursor: 'pointer' }}>{item.label}</span> :
    <span>{item.label}</span>
    }
      </React.Fragment>
  )}
  </div>;


const MilestoneTimeline = ({ milestones, compact = false }) => {
  const [hoveredIdx, setHoveredIdx] = React.useState(null);
  const nodeStyle = (rag) => {
    const map = {
      green:  { bg:'#22c55e',              border:'#22c55e', color:'#f1f4f8' },
      amber:  { bg:'rgba(217,119,6,0.10)', border:'#f59e0b', color:'#f59e0b' },
      red:    { bg:'rgba(220,38,38,0.10)', border:'#ef4444', color:'#ef4444' },
      future: { bg:'#f0f3f9',              border:'#c4cedf', color:'#8899aa' },
      grey:   { bg:'#f0f3f9',              border:'#c4cedf', color:'#8899aa' },
    };
    return map[rag] || map.future;
  };
  const connColor  = (rag) => ({ green:'#22c55e', amber:'#f59e0b', red:'#ef4444' })[rag] || '#c4cedf';
  const dateColor  = (rag) => ({ green:'#22c55e', amber:'#f59e0b', red:'#ef4444' })[rag] || '#8899aa';

  // Compact mode: dots only, tooltip on hover — used in table rows
  if (compact) {
    return (
      <div style={{ display:'flex', alignItems:'center', gap:0 }}>
        {milestones.map((m, i) => {
          const ns = nodeStyle(m.rag);
          return (
            <React.Fragment key={i}>
              <div style={{ position:'relative' }}
                onMouseEnter={() => setHoveredIdx(i)}
                onMouseLeave={() => setHoveredIdx(null)}>
                <div style={{ width:18, height:18, borderRadius:'50%', background:ns.bg, border:`2px solid ${ns.border}`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:9, fontWeight:700, color:ns.color, cursor:'default', flexShrink:0 }}>
                  {m.rag==='green'?'✓':m.rag==='amber'?'!':m.rag==='red'?'✕':'○'}
                </div>
                {hoveredIdx===i && (
                  <div style={{ position:'absolute', bottom:24, left:'50%', transform:'translateX(-50%)', background:'#1e293b', color:'#f1f5f9', fontSize:11, padding:'5px 9px', borderRadius:6, whiteSpace:'nowrap', zIndex:9999, pointerEvents:'none', boxShadow:'0 4px 12px rgba(0,0,0,0.25)', borderLeft:'2px solid #3b82f6' }}>
                    <div style={{ fontWeight:600 }}>{m.name}</div>
                    <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:10, color:dateColor(m.rag), marginTop:2 }}>{m.date}</div>
                  </div>
                )}
              </div>
              {i < milestones.length - 1 && (
                <div style={{ width:12, height:2, background:connColor(m.rag), opacity:0.5, flexShrink:0 }}></div>
              )}
            </React.Fragment>
          );
        })}
      </div>
    );
  }

  // Full mode: nodes + labels + dates — used in PO detail and standalone views
  return (
    <div style={{ display:'flex', alignItems:'flex-start' }}>
      {milestones.map((m, i) => {
        const ns = nodeStyle(m.rag);
        return (
          <React.Fragment key={i}>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', minWidth:52, maxWidth:72 }}>
              <div style={{ width:30, height:30, borderRadius:'50%', background:ns.bg, border:`2px solid ${ns.border}`, color:ns.color, display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:700, flexShrink:0 }}>
                {m.rag==='green'?'✓':m.rag==='amber'?'!':m.rag==='red'?'✕':'○'}
              </div>
              <div style={{ textAlign:'center', marginTop:4, width:'100%' }}>
                <div style={{ fontSize:10, fontWeight:600, color:'#475569', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{m.name}</div>
                <div style={{ fontSize:9, fontFamily:'JetBrains Mono,monospace', color:dateColor(m.rag), marginTop:1, whiteSpace:'nowrap' }}>{m.date}</div>
              </div>
            </div>
            {i < milestones.length - 1 && (
              <div style={{ flex:1, height:2, background:connColor(m.rag), opacity:0.45, marginTop:14, minWidth:8 }}></div>
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
};

const ModuleStatusRow = ({ modules }) =>

// ── useTableSort — shared sort hook for all tables ───
const useTableSort = (rows, defaultField, defaultDir='asc') => {
  const [sortField, setSortField] = React.useState(defaultField);
  const [sortDir, setSortDir] = React.useState(defaultDir);
  const toggleSort = (f) => {
    if (sortField === f) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortField(f); setSortDir('asc'); }
  };
  const sorted = React.useMemo(() => {
    if (!sortField) return rows;
    const copy = [...rows];
    copy.sort((a, b) => {
      let av = a[sortField]; let bv = b[sortField];
      if (av == null) av = '';
      if (bv == null) bv = '';
      // numeric if both look like numbers
      const an = parseFloat(String(av).replace(/[^0-9.\-]/g,''));
      const bn = parseFloat(String(bv).replace(/[^0-9.\-]/g,''));
      let cmp;
      if (!isNaN(an) && !isNaN(bn) && String(av).match(/^[\s\-]*[\d.,]/) && String(bv).match(/^[\s\-]*[\d.,]/)) {
        cmp = an - bn;
      } else {
        cmp = String(av).localeCompare(String(bv));
      }
      return sortDir === 'asc' ? cmp : -cmp;
    });
    return copy;
  }, [rows, sortField, sortDir]);
  return { sorted, sortField, sortDir, toggleSort };
};

// ── SortableHeader — clickable column header with sort indicator ───
const SortableHeader = ({ label, field, sortField, sortDir, toggleSort, align='left', style={} }) => {
  const active = sortField === field;
  return (
    <div onClick={() => toggleSort(field)}
      style={{ fontSize: 10, fontWeight: 600, color: active ? '#2563eb' : '#94a3b8', letterSpacing: '0.05em', textTransform: 'uppercase', cursor: 'pointer', userSelect: 'none', display: 'flex', alignItems: 'center', justifyContent: align==='right' ? 'flex-end' : align==='center' ? 'center' : 'flex-start', gap: 3, whiteSpace: 'nowrap', overflow: 'hidden', ...style }}>
      <span>{label}</span>
      <span style={{ fontSize: 9, color: active ? '#2563eb' : '#c4cedf' }}>{active ? (sortDir==='asc' ? '↑' : '↓') : '↕'}</span>
    </div>
  );
};

// ── TruncatedCell — hover tooltip + shows full text on overflow ───
const TruncatedCell = ({ text, style={}, mono=false }) => {
  const [tip, setTip] = React.useState(null);
  const ref = React.useRef();

  if (!text) return <div style={{ minWidth:0, overflow:'hidden', ...style }}></div>;

  const cellStyle = {
    overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', minWidth:0, display:'block',
    fontFamily: mono ? 'JetBrains Mono,monospace' : 'inherit', cursor:'default', ...style,
  };

  const onEnter = (e) => {
    const el = ref.current;
    if (el && el.scrollWidth > el.clientWidth) {
      const r = el.getBoundingClientRect();
      setTip({ top: r.bottom + 5, left: Math.min(r.left, window.innerWidth - 360) });
    }
  };

  // Always return a SINGLE div so grid column count is never broken by the tooltip portal
  return (
    <div style={{ minWidth:0, overflow:'hidden', position:'relative' }}>
      <div ref={ref} style={cellStyle} onMouseEnter={onEnter} onMouseLeave={()=>setTip(null)} title={text}>{text}</div>
      {tip && (
        <div style={{ position:'fixed', top:tip.top, left:tip.left, zIndex:9999, background:'#1e293b', color:'#f1f5f9',
          fontSize:12, fontFamily: mono?'JetBrains Mono,monospace':'IBM Plex Sans,sans-serif',
          padding:'7px 12px', borderRadius:7, boxShadow:'0 6px 24px rgba(0,0,0,0.28)',
          whiteSpace:'normal', maxWidth:360, lineHeight:1.55, pointerEvents:'none',
          wordBreak:'break-word', borderLeft:'3px solid #3b82f6' }}>
          {text}
        </div>
      )}
    </div>
  );
};

const WBSRow = ({ node, depth = 0, onSelect, expanded, onToggle, onEditNote }) => {
  const ragDot = { green: '#22c55e', amber: '#f59e0b', red: '#ef4444', blue: '#2563eb', grey: '#8899aa' };
  const hasChildren = node.children && node.children.length > 0;
  const isExp = expanded[node.id];
  const vals = WBS_PO_VALUES[node.id] || { total: 0, commenced: 0 };
  const pct = vals.total > 0 ? Math.round(vals.commenced / vals.total * 100) : 0;
  const fmtM = (v) => v >= 1000000 ? `$${(v / 1000000).toFixed(1)}M` : v > 0 ? `$${(v / 1000).toFixed(0)}k` : '—';
  const rosColor = node.rag === 'red' ? '#ef4444' : node.rag === 'amber' ? '#b45309' : '#475569';
  return (
    <>
      <div
        onClick={() => hasChildren ? onToggle(node.id) : onSelect(node)}
        style={{ display: 'grid', gridTemplateColumns: `${12 + depth * 20}px 14px 8px 52px 1fr 90px 90px 80px 100px 1fr 60px`, gap: 4, alignItems: 'center', padding: '7px 12px', borderBottom: '1px solid #dde3ed', cursor: 'pointer', transition: 'background 150ms' }}
        onMouseEnter={(e) => e.currentTarget.style.background = '#f0f3f9'}
        onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>

        <div></div>
        <span style={{ color: '#8899aa', fontSize: 11 }}>{hasChildren ? isExp ? '▾' : '▸' : ''}</span>
        <span style={{ width: 8, height: 8, borderRadius: '50%', background: ragDot[node.rag] }}></span>
        <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 12, color: '#475569' }}>{node.code}</span>
        <span style={{ fontSize: 13, color: '#0f172a', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{node.label}</span>
        <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 12, color: '#475569', textAlign: 'right' }}>{fmtM(vals.total)}</span>
        <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 12, color: vals.commenced > 0 ? '#2563eb' : '#94a3b8', textAlign: 'right' }}>{fmtM(vals.commenced)}</span>
        <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
          <div style={{ flex: 1, height: 5, background: '#e8ecf2', borderRadius: 2, overflow: 'hidden' }}>
            <div style={{ width: `${pct}%`, height: '100%', background: pct === 100 ? '#16a34a' : pct > 0 ? '#2563eb' : 'transparent', borderRadius: 2 }}></div>
          </div>
        </div>
        <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 12, color: rosColor, fontWeight: 500 }}>{node.ros || '—'}</span>
        <span
          onClick={(e) => { e.stopPropagation(); onEditNote && onEditNote(node); }}
          title={node.notes || 'Click to add a note'}
          style={{ fontSize: 12, color: node.notes && node.notes !== '—' ? '#475569' : '#94a3b8', fontStyle: node.notes && node.notes !== '—' ? 'normal' : 'italic', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
          {node.notes && node.notes !== '—' ? node.notes : '+ add note'}
        </span>
        <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 11, color: '#94a3b8', textAlign: 'right' }}>
          {vals.total > 0 ? `${pct}%` : ''}
          {!hasChildren && <span style={{ color: '#2563eb', marginLeft: 4 }}>→</span>}
        </span>
      </div>
      {isExp && node.children.map((child) =>
      <WBSRow key={child.id} node={child} depth={depth + 1} onSelect={onSelect} expanded={expanded} onToggle={onToggle} onEditNote={onEditNote} />
      )}
    </>);

};

  const [snoozeDays, setSnoozeDays] = React.useState(3);
  const [assignTo, setAssignTo] = React.useState('');

  // Reset action panel when switching problems
  React.useEffect(() => { setAction(null); setSnoozeDays(3); setAssignTo(''); setAssignNote(''); setPlanDue(''); setPlanNote(''); setSelectedSteps({}); }, [selected?.id]);

  const OWNERS = ['J. Hartley · Senior Expeditor', 'S. Patel · Procurement Officer', 'R. Chen · Logistics Officer', 'P. Nguyen · Quality Engineer', 'K. Morrison · Engineer', 'T. Walsh · Junior Expeditor', 'M. Tanaka · Materials Controller'];

  const handleSnooze = () => {
    if (!selected) return;
    const until = new Date(); until.setDate(until.getDate() + parseInt(snoozeDays));
    const fmt = until.toLocaleDateString('en-AU', { day:'2-digit', month:'short', year:'numeric' });
    setProblemStates((s) => ({ ...s, [selected.id]: { ...(s[selected.id]||{}), status:'snoozed', snoozeUntil:fmt, snoozeDays:parseInt(snoozeDays) } }));
    if (window.__qmatToast) window.__qmatToast(`Snoozed until ${fmt}`, 'info');
    setAction(null);
  };
  const handleAssign = () => {
    if (!selected || !assignTo) return;
    setProblemStates((s) => ({ ...s, [selected.id]: { ...(s[selected.id]||{}), status:'assigned', assignee:assignTo, assignNote, assignedAt:new Date().toLocaleDateString('en-AU', { day:'2-digit', month:'short' }) } }));
    if (window.__qmatToast) window.__qmatToast(`Assigned to ${assignTo.split(' · ')[0]}`, 'success');
    setAction(null);
  };
  const handlePlan = () => {
    if (!selected) return;
    const sol = MOCK_AI_SOLUTIONS[selected.id];
    const steps = sol ? sol.steps.filter((_, i) => selectedSteps[i]) : [];
    setProblemStates((s) => ({ ...s, [selected.id]: { ...(s[selected.id]||{}), status:'planned', planSteps:steps, planDue, planNote, planSetAt:new Date().toLocaleDateString('en-AU', { day:'2-digit', month:'short' }) } }));

                        </div>
                      )}

                      {/* Plan panel */}
                      {action === 'plan' && (

                                <input type="checkbox" checked={!!selectedSteps[i]} onChange={(e) => setSelectedSteps((sx) => ({ ...sx, [i]: e.target.checked }))} style={{ marginTop:2 }} />
                                <span>{s.text}</span>
                              </label>
                            ))}
                          </div>
                          <div style={{ display:'grid', gridTemplateColumns:'140px 1fr', gap:8, marginBottom:10 }}>
                            <input type="date" value={planDue} onChange={(e) => setPlanDue(e.target.value)} placeholder="Target date" style={{ padding:'7px 10px', fontSize:13, border:'1px solid #c4cedf', borderRadius:5, background:'#fff', fontFamily:'IBM Plex Sans,sans-serif', color:'#0f172a', outline:'none' }} />
                            <input value={planNote} onChange={(e) => setPlanNote(e.target.value)} placeholder="Additional notes / extra steps (optional)" style={{ padding:'7px 10px', fontSize:13, border:'1px solid #c4cedf', borderRadius:5, background:'#fff', fontFamily:'IBM Plex Sans,sans-serif', color:'#0f172a', outline:'none', boxSizing:'border-box' }} />
                          </div>
                          <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
                            <button onClick={() => setAction(null)} style={{ background:'transparent', border:'1px solid #c4cedf', color:'#475569', padding:'6px 12px', fontSize:12, borderRadius:5, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>Cancel</button>
                            <button onClick={handlePlan} disabled={Object.values(selectedSteps).filter(Boolean).length === 0} style={{ background: Object.values(selectedSteps).filter(Boolean).length > 0 ? '#7c3aed' : '#c4cedf', border:'none', color:'#fff', padding:'6px 14px', fontSize:12, fontWeight:500, borderRadius:5, cursor: Object.values(selectedSteps).filter(Boolean).length > 0 ? 'pointer' : 'not-allowed', fontFamily:'IBM Plex Sans,sans-serif' }}>✓ Save plan ({Object.values(selectedSteps).filter(Boolean).length} step{Object.values(selectedSteps).filter(Boolean).length === 1 ? '' : 's'})</button>
                          </div>
                        </div>
                      )}

                      {!action && (
                        <div style={{ display:'flex', gap:8, marginTop:14, justifyContent:'flex-end' }}>
                          <button onClick={() => setAction('snooze')} style={{ background:'#fff', border:'1px solid #c4cedf', color:'#475569', padding:'7px 14px', fontSize:12, borderRadius:5, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>⏸ Snooze</button>
                          <button onClick={() => setAction('assign')} style={{ background:'#fff', border:'1px solid #c4cedf', color:'#475569', padding:'7px 14px', fontSize:12, borderRadius:5, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>👤 Assign to owner</button>
                          <button onClick={() => setAction('plan')} style={{ background:'#7c3aed', border:'none', color:'#fff', padding:'7px 16px', fontSize:12, fontWeight:500, borderRadius:5, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>✓ Mark resolution plan</button>
                        </div>
                      )}
                    </>
                  )}
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>);
};

// Helpers — derive assigned/available qty and a roll-up status from allocations
const lineAssigned = (l) => (l.allocations||[]).reduce((s,a)=>s+(a.qty||0),0);
const lineAvailable = (l) => Math.max(0, (l.qty||0) - lineAssigned(l));
const lineRollupStatus = (l) => {
  const a = l.allocations||[];
  if (a.length === 0) return 'not-assigned';
  const avail = lineAvailable(l);
  if (avail > 0) return 'partial';
  if (a.every(x=>x.status==='delivered')) return 'delivered';
  if (a.some(x=>x.status==='customs')) return 'customs';
  if (a.some(x=>x.status==='in-transit')) return 'in-transit';
  return 'not-assigned';
};

              <div style={{ border:'1px solid #dde3ed', borderRadius:8, padding:'14px', background:'#fafbfc' }}>

                  <div style={{ fontSize:11, fontWeight:600, color:'#94a3b8', letterSpacing:'0.06em', textTransform:'uppercase' }}>🏭 Deliver to <span style={{ color:'#0f172a', fontWeight:600 }}>QMAT warehouse</span></div>
                  <span style={{ fontSize:10, color:'#94a3b8' }}>{PROJECT_WAREHOUSES.length} options</span>
                </div>
                <div style={{ display:'grid', gridTemplateColumns:'1.4fr 1fr', gap:8 }}>
                  <div>
                    <label style={labelStyle}>Destination warehouse</label>
                    <select style={inputStyle} value={destinationId} onChange={e=>setDestinationId(e.target.value)}>
                      {PROJECT_WAREHOUSES.map(w => <option key={w.id} value={w.id}>{w.label} ({w.type})</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={labelStyle}>Grid bay <span style={{ color:'#94a3b8', fontWeight:400 }}>· optional</span></label>
                    <input style={{ ...inputStyle, fontFamily:'JetBrains Mono,monospace' }} value={destGrid} onChange={e=>setDestGrid(e.target.value.toUpperCase())} placeholder="A-04-03" />
                  </div>
                </div>
                {destLoc && (
                  <div style={{ marginTop:8, padding:'8px 10px', background:'#fff', border:'1px solid #e8ecf2', borderRadius:6, fontSize:11, color:'#475569', display:'flex', gap:14, flexWrap:'wrap' }}>
                    <div><span style={{ color:'#94a3b8' }}>Location:</span> {destLoc.location}</div>
                    <div><span style={{ color:'#94a3b8' }}>Manager:</span> {destLoc.manager}</div>
                    <div><span style={{ color:'#94a3b8' }}>Phone:</span> <a href={`tel:${destLoc.phone}`} style={{color:'#2563eb',textDecoration:'none'}}>{destLoc.phone}</a></div>
                  </div>
                )}
              </div>

              {/* Dates / forwarder grid */}
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10 }}>
                <div><label style={labelStyle}>CDD (Contract delivery date)</label><input type="date" style={inputStyle} value={scnForm.cdd} onChange={e=>setSCN('cdd',e.target.value)} /></div>
                <div><label style={labelStyle}>ETD (Est. departure)</label><input type="date" style={inputStyle} value={scnForm.etd} onChange={e=>setSCN('etd',e.target.value)} /></div>
                <div><label style={labelStyle}>ETA (Est. arrival)</label><input type="date" style={inputStyle} value={scnForm.eta} onChange={e=>setSCN('eta',e.target.value)} /></div>
                <div style={{ gridColumn:'span 2' }}><label style={labelStyle}>Mode of transport</label>
                  <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
                    {[
                      { id:'sea', l:'Sea freight',  ic:'🚢' },
                      { id:'air', l:'Air freight',  ic:'✈️' },
                      { id:'road', l:'Road / Truck', ic:'🚛' },
                      { id:'rail', l:'Rail',        ic:'🚆' },
                      { id:'courier', l:'Courier',   ic:'📦' },
                      { id:'multi', l:'Multi-modal', ic:'🔀' }
                    ].map((m) => {
                      const active = scnForm.mode === m.id;
                      return <button key={m.id} type="button" onClick={()=>setSCN('mode', m.id)} style={{ flex:'1 1 calc(33% - 4px)', minWidth:140, padding:'8px 10px', border: active ? '1.5px solid #2563eb' : '1px solid #c4cedf', background: active ? 'rgba(37,99,235,0.06)' : '#fff', color: active ? '#2563eb' : '#475569', borderRadius:6, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif', fontSize:13, fontWeight: active?600:400, display:'flex', alignItems:'center', gap:8 }}><span style={{ fontSize:16 }}>{m.ic}</span> {m.l}</button>;
                    })}
                  </div>
                </div>
                <div style={{ gridColumn:'span 2' }}><label style={labelStyle}>Freight forwarder</label><input style={inputStyle} placeholder="e.g. Maersk Logistics" value={scnForm.forwarder} onChange={e=>setSCN('forwarder',e.target.value)} /></div>
                <div><label style={labelStyle}>Incoterms</label>
                  <select style={inputStyle} value={scnForm.incoterm} onChange={e=>setSCN('incoterm',e.target.value)}>
                    {['CIF','FOB','EXW','DAP','DDP','FCA'].map(t=><option key={t}>{t}</option>)}
                  </select>
                </div>
              </div>
            </div>
          )}

          {/* Step 3: Packages */}
          {step===3 && (
            <div>
              <div style={{ fontSize:13, color:'#94a3b8', marginBottom:12 }}>Add package details. Each package can have individual dimensions and weight.</div>
              {packages.map((pkg,i) => (
                <div key={i} style={{ background:'#f8fafc', border:'1px solid #e8ecf2', borderRadius:8, padding:'14px', marginBottom:10 }}>
                  <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
                    <div style={{ fontSize:12, fontWeight:600, color:'#475569' }}>Package {i+1}</div>
                    {packages.length>1 && <button onClick={()=>setPackages(ps=>ps.filter((_,j)=>j!==i))} style={{ background:'none', border:'none', color:'#ef4444', cursor:'pointer', fontSize:13 }}>✕</button>}
                  </div>
                  <div style={{ display:'grid', gridTemplateColumns:'1fr 60px 60px 60px 60px 80px 60px', gap:8, alignItems:'end' }}>
                    <div><label style={labelStyle}>Package type</label>
                      <select style={inputStyle} value={pkg.type} onChange={e=>setPackages(ps=>ps.map((p,j)=>j===i?{...p,type:e.target.value}:p))}>
                        {['Crate','Pallet','Drum','Bundle','Loose','Container'].map(t=><option key={t}>{t}</option>)}
                      </select>
                    </div>
                    <div><label style={labelStyle}>Qty</label><input type="number" style={{...inputStyle,fontFamily:'JetBrains Mono,monospace',fontSize:12}} value={pkg.qty} onChange={e=>setPackages(ps=>ps.map((p,j)=>j===i?{...p,qty:e.target.value}:p))} /></div>
                    <div><label style={labelStyle}>L (m)</label><input style={{...inputStyle,fontFamily:'JetBrains Mono,monospace',fontSize:12}} placeholder="2.4" value={pkg.length} onChange={e=>setPackages(ps=>ps.map((p,j)=>j===i?{...p,length:e.target.value}:p))} /></div>
                    <div><label style={labelStyle}>W (m)</label><input style={{...inputStyle,fontFamily:'JetBrains Mono,monospace',fontSize:12}} placeholder="1.2" value={pkg.width} onChange={e=>setPackages(ps=>ps.map((p,j)=>j===i?{...p,width:e.target.value}:p))} /></div>
                    <div><label style={labelStyle}>H (m)</label><input style={{...inputStyle,fontFamily:'JetBrains Mono,monospace',fontSize:12}} placeholder="1.8" value={pkg.height} onChange={e=>setPackages(ps=>ps.map((p,j)=>j===i?{...p,height:e.target.value}:p))} /></div>
                    <div><label style={labelStyle}>Weight (kg)</label><input style={{...inputStyle,fontFamily:'JetBrains Mono,monospace',fontSize:12}} placeholder="850" value={pkg.weight} onChange={e=>setPackages(ps=>ps.map((p,j)=>j===i?{...p,weight:e.target.value}:p))} /></div>
                    <div><label style={labelStyle}>DG?</label>
                      <select style={inputStyle} value={pkg.dg} onChange={e=>setPackages(ps=>ps.map((p,j)=>j===i?{...p,dg:e.target.value==='true'}:p))}>
                        <option value="false">No</option><option value="true">Yes</option>
                      </select>
                    </div>
                  </div>
                </div>
              ))}
              <button onClick={()=>setPackages(ps=>[...ps,{type:'Crate',qty:1,length:'',width:'',height:'',weight:'',dg:false}])}
                style={{ background:'#f4f7fb', border:'1px dashed #c4cedf', borderRadius:6, padding:'8px 16px', fontSize:12, color:'#475569', cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif', width:'100%' }}>
                + Add package
              </button>
            </div>
          )}

          {/* Step 4: Documents */}
          {step===4 && (
            <div>
              <div style={{ background:'rgba(37,99,235,0.06)', border:'1px solid rgba(37,99,235,0.2)', borderRadius:6, padding:'10px 14px', marginBottom:14, fontSize:12, color:'#475569', lineHeight:1.6 }}>
                Attach the standard shipping documents now if you have them. You can also upload later from <strong style={{ color:'#0f172a' }}>Logistics → SCN detail → Documents</strong>, or the freight forwarder can upload via the supplier portal. Customs clearance and goods receipt may be delayed without these.
              </div>

              {/* Required documents */}
              <div style={{ fontSize:11, fontWeight:600, color:'#94a3b8', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:8 }}>Required documents</div>
              <div style={{ border:'1px solid #dde3ed', borderRadius:6, overflow:'hidden', marginBottom:hasDG?14:18 }}>
                {scnDocs.map((d, i) => {
                  const isMissing = d.status === 'pending';
                  return (
                    <div key={d.id} style={{ display:'grid', gridTemplateColumns:'1.4fr 1fr 110px 130px', gap:10, padding:'10px 14px', borderBottom: i<scnDocs.length-1?'1px solid #f0f3f9':'none', alignItems:'center', background: isMissing && d.required ? 'rgba(220,38,38,0.04)' : '#fff' }}>
                      <div>
                        <div style={{ fontSize:13, fontWeight:500, color:'#0f172a' }}>{d.type}{d.required && <span style={{ marginLeft:6, fontSize:9, color:'#dc2626', fontWeight:700 }}>REQ</span>}</div>
                        <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:11, color:'#94a3b8', marginTop:2 }}>{d.file || <span style={{ fontStyle:'italic' }}>— Not uploaded —</span>}</div>
                      </div>
                      <div style={{ fontSize:11, color:'#94a3b8' }}>{d.uploadedBy ? <>{d.uploadedBy} <span style={{ color:'#c4cedf' }}>· {d.size}</span></> : '—'}</div>
                      <div>
                        {isMissing
                          ? <span style={{ fontSize:10, fontWeight:600, color: d.required?'#dc2626':'#94a3b8', background: d.required?'rgba(220,38,38,0.10)':'#f0f3f9', padding:'2px 8px', borderRadius:9999 }}>{d.required?'Missing':'Optional'}</span>
                          : <span style={{ fontSize:10, fontWeight:600, color:'#16a34a', background:'rgba(22,163,74,0.10)', padding:'2px 8px', borderRadius:9999 }}>Uploaded</span>}
                      </div>
                      <div style={{ display:'flex', gap:4, justifyContent:'flex-end' }}>
                        {isMissing
                          ? <button onClick={()=>handleDocUpload(d.id, false)} style={{ background:'#2563eb', border:'none', color:'#fff', fontSize:11, fontWeight:500, padding:'4px 12px', borderRadius:4, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>↑ Upload</button>
                          : <>
                              <button title="Preview" style={{ background:'#f4f7fb', border:'1px solid #c4cedf', color:'#475569', fontSize:11, padding:'3px 9px', borderRadius:4, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>👁</button>
                              <button onClick={()=>handleDocUpload(d.id, false)} title="Replace" style={{ background:'#f4f7fb', border:'1px solid #c4cedf', color:'#475569', fontSize:11, padding:'3px 9px', borderRadius:4, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>⟳</button>
                            </>}
                      </div>
                    </div>);
                })}
              </div>

              {/* DG documents — only if any package is DG */}
              {hasDG && (
                <>
                  <div style={{ fontSize:11, fontWeight:700, color:'#dc2626', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:8 }}>⚠ Dangerous Goods documents (required — one or more packages flagged DG)</div>
                  <div style={{ border:'1px solid rgba(220,38,38,0.25)', borderRadius:6, overflow:'hidden', marginBottom:14 }}>
                    {scnDgDocs.map((d, i) => {
                      const isMissing = d.status === 'pending';
                      return (
                        <div key={d.id} style={{ display:'grid', gridTemplateColumns:'1.4fr 1fr 110px 130px', gap:10, padding:'10px 14px', borderBottom: i<scnDgDocs.length-1?'1px solid #f0f3f9':'none', alignItems:'center', background: isMissing ? 'rgba(220,38,38,0.04)' : 'rgba(220,38,38,0.02)' }}>
                          <div>
                            <div style={{ fontSize:13, fontWeight:500, color:'#dc2626' }}>{d.type}<span style={{ marginLeft:6, fontSize:9, color:'#dc2626', fontWeight:700 }}>REQ</span></div>
                            <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:11, color:'#94a3b8', marginTop:2 }}>{d.file || <span style={{ fontStyle:'italic' }}>— Not uploaded —</span>}</div>
                          </div>
                          <div style={{ fontSize:11, color:'#94a3b8' }}>{d.uploadedBy ? <>{d.uploadedBy} <span style={{ color:'#c4cedf' }}>· {d.size}</span></> : '—'}</div>
                          <div>
                            <span style={{ fontSize:10, fontWeight:600, color: isMissing?'#dc2626':'#16a34a', background: isMissing?'rgba(220,38,38,0.10)':'rgba(22,163,74,0.10)', padding:'2px 8px', borderRadius:9999 }}>{isMissing?'Missing':'Uploaded'}</span>
                          </div>
                          <div style={{ display:'flex', gap:4, justifyContent:'flex-end' }}>
                            {isMissing
                              ? <button onClick={()=>handleDocUpload(d.id, true)} style={{ background:'#dc2626', border:'none', color:'#fff', fontSize:11, fontWeight:500, padding:'4px 12px', borderRadius:4, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>↑ Upload</button>
                              : <>
                                  <button title="Preview" style={{ background:'#f4f7fb', border:'1px solid #c4cedf', color:'#475569', fontSize:11, padding:'3px 9px', borderRadius:4, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>👁</button>
                                  <button onClick={()=>handleDocUpload(d.id, true)} title="Replace" style={{ background:'#f4f7fb', border:'1px solid #c4cedf', color:'#475569', fontSize:11, padding:'3px 9px', borderRadius:4, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>⟳</button>
                                </>}
                          </div>
                        </div>);
                    })}
                  </div>
                </>
              )}

              {/* Bulk add */}
              <div style={{ padding:'12px 14px', background:'#f8fafd', border:'1px dashed #c4cedf', borderRadius:6, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                <div style={{ fontSize:12, color:'#475569' }}>
                  <strong style={{ color:'#0f172a' }}>Other documents?</strong>
                  <span style={{ color:'#94a3b8', marginLeft:6 }}>Forwarder release, customs entry, photos, supplier CoC, etc.</span>
                </div>
                <button onClick={()=>window.__qmatPickFile && window.__qmatPickFile({accept:'.pdf,.xlsx,.docx,.jpg,.png', multiple:true, onPicked:(files)=>{ if(window.__qmatToast) window.__qmatToast(`${files.length} additional document${files.length===1?'':'s'} attached to SCN`, 'success'); }})} style={{ background:'#2563eb', border:'none', color:'#fff', padding:'7px 16px', fontSize:12, fontWeight:500, borderRadius:5, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif', whiteSpace:'nowrap' }}>↑ Add document(s)</button>
              </div>
            </div>
          )}

          {/* Step 5: Confirm */}
          {step===5 && (
            <div>
              <div style={{ background:'rgba(37,99,235,0.06)', border:'1px solid rgba(37,99,235,0.2)', borderRadius:8, padding:'14px', marginBottom:14 }}>
                <div style={{ fontSize:13, fontWeight:600, color:'#2563eb', marginBottom:8 }}>SCN summary</div>
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                  {[['PO',po?.ref],['Mode',{sea:'Sea freight',air:'Air freight',road:'Road / Truck',rail:'Rail',courier:'Courier',multi:'Multi-modal'}[scnForm.mode]||'—'],['Origin',scnForm.origin],['Destination',scnForm.destination],['CDD',scnForm.cdd||'—'],['ETD',scnForm.etd||'—'],['ETA',scnForm.eta||'—'],['Forwarder',scnForm.forwarder||'—'],['Incoterms',scnForm.incoterm]].map(([l,v])=>(
                    <div key={l}><div style={{fontSize:10,fontWeight:600,color:'#94a3b8',textTransform:'uppercase',marginBottom:2}}>{l}</div><div style={{fontSize:13,color:'#0f172a'}}>{v}</div></div>
                  ))}
                </div>
              </div>

              {selectedCount > 0 && (
                <>
                  <div style={{ fontSize:11, fontWeight:600, color:'#475569', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:6 }}>PO line items · {selectedCount}</div>
                  {availLines.filter(l=>selectedLines[l.no]).map(l=>{
                    const q = partialQty[l.no] === undefined ? lineAvailable(l) : partialQty[l.no];
                    return (
                      <div key={l.no} style={{ display:'flex', justifyContent:'space-between', padding:'6px 0', borderBottom:'1px solid #f0f3f9', fontSize:12 }}>
                        <span style={{ color:'#0f172a' }}><span style={{ fontFamily:'JetBrains Mono,monospace', color:'#94a3b8', marginRight:8 }}>L{l.no}</span>{l.desc}</span>
                        <span style={{ fontFamily:'JetBrains Mono,monospace', color:'#475569' }}>{q} {l.uom}</span>
                      </div>
                    );
                  })}
                </>
              )}

              {validExtras.length > 0 && (
                <>
                  <div style={{ fontSize:11, fontWeight:600, color:'#b45309', textTransform:'uppercase', letterSpacing:'0.06em', marginTop:14, marginBottom:6 }}>⚠ Additional items · {validExtras.length} <span style={{ fontWeight:400, textTransform:'none', color:'#94a3b8', letterSpacing:0 }}>· not on PO</span></div>
                  {validExtras.map((x, xi)=>(
                    <div key={xi} style={{ display:'flex', justifyContent:'space-between', padding:'6px 0', borderBottom:'1px solid #f0f3f9', fontSize:12 }}>
                      <span style={{ color:'#0f172a' }}>
                        <span style={{ background:'rgba(217,119,6,0.12)', color:'#b45309', fontSize:9, fontWeight:600, padding:'1px 6px', borderRadius:3, marginRight:8, letterSpacing:'0.04em' }}>OFF-PO</span>
                        {x.desc}
                        {x.linkedLineNo && <span style={{ marginLeft:8, fontSize:10, color:'#2563eb', fontFamily:'JetBrains Mono,monospace' }}>↳ linked to L{x.linkedLineNo}</span>}
                      </span>
                      <span style={{ fontFamily:'JetBrains Mono,monospace', color:'#475569' }}>{x.qty} {x.uom}</span>
                    </div>
                  ))}
                </>
              )}

              <div style={{ fontSize:12, color:'#475569', marginTop:14, paddingTop:10, borderTop:'1px solid #e8ecf2' }}>Packages: {packages.length} · Total weight: {packages.reduce((s,p)=>s+(parseFloat(p.weight)||0),0).toFixed(0)} kg</div>
            </div>
          )}
        </div>

        {/* Footer */}
        <div style={{ display:'flex', justifyContent:'space-between', padding:'12px 20px', borderTop:'1px solid #e8ecf2', background:'#f8fafc', flexShrink:0 }}>
          <button onClick={()=>step>1?setStep(s=>s-1):onClose()} style={{ padding:'7px 16px', borderRadius:6, border:'1px solid #c4cedf', background:'#fff', fontSize:13, color:'#475569', cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>
            {step>1?'← Back':'Cancel'}
          </button>
          <button
            onClick={()=>step<5?setStep(s=>s+1):onClose()}
            disabled={step===1 && totalSelectedItems===0}
            style={{ padding:'7px 18px', borderRadius:6, border:'none', background: (step===1 && totalSelectedItems===0)?'#c4cedf': step===5 ? '#16a34a' : '#2563eb', fontSize:13, fontWeight:500, color:'#fff', cursor:(step===1 && totalSelectedItems===0)?'default':'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>
            {step<5 ? (step===1?`Next — ${totalSelectedItems} item${totalSelectedItems!==1?'s':''} →`:'Next →') : '✓ Create SCN'}
          </button>
        </div>
      </div>
    </div>
  );
};

// ── Expediting PO Detail Panel ─────────────────────────────────
const ExpPODetailPanel = ({ po, onClose }) => {
  const [showDocs, setShowDocs] = React.useState(false);
  const [showPackages, setShowPackages] = React.useState(null); // scnRef
  const [showCreateSCN, setShowCreateSCN] = React.useState(false);
  const lines = MOCK_EXP_LINES[po.id] || [];

  const lineStatMeta = SCN_LINE_STATUS;

  return (
    <>
      {showDocs && <DocBundlePanel scnRef={lines[0]?.scnRef||'SCN'} poRef={po.ref} onClose={()=>setShowDocs(false)} />}
      {showCreateSCN && <CreateSCNWizard po={po} lines={lines} onClose={()=>setShowCreateSCN(false)} />}

      <div style={{ position:'fixed', inset:0, zIndex:300, display:'flex', justifyContent:'flex-end' }}>
        <div style={{ flex:1, background:'rgba(15,23,42,0.25)' }} onClick={onClose} />
        <div style={{ width:620, background:'#fff', boxShadow:'-8px 0 40px rgba(0,0,0,0.15)', display:'flex', flexDirection:'column', height:'100%', overflowY:'auto' }}>
          {/* Header */}
          <div style={{ padding:'16px 20px', borderBottom:'1px solid #e8ecf2', flexShrink:0, position:'sticky', top:0, background:'#fff', zIndex:10 }}>
            <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between' }}>
              <div>
                <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:12, color:'#94a3b8', marginBottom:4 }}>{po.ref}</div>
                <div style={{ fontSize:16, fontWeight:600, color:'#0f172a', marginBottom:2 }}>{po.vendor}</div>
                <div style={{ fontSize:12, color:'#94a3b8' }}>Owner: {po.owner} · Group: {po.group}</div>
              </div>
              <div style={{ display:'flex', gap:8, alignItems:'center' }}>
                <RAGPill status={po.rag} />
                <button onClick={onClose} style={{ background:'none', border:'none', fontSize:18, color:'#94a3b8', cursor:'pointer' }}>✕</button>
              </div>
            </div>
            <div style={{ display:'flex', gap:8, marginTop:12 }}>
              <button onClick={()=>setShowCreateSCN(true)}
                style={{ background:'#2563eb', border:'none', borderRadius:6, padding:'6px 14px', fontSize:12, fontWeight:500, color:'#fff', cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>
                + Create SCN
              </button>
              <button onClick={()=>setShowDocs(true)}
                style={{ background:'#f4f7fb', border:'1px solid #c4cedf', borderRadius:6, padding:'6px 14px', fontSize:12, color:'#475569', cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>
                📎 Documents
              </button>
            </div>
          </div>

          {/* Milestone timeline */}
          <div style={{ padding:'14px 20px', borderBottom:'1px solid #e8ecf2' }}>
            <div style={{ fontSize:11, fontWeight:600, color:'#94a3b8', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:10 }}>Milestones</div>
            <MilestoneTimeline milestones={po.milestones} compact />
          </div>

          {/* Line items + SCN details */}
          <div style={{ padding:'14px 20px', flex:1 }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
              <div style={{ fontSize:11, fontWeight:600, color:'#94a3b8', letterSpacing:'0.06em', textTransform:'uppercase' }}>Line items</div>
            </div>

            {lines.map((l) => {
              const allocs = l.allocations || [];
              const assigned = lineAssigned(l);
              const available = lineAvailable(l);
              const rollup = lineRollupStatus(l);
              const sm = lineStatMeta[rollup] || lineStatMeta['not-assigned'];
              const pct = l.qty > 0 ? Math.min(100, Math.round((assigned / l.qty) * 100)) : 0;

              return (
                <div key={l.no} style={{ background:'#f8fafc', border:'1px solid #e8ecf2', borderRadius:8, marginBottom:10, overflow:'hidden' }}>
                  {/* Line header */}
                  <div style={{ padding:'10px 14px', background:'#fff', borderBottom: allocs.length ? '1px solid #e8ecf2':'none' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                      <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:11, color:'#94a3b8', flexShrink:0 }}>Line {l.no}</div>
                      <div style={{ flex:1, minWidth:0 }}>

                        <div style={{ fontSize:11, fontFamily:'JetBrains Mono,monospace', color:'#94a3b8', marginTop:1 }}>{l.tag !== '—' ? l.tag+' · ' : ''}WBS {l.wbs} · ROS {l.ros}</div>
                      </div>
                      <span style={{ fontSize:11, fontWeight:600, color:sm.color, background:sm.bg, border:`1px solid ${sm.border}`, padding:'2px 8px', borderRadius:9999, whiteSpace:'nowrap', flexShrink:0 }}>{sm.label}</span>
                    </div>

                    {/* Quantity allocation summary */}
                    <div style={{ marginTop:10, display:'flex', alignItems:'center', gap:14, fontSize:11 }}>
                      <div style={{ display:'flex', gap:14, fontFamily:'JetBrains Mono,monospace' }}>
                        <div><span style={{ color:'#94a3b8' }}>Total </span><span style={{ color:'#0f172a', fontWeight:600 }}>{l.qty} {l.uom}</span></div>
                        <div><span style={{ color:'#94a3b8' }}>Assigned </span><span style={{ color: assigned>0?'#2563eb':'#94a3b8', fontWeight:600 }}>{assigned} {l.uom}</span></div>
                        <div><span style={{ color:'#94a3b8' }}>Available </span><span style={{ color: available>0?'#16a34a':'#94a3b8', fontWeight:600 }}>{available} {l.uom}</span></div>
                      </div>
                      <div style={{ flex:1, height:6, background:'#f0f3f9', borderRadius:3, overflow:'hidden', position:'relative' }}>
                        <div style={{ position:'absolute', left:0, top:0, height:'100%', width:`${pct}%`, background: pct===100 ? '#16a34a' : '#2563eb', transition:'width 200ms' }}></div>
                      </div>
                      {available > 0 && (
                        <button onClick={()=>setShowCreateSCN(true)}
                          style={{ fontSize:11, fontWeight:500, background:'rgba(37,99,235,0.08)', border:'1px solid rgba(37,99,235,0.25)', color:'#2563eb', borderRadius:4, padding:'3px 10px', cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif', whiteSpace:'nowrap' }}>
                          + Assign to SCN
                        </button>
                      )}
                    </div>
                  </div>

                  {/* Per-allocation rows */}
                  {allocs.length > 0 && (
                    <div style={{ padding:'4px 0' }}>
                      {allocs.map((a, ai) => {
                        const scn = MOCK_SCN_DETAIL[a.scn];
                        const ams = lineStatMeta[a.status] || lineStatMeta['not-assigned'];
                        const open = showPackages === `${l.no}::${a.scn}`;
                        return (
                          <div key={ai} style={{ padding:'10px 14px', borderTop: ai>0 ? '1px solid #f0f3f9' : 'none' }}>
                            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8, gap:10 }}>
                              <div style={{ display:'flex', alignItems:'center', gap:10, minWidth:0 }}>
                                <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:12, color:'#2563eb', fontWeight:600 }}>{a.scn}</div>
                                <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:11, color:'#475569' }}>{a.qty} {l.uom}</div>
                                <span style={{ fontSize:10, fontWeight:600, color:ams.color, background:ams.bg, border:`1px solid ${ams.border}`, padding:'1px 7px', borderRadius:9999 }}>{ams.label}</span>
                              </div>
                              <div style={{ display:'flex', gap:6, flexShrink:0 }}>
                                <button onClick={()=>setShowPackages(open?null:`${l.no}::${a.scn}`)}
                                  style={{ fontSize:11, background:'#f4f7fb', border:'1px solid #c4cedf', borderRadius:4, padding:'2px 8px', cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif', color:'#475569' }}>
                                  {open?'Hide':'📦 Packages'}
                                </button>
                                <button onClick={()=>setShowDocs(true)}
                                  style={{ fontSize:11, background:'#f4f7fb', border:'1px solid #c4cedf', borderRadius:4, padding:'2px 8px', cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif', color:'#475569' }}>
                                  📎 Docs
                                </button>
                              </div>
                            </div>
                            {scn && (
                              <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8 }}>
                                {[['ETD',scn.etd],['ETA',scn.eta],['Forwarder',scn.forwarder],['Destination',scn.destination],['Delivery',scn.delivery],['Incoterm','CIF']].map(([lbl,val])=>(
                                  <div key={lbl}>
                                    <div style={{ fontSize:9, fontWeight:600, color:'#94a3b8', textTransform:'uppercase', marginBottom:1 }}>{lbl}</div>
                                    <div style={{ fontSize:12, color:'#0f172a', fontFamily:['ETD','ETA'].includes(lbl)?'JetBrains Mono,monospace':'inherit' }}>{val}</div>
                                  </div>
                                ))}
                              </div>
                            )}
                            {open && scn && (
                              <div style={{ marginTop:10, background:'#fff', border:'1px solid #e8ecf2', borderRadius:6, overflow:'hidden' }}>
                                <div style={{ display:'grid', gridTemplateColumns:'50px 1fr 60px 80px 80px', padding:'5px 12px', background:'#f4f7fb', borderBottom:'1px solid #e8ecf2' }}>
                                  {['#','Type','Qty','Dims','Weight'].map(h=><div key={h} style={{ fontSize:10, fontWeight:600, color:'#94a3b8', letterSpacing:'0.05em', textTransform:'uppercase' }}>{h}</div>)}
                                </div>
                                {[
                                  { no:1, type:'Crate', qty:1, dims:'2.4×1.2×1.8m', weight:'4.2 t' },
                                  { no:2, type:'Crate', qty:1, dims:'2.4×1.2×1.8m', weight:'3.8 t' },
                                  { no:3, type:'Pallet', qty:1, dims:'1.2×1.0×0.6m', weight:'0.4 t' },
                                ].slice(0, scn.packages).map((pkg, pi, arr) => (
                                  <div key={pi} style={{ display:'grid', gridTemplateColumns:'50px 1fr 60px 80px 80px', padding:'7px 12px', borderBottom:pi<arr.length-1?'1px solid #f0f3f9':'none' }}>
                                    <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:11, color:'#94a3b8' }}>PKG-{pkg.no}</div>
                                    <div style={{ fontSize:12, color:'#475569' }}>{pkg.type}</div>
                                    <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:12, color:'#0f172a' }}>{pkg.qty}</div>
                                    <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:11, color:'#475569' }}>{pkg.dims}</div>
                                    <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:11, color:'#475569' }}>{pkg.weight}</div>
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}

                  {allocs.length === 0 && (
                    <div style={{ padding:'8px 14px', fontSize:12, color:'#94a3b8', fontStyle:'italic' }}>
                      No SCN assigned — <span style={{ color:'#2563eb', cursor:'pointer', fontStyle:'normal' }} onClick={()=>setShowCreateSCN(true)}>create SCN</span>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </>
  );
};

// ── VDRL · Upload Documents modal (Supplier) ─────────────────
const VDRLUploadDocumentsModal = ({ docContext, onClose }) => {
  const T = VDRL_TOKENS;
  const [files, setFiles] = React.useState([]); // [{id, name, size, mappedTo, rev, comment}]
  const [drag, setDrag] = React.useState(false);

  const open = MOCK_VDRL_DOCS.filter(d => ['overdue', 'not-submitted', 'resubmit', 'under-review'].includes(d.status));

  const addFiles = (picked) => {
    const arr = picked.map(f => ({
      id: Math.random().toString(36).slice(2, 9),
      name: f.name || f,
      size: f.size != null ? (f.size > 1024 * 1024 ? (f.size / 1024 / 1024).toFixed(1) + ' MB' : (f.size / 1024).toFixed(0) + ' KB') : '— pending',
      mappedTo: docContext ? docContext.no : '',
      rev: docContext ? (docContext.rev || 'R0') : 'R0',
      comment: ''
    }));
    setFiles(f => [...f, ...arr]);
  };
  const pick = () => {
    if (!window.__qmatPickFile) {
      addFiles([{ name: `DRAFT-V101-${Math.floor(Math.random() * 900) + 100}.pdf`, size: 1024 * 700 }]);
      return;
    }
    window.__qmatPickFile({ accept: '.pdf,.dwg,.xlsx,.docx,.jpg,.png', multiple: true, onPicked: addFiles });
  };
  const upd = (id, k, v) => setFiles(f => f.map(x => x.id === id ? { ...x, [k]: v } : x));
  const remove = (id) => setFiles(f => f.filter(x => x.id !== id));
  const mapped = files.filter(f => f.mappedTo).length;

  const submit = () => {
    if (window.__qmatToast) window.__qmatToast(`${files.length} file${files.length === 1 ? '' : 's'} uploaded · ${mapped} mapped to VDRL items · QCO notified`, 'success');
    onClose();
  };

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(15,23,42,0.5)', zIndex: 9999, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background: '#fff', borderRadius: 12, width: 900, maxWidth: '100%', maxHeight: '92vh', display: 'flex', flexDirection: 'column', boxShadow: '0 20px 60px rgba(0,0,0,0.25)' }}>
        <div style={{ padding: '16px 22px', borderBottom: `1px solid ${T.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div>
            <h3 style={{ margin: 0, fontSize: 16, fontWeight: 600, color: T.textPri }}>↑ Upload documents</h3>
            <p style={{ margin: '3px 0 0', fontSize: 12, color: T.textMuted }}>
              {docContext
                ? <>Targeting <strong style={{ color: T.textPri, fontFamily: 'JetBrains Mono,monospace' }}>{docContext.no}</strong> — {docContext.title}</>
                : 'Drop files, then map each to its VDRL item'}
            </p>
          </div>
          <button onClick={onClose} style={{ background: 'transparent', border: 'none', fontSize: 20, color: T.textMuted, cursor: 'pointer' }}>×</button>
        </div>

        <div style={{ padding: 22, overflowY: 'auto', flex: 1 }}>
          {/* Drop zone */}
          <div
            onClick={pick}
            onDragOver={(e) => { e.preventDefault(); setDrag(true); }}
            onDragLeave={() => setDrag(false)}
            onDrop={(e) => { e.preventDefault(); setDrag(false); addFiles(Array.from(e.dataTransfer.files)); }}
            style={{ padding: '32px 22px', border: `2px dashed ${drag ? T.primaryDark : T.primary}`, borderRadius: 10, textAlign: 'center', cursor: 'pointer', background: drag ? T.primaryLight : '#fff', transition: 'all 120ms', marginBottom: 16 }}>

const ExpeditingScreen = () => {

  const ExpSortHdr = ({ label, field, align }) => <SortableHeader label={label} field={field} sortField={expSortField} sortDir={expSortDir} toggleSort={expToggleSort} align={align} />;
  const [groupBy, setGroupBy] = React.useState('none');

  const [rosTo, setRosTo] = React.useState('');

  const ragOrder = { red: 0, amber: 1, green: 2, blue: 3, grey: 4 };
  const rowBg = { red: 'rgba(220,38,38,0.04)', amber: 'rgba(217,119,6,0.04)', green: 'rgba(22,163,74,0.03)' };
  const rowBorder = { red: '#ef4444', amber: '#f59e0b', green: '#22c55e', grey: '#c4cedf', blue: '#2563eb' };

  // Parse "DD Mon YYYY" → Date
  const parseROS = (str) => {
    if (!str || str === 'TBD' || str === '—') return null;
    const months = { Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11 };
    const parts = str.trim().split(' ');
    if (parts.length >= 3) {
      const d = parseInt(parts[0]),m = months[parts[1]],y = parseInt(parts[2]);
      if (!isNaN(d) && m !== undefined && !isNaN(y)) return new Date(y, m, d);
    }
    return null;
  };

  const rosActive = rosFrom || rosTo;

  const filtered = MOCK_EXP_POS.
  filter((p) => {
    if (criticalOnly && !critical.isCritical(p.ref)) return false;
    if (view === 'ongoing' && p.status !== 'ongoing') return false;
    if (view === 'complete' && p.status !== 'complete') return false;
    if (ragFilter !== 'all' && p.rag !== ragFilter) return false;
    if (rosActive) {
      const rosD = parseROS(p.rosDate);
      if (!rosD) return false;
      if (rosFrom && rosD < new Date(rosFrom)) return false;
      if (rosTo && rosD > new Date(rosTo)) return false;
    }
    if (search) {
      const q = search.toLowerCase();
      return p.ref.toLowerCase().includes(q) || p.vendor.toLowerCase().includes(q) || p.material.toLowerCase().includes(q) || p.wbs.includes(q) || p.tag && p.tag.toLowerCase().includes(q);

    const map = {};
    filtered.forEach((p) => {
      const k = groupBy === 'material' ? p.material.split('—')[0].trim() : p[key];
      if (!map[k]) map[k] = [];

    </div>;

                <div><label style={labelStyle}>Description (optional)</label><input style={inputStyle} placeholder="Brief scope note" /></div>

            </div>
          }

          {/* ── Step: manual-lines ── */}
          {step === 'manual-lines' &&
          <div style={{ padding: '20px' }}>
              {/* Add line form */}
              <div style={{ background: '#f4f7fb', border: '1px solid #dde3ed', borderRadius: 10, padding: '14px 16px', marginBottom: 14 }}>

                    value={newLine.desc || newLine.tag}
                    onChange={(v) => setNL('desc', v)}
