};

// ── Add Supplier Modal — full registration form ──
const AddSupplierModal = ({ onClose, onSave, nextCode }) => {
  const [step, setStep] = React.useState(1);
  const [form, setForm] = React.useState({
    code: nextCode, name: '', avl: 'Pending', tradingName: '', abn: '', country: 'Australia', website: '',
    categories: [], otherCategory: '',
    contactName: '', contactRole: '', contactEmail: '', contactPhone: '',
    pickupLocations: [{ id: 1, label: 'Head office / primary', addressLine: '', city: '', state: '', postcode: '', country: 'Australia', contactName: '', contactPhone: '', hours: '', notes: '', primary: true }],
    iso9001: false, iso14001: false, iso45001: false, api: false, asme: false, ce: false,
    insuranceExpiry: '', rating: '3', paymentTerms: 'NET 30', leadTimeDays: '',
    notes: ''
  });
  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));
  const toggleCat = (c) => setForm((f) => ({ ...f, categories: f.categories.includes(c) ? f.categories.filter((x) => x !== c) : [...f.categories, c] }));
  const updateLoc = (id, k, v) => setForm((f) => ({ ...f, pickupLocations: f.pickupLocations.map((l) => l.id === id ? { ...l, [k]: v } : l) }));
  const addLoc = () => setForm((f) => ({ ...f, pickupLocations: [...f.pickupLocations, { id: Date.now(), label: `Pickup location ${f.pickupLocations.length + 1}`, addressLine: '', city: '', state: '', postcode: '', country: f.country || 'Australia', contactName: '', contactPhone: '', hours: '', notes: '', primary: false }] }));
  const removeLoc = (id) => setForm((f) => {
    if (f.pickupLocations.length === 1) return f;
    const remaining = f.pickupLocations.filter((l) => l.id !== id);
    if (!remaining.some((l) => l.primary)) remaining[0].primary = true;
    return { ...f, pickupLocations: remaining };
  });
  const setPrimary = (id) => setForm((f) => ({ ...f, pickupLocations: f.pickupLocations.map((l) => ({ ...l, primary: l.id === id })) }));

  const CATEGORIES = ['Instrumentation', 'Control valves', 'Rotating equipment', 'Pumps', 'Compressors', 'Heat exchangers', 'Vessels & tanks', 'Piping & fittings', 'Structural steel', 'Plate', 'OCTG / Line pipe', 'HV switchgear', 'Transformers', 'MV/LV cable', 'Motors', 'PLC / DCS', 'Electrical accessories', 'Civil materials', 'Painting & coatings', 'Insulation'];

  const valid1 = form.code.trim() && form.name.trim() && form.country;
  const valid2 = form.categories.length > 0 || form.otherCategory.trim();
  const valid3 = form.contactName.trim() && form.contactEmail.trim();
  const canSave = valid1 && valid2 && valid3;

  const Lbl = ({ children, req }) => <label style={{ fontSize: 11, fontWeight: 500, color: '#475569', marginBottom: 4, display: 'block' }}>{children}{req && <span style={{ color: '#ef4444', marginLeft: 2 }}>*</span>}</label>;
  const inp = { width: '100%', padding: '7px 10px', fontSize: 13, border: '1px solid #c4cedf', borderRadius: 5, background: '#fff', fontFamily: 'IBM Plex Sans,sans-serif', color: '#0f172a', outline: 'none', boxSizing: 'border-box' };

  const handleSubmit = () => {
    const cats = [...form.categories, form.otherCategory.trim()].filter(Boolean).join(', ');
    const locCount = form.pickupLocations.filter((l) => l.addressLine.trim() || l.city.trim()).length;
    onSave({
      code: form.code, name: form.name, avl: form.avl, categories: cats,
      contact: form.contactEmail, locations: locCount,
      _full: form
    });
  };

  const Step = ({ n, label }) => {
    const active = step === n; const done = step > n;
    return <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 6, padding: '4px 8px', borderRadius: 5, background: active ? 'rgba(37,99,235,0.1)' : 'transparent' }}>
      <div style={{ width: 18, height: 18, borderRadius: '50%', background: done ? '#16a34a' : active ? '#2563eb' : '#c4cedf', color: '#fff', fontSize: 10, fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{done ? '✓' : n}</div>
      <span style={{ fontSize: 12, color: active ? '#2563eb' : done ? '#16a34a' : '#94a3b8', fontWeight: active ? 600 : 400 }}>{label}</span>
    </div>;
  };

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(15,23,42,0.5)', zIndex: 9999, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }} onClick={onClose}>
      <div style={{ background: '#fff', borderRadius: 10, width: 820, maxWidth: '100%', maxHeight: '92vh', display: 'flex', flexDirection: 'column', boxShadow: '0 12px 40px rgba(15,23,42,0.25)' }} onClick={(e) => e.stopPropagation()}>
        <div style={{ padding: '16px 22px', borderBottom: '1px solid #e8ecf2', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div>
            <h3 style={{ margin: 0, fontSize: 16, fontWeight: 600, color: '#0f172a' }}>Add supplier to AVL</h3>
            <p style={{ margin: '3px 0 0', fontSize: 12, color: '#94a3b8' }}>Step {step} of 4 · {step === 1 ? 'Company details' : step === 2 ? 'Categories & capability' : step === 3 ? 'Contact & address' : 'Compliance & commercial'}</p>
          </div>
          <button onClick={onClose} style={{ background: 'transparent', border: 'none', fontSize: 18, color: '#94a3b8', cursor: 'pointer' }}>×</button>
        </div>

        <div style={{ padding: '10px 22px', borderBottom: '1px solid #e8ecf2', background: '#f8fafd', display: 'flex', gap: 6 }}>
          <Step n={1} label="Company" />
          <Step n={2} label="Categories" />
          <Step n={3} label="Contact" />
          <Step n={4} label="Compliance" />
        </div>

        <div style={{ padding: 22, overflowY: 'auto', flex: 1 }}>
          {step === 1 &&
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
            <div><Lbl req>Supplier code</Lbl><input style={{ ...inp, fontFamily: 'JetBrains Mono,monospace' }} value={form.code} onChange={(e) => set('code', e.target.value.toUpperCase())} /></div>
            <div><Lbl req>AVL status</Lbl><select style={inp} value={form.avl} onChange={(e) => set('avl', e.target.value)}><option>Pending</option><option>Approved</option><option>Conditional</option><option>Rejected</option></select></div>
            <div style={{ gridColumn: 'span 2' }}><Lbl req>Legal entity name</Lbl><input style={inp} value={form.name} onChange={(e) => set('name', e.target.value)} placeholder="e.g. Emerson Process Management Pty Ltd" /></div>
            <div><Lbl>Trading name</Lbl><input style={inp} value={form.tradingName} onChange={(e) => set('tradingName', e.target.value)} placeholder="If different" /></div>
            <div><Lbl>ABN / Tax ID</Lbl><input style={{ ...inp, fontFamily: 'JetBrains Mono,monospace' }} value={form.abn} onChange={(e) => set('abn', e.target.value)} placeholder="00 000 000 000" /></div>
            <div><Lbl req>Country</Lbl><select style={inp} value={form.country} onChange={(e) => set('country', e.target.value)}><option>Australia</option><option>Singapore</option><option>Japan</option><option>South Korea</option><option>China</option><option>Germany</option><option>Italy</option><option>France</option><option>UK</option><option>USA</option><option>UAE</option><option>India</option><option>Other</option></select></div>
            <div><Lbl>Website</Lbl><input style={inp} value={form.website} onChange={(e) => set('website', e.target.value)} placeholder="https://" /></div>
          </div>}

          {step === 2 &&
          <div>
            <Lbl req>Supply categories <span style={{ color: '#94a3b8', fontWeight: 400 }}>· tick all that apply</span></Lbl>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 14 }}>
              {CATEGORIES.map((c) => {
                const on = form.categories.includes(c);
                return <button key={c} onClick={() => toggleCat(c)} style={{ padding: '5px 10px', fontSize: 12, borderRadius: 14, border: on ? '1px solid #2563eb' : '1px solid #c4cedf', background: on ? 'rgba(37,99,235,0.08)' : '#fff', color: on ? '#2563eb' : '#475569', cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif', fontWeight: on ? 500 : 400 }}>{on ? '✓ ' : ''}{c}</button>;
              })}
            </div>
            <Lbl>Other / write-in</Lbl>
            <input style={inp} value={form.otherCategory} onChange={(e) => set('otherCategory', e.target.value)} placeholder="Comma-separated additional capabilities" />
            <div style={{ marginTop: 14, padding: '10px 12px', background: '#f8fafd', border: '1px solid #e8ecf2', borderRadius: 6, fontSize: 12, color: '#64748b' }}>
              <strong style={{ color: '#0f172a' }}>{form.categories.length}</strong> categor{form.categories.length === 1 ? 'y' : 'ies'} selected{form.otherCategory.trim() ? ' + write-in' : ''}.
            </div>
          </div>}

          {step === 3 &&
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
            <div style={{ gridColumn: 'span 2', fontSize: 11, fontWeight: 600, color: '#94a3b8', letterSpacing: '0.06em', textTransform: 'uppercase' }}>Primary contact</div>
            <div><Lbl req>Contact name</Lbl><input style={inp} value={form.contactName} onChange={(e) => set('contactName', e.target.value)} /></div>
            <div><Lbl>Role / title</Lbl><input style={inp} value={form.contactRole} onChange={(e) => set('contactRole', e.target.value)} placeholder="e.g. Sales Manager" /></div>
            <div><Lbl req>Email</Lbl><input style={inp} type="email" value={form.contactEmail} onChange={(e) => set('contactEmail', e.target.value)} placeholder="contact@vendor.com" /></div>
            <div><Lbl>Phone</Lbl><input style={inp} value={form.contactPhone} onChange={(e) => set('contactPhone', e.target.value)} placeholder="+61 ..." /></div>
            <div style={{ gridColumn: 'span 2', display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 8 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: '#94a3b8', letterSpacing: '0.06em', textTransform: 'uppercase' }}>Pickup locations <span style={{ color: '#64748b', fontWeight: 400, textTransform: 'none', letterSpacing: 0 }}>· add as many as the supplier ships from</span></div>
              <button onClick={addLoc} style={{ background: 'rgba(37,99,235,0.08)', border: '1px solid rgba(37,99,235,0.3)', color: '#2563eb', borderRadius: 5, padding: '4px 10px', fontSize: 12, fontWeight: 500, cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif' }}>+ Add pickup location</button>
            </div>
            <div style={{ gridColumn: 'span 2', display: 'flex', flexDirection: 'column', gap: 10 }}>
              {form.pickupLocations.map((loc, idx) =>
              <div key={loc.id} style={{ border: loc.primary ? '1px solid rgba(37,99,235,0.4)' : '1px solid #dde3ed', borderRadius: 8, background: loc.primary ? 'rgba(37,99,235,0.03)' : '#fafbfc', padding: '12px 14px' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
                  <div style={{ width: 22, height: 22, borderRadius: '50%', background: loc.primary ? '#2563eb' : '#c4cedf', color: '#fff', fontSize: 11, fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>{idx + 1}</div>
                  <input value={loc.label} onChange={(e) => updateLoc(loc.id, 'label', e.target.value)} placeholder="Location label (e.g. Houston factory)" style={{ flex: 1, padding: '5px 8px', fontSize: 13, fontWeight: 600, color: '#0f172a', border: '1px solid transparent', background: 'transparent', borderRadius: 4, outline: 'none', fontFamily: 'IBM Plex Sans,sans-serif' }} onFocus={(e) => { e.target.style.background = '#fff'; e.target.style.borderColor = '#c4cedf'; }} onBlur={(e) => { e.target.style.background = 'transparent'; e.target.style.borderColor = 'transparent'; }} />
                  {loc.primary ? <span style={{ fontSize: 10, fontWeight: 600, color: '#2563eb', background: 'rgba(37,99,235,0.1)', padding: '2px 8px', borderRadius: 10, letterSpacing: '0.04em', textTransform: 'uppercase' }}>Primary</span> : <button onClick={() => setPrimary(loc.id)} style={{ fontSize: 11, color: '#64748b', background: 'transparent', border: '1px solid #c4cedf', borderRadius: 10, padding: '2px 8px', cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif' }}>Set primary</button>}
                  {form.pickupLocations.length > 1 && <button onClick={() => removeLoc(loc.id)} title="Remove location" style={{ width: 22, height: 22, border: '1px solid #fecaca', borderRadius: 5, background: '#fef2f2', color: '#dc2626', fontSize: 13, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>×</button>}
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: '1.6fr 1fr 1fr 0.8fr', gap: 8, marginBottom: 8 }}>
                  <div><Lbl>Street address</Lbl><input style={inp} value={loc.addressLine} onChange={(e) => updateLoc(loc.id, 'addressLine', e.target.value)} placeholder="Lot / street" /></div>
                  <div><Lbl>City</Lbl><input style={inp} value={loc.city} onChange={(e) => updateLoc(loc.id, 'city', e.target.value)} /></div>
                  <div><Lbl>State / region</Lbl><input style={inp} value={loc.state} onChange={(e) => updateLoc(loc.id, 'state', e.target.value)} /></div>
                  <div><Lbl>Postcode</Lbl><input style={inp} value={loc.postcode} onChange={(e) => updateLoc(loc.id, 'postcode', e.target.value)} /></div>
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.2fr 1fr 1.2fr', gap: 8 }}>
                  <div><Lbl>Country</Lbl><select style={inp} value={loc.country} onChange={(e) => updateLoc(loc.id, 'country', e.target.value)}><option>Australia</option><option>Singapore</option><option>Japan</option><option>South Korea</option><option>China</option><option>Germany</option><option>Italy</option><option>France</option><option>UK</option><option>USA</option><option>UAE</option><option>India</option><option>Other</option></select></div>
                  <div><Lbl>Site contact</Lbl><input style={inp} value={loc.contactName} onChange={(e) => updateLoc(loc.id, 'contactName', e.target.value)} placeholder="Logistics / shipping coord." /></div>
                  <div><Lbl>Contact phone</Lbl><input style={inp} value={loc.contactPhone} onChange={(e) => updateLoc(loc.id, 'contactPhone', e.target.value)} placeholder="+..." /></div>
                  <div><Lbl>Pickup hours</Lbl><input style={inp} value={loc.hours} onChange={(e) => updateLoc(loc.id, 'hours', e.target.value)} placeholder="e.g. Mon–Fri 08:00–16:00" /></div>
                </div>
                <div style={{ marginTop: 8 }}><Lbl>Notes <span style={{ color: '#94a3b8', fontWeight: 400 }}>· access procedures, dock numbers, restricted hours, DG handling…</span></Lbl><input style={inp} value={loc.notes} onChange={(e) => updateLoc(loc.id, 'notes', e.target.value)} placeholder="e.g. Use Dock 3, photo ID required, forklift available on request" /></div>
              </div>
              )}
              <div style={{ fontSize: 11, color: '#94a3b8', marginTop: 2 }}>{form.pickupLocations.length} pickup location{form.pickupLocations.length === 1 ? '' : 's'} on file. Forwarders will be able to choose any of these when issuing an SCN against this supplier.</div>
            </div>
          </div>}

          {step === 4 &&
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: '#94a3b8', letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 8 }}>Certifications held</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8, marginBottom: 16 }}>
              {[['iso9001', 'ISO 9001 — Quality'], ['iso14001', 'ISO 14001 — Environment'], ['iso45001', 'ISO 45001 — H&S'], ['api', 'API Q1 / API Spec'], ['asme', 'ASME stamp'], ['ce', 'CE / PED']].map(([k, l]) =>

            <button onClick={onClose} style={{ padding: '7px 14px', borderRadius: 6, border: '1px solid #c4cedf', background: '#fff', fontSize: 13, color: '#475569', cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif' }}>Cancel</button>

            {step === 4 && <button onClick={handleSubmit} disabled={!canSave} style={{ padding: '7px 16px', borderRadius: 6, border: 'none', background: canSave ? '#16a34a' : '#c4cedf', fontSize: 13, fontWeight: 600, color: '#fff', cursor: canSave ? 'pointer' : 'not-allowed', fontFamily: 'IBM Plex Sans,sans-serif' }}>✓ Add supplier</button>}
          </div>
        </div>
      </div>
    </div>);

};

  { ref: 'SCN-2024-0048', kind: 'Shipment', source: 'Sulzer Pumps', poRef: 'PO-2024-0156', desc: 'Centrifugal pump skid P-2030 A/B', qty: '2 packages', wbs: '02.02.01', destination: 'WH-B · Secure Store', eta: '07 May 2026', status: 'Arrived', mode: 'Road', priority: 'High' },
  { ref: 'SCN-2024-0049', kind: 'Shipment', source: 'Prysmian Group', poRef: 'PO-2024-0089', desc: 'MV cable drums × 4 — 11kV XLPE', qty: '4 drums', wbs: '04.01.01', destination: 'WH-C · Cable Store', eta: '09 May 2026', status: 'In transit', mode: 'Road', priority: 'Normal' },
  { ref: 'SCN-2024-0050', kind: 'Shipment', source: 'BlueScope Steel', poRef: 'PO-2024-0072', desc: 'Structural steel UB310 — Lot 4', qty: '24 bundles', wbs: '01.02.01', destination: 'WH-A · Laydown North', eta: '10 May 2026', status: 'In transit', mode: 'Road', priority: 'Normal' },
  { ref: 'TRF-2025-0087', kind: 'Transfer', source: 'WH-B · B-01-02', poRef: '—', desc: 'Stainless steel pipe 316L · 2"', qty: '50 m', wbs: '03.02.04', destination: 'WH-A · A-04-05', eta: '07 May 2026', status: 'Picked up', mode: 'Forklift', priority: 'Normal' },
  { ref: 'TRF-2025-0088', kind: 'Transfer', source: 'WH-A · A-07-01', poRef: '—', desc: 'Gate valve DN400 ANSI 900# × 10', qty: '10 EA', wbs: '03.01.02', destination: 'Site laydown · Area 3', eta: '08 May 2026', status: 'In transit', mode: 'Truck', priority: 'High' },
  { ref: 'SCN-2024-0051', kind: 'Shipment', source: 'Pentair Valves', poRef: 'PO-2024-0098', desc: 'Check valves DN300 ANSI 600# × 24', qty: '6 crates', wbs: '03.01.03', destination: 'WH-B · Secure Store', eta: '12 May 2026', status: 'Customs', mode: 'Sea freight', priority: 'Normal' }
];

const PendingReceiptsRegister = ({ onReceipt }) => {
  const [view, setView] = React.useState('all');
  const [search, setSearch] = React.useState('');
  const [filterDest, setFilterDest] = React.useState('All');
  const dests = ['All', ...new Set(PENDING_RECEIPTS.map(r => r.destination.split(' · ')[0]))];

  const counts = {
    all: PENDING_RECEIPTS.length,
    arrived: PENDING_RECEIPTS.filter(r => r.status === 'Arrived').length,
    transit: PENDING_RECEIPTS.filter(r => r.status === 'In transit' || r.status === 'Picked up').length,
    customs: PENDING_RECEIPTS.filter(r => r.status === 'Customs').length,
    shipments: PENDING_RECEIPTS.filter(r => r.kind === 'Shipment').length,
    transfers: PENDING_RECEIPTS.filter(r => r.kind === 'Transfer').length
  };

  const filtered = PENDING_RECEIPTS.filter(r => {
    if (view === 'arrived' && r.status !== 'Arrived') return false;
    if (view === 'transit' && r.status !== 'In transit' && r.status !== 'Picked up') return false;
    if (view === 'customs' && r.status !== 'Customs') return false;
    if (view === 'shipments' && r.kind !== 'Shipment') return false;
    if (view === 'transfers' && r.kind !== 'Transfer') return false;
    if (filterDest !== 'All' && !r.destination.startsWith(filterDest)) return false;
    if (search) {
      const q = search.toLowerCase();
      if (!(r.ref.toLowerCase().includes(q) || r.desc.toLowerCase().includes(q) || r.source.toLowerCase().includes(q) || r.wbs.includes(q) || (r.poRef && r.poRef.toLowerCase().includes(q)))) return false;
    }
    return true;
  });

  const statusMeta = {
    'Arrived': { color: '#16a34a', bg: 'rgba(22,163,74,0.10)', label: '● Arrived — ready to receipt' },
    'In transit': { color: '#2563eb', bg: 'rgba(37,99,235,0.10)', label: '↗ In transit' },
    'Picked up': { color: '#d97706', bg: 'rgba(217,119,6,0.10)', label: '◆ Picked up' },
    'Customs': { color: '#7c3aed', bg: 'rgba(124,58,237,0.10)', label: '⏸ Customs hold' }
  };

  const Tab = ({ id, label, count }) => <button onClick={()=>setView(id)} style={{ padding: '8px 14px', fontSize: 13, fontWeight: view===id?600:400, color: view===id?'#2563eb':'#475569', borderBottom: view===id?'2px solid #2563eb':'2px solid transparent', background: 'none', border: 'none', cursor: 'pointer', display: 'flex', gap: 6, alignItems: 'center', fontFamily: 'IBM Plex Sans,sans-serif' }}>
    {label} <span style={{ fontSize: 11, fontFamily: 'JetBrains Mono,monospace', padding: '1px 6px', borderRadius: 9999, background: view===id?'rgba(37,99,235,0.10)':'#f0f3f9', color: view===id?'#2563eb':'#94a3b8' }}>{count}</span>
  </button>;

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 12 }}>
        <div>
          <h2 style={{ fontSize: 20, fontWeight: 600, color: '#0f172a', letterSpacing: '-0.02em', margin: 0 }}>Pending Receipt</h2>
          <p style={{ fontSize: 13, color: '#94a3b8', margin: '3px 0 0' }}>{filtered.length} incoming shipments &amp; transfers awaiting receipt · Pilbara Gas Processing Plant</p>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button style={{ background: '#f4f7fb', border: '1px solid #c4cedf', borderRadius: 6, padding: '6px 14px', fontSize: 12, color: '#475569', cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif' }}>↓ Export</button>
        </div>
      </div>

      {/* KPI strip */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 8, marginBottom: 14 }}>
        {[
          { label: 'Arrived — ready', value: counts.arrived, color: '#16a34a' },
          { label: 'In transit / picked up', value: counts.transit, color: '#2563eb' },
          { label: 'Customs hold', value: counts.customs, color: '#7c3aed' },
          { label: 'Total awaiting', value: counts.all, color: '#0f172a' }
        ].map(s => <div key={s.label} style={{ background: '#fff', border: '1px solid #dde3ed', borderRadius: 8, padding: '10px 14px' }}>
          <div style={{ fontSize: 22, fontWeight: 600, fontFamily: 'JetBrains Mono,monospace', color: s.color, lineHeight: 1 }}>{s.value}</div>
          <div style={{ fontSize: 11, color: '#94a3b8', marginTop: 3 }}>{s.label}</div>
        </div>)}
      </div>

      {/* Tabs */}
      <div style={{ display: 'flex', borderBottom: '1px solid #dde3ed', marginBottom: 12, background: '#fff', border: '1px solid #dde3ed', borderRadius: '8px 8px 0 0' }}>
        <Tab id="all" label="All" count={counts.all} />
        <Tab id="arrived" label="Arrived" count={counts.arrived} />
        <Tab id="transit" label="In transit" count={counts.transit} />
        <Tab id="customs" label="Customs" count={counts.customs} />
        <Tab id="shipments" label="Shipments" count={counts.shipments} />
        <Tab id="transfers" label="Transfers" count={counts.transfers} />
      </div>

      {/* Filters */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 12, alignItems: 'center' }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search ref, item, vendor, PO, WBS…"
          style={{ flex: 1, background: '#fff', border: '1px solid #c4cedf', borderRadius: 6, padding: '5px 10px', fontSize: 12, color: '#0f172a', outline: 'none', fontFamily: 'IBM Plex Sans,sans-serif', height: 30 }} />
        <span style={{ fontSize: 11, color: '#94a3b8' }}>Destination</span>
        <select value={filterDest} onChange={e=>setFilterDest(e.target.value)} style={{ height: 30, padding: '0 10px', fontSize: 12, border: '1px solid #c4cedf', borderRadius: 6, background: '#fff', color: '#475569', fontFamily: 'IBM Plex Sans,sans-serif', outline: 'none' }}>
          {dests.map(d => <option key={d}>{d}</option>)}
        </select>
      </div>

      {/* Table */}
      <div style={{ background: '#fff', border: '1px solid #dde3ed', borderRadius: 10, overflow: 'hidden' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '120px 80px 1.2fr 90px 100px 1fr 110px 130px 90px', gap: 8, padding: '8px 14px', background: '#f4f7fb', borderBottom: '1px solid #dde3ed' }}>
          {['Reference','Type','Item / description','Qty','WBS','Source / vendor','ETA','Destination','Status'].map(h => <div key={h} style={{ fontSize: 10, fontWeight: 600, color: '#94a3b8', letterSpacing: '0.06em', textTransform: 'uppercase' }}>{h}</div>)}
        </div>
        {filtered.length === 0 && <div style={{ padding: '24px', textAlign: 'center', fontSize: 12, color: '#94a3b8' }}>No incoming items match these filters.</div>}
        {filtered.map((r, i) => {
          const meta = statusMeta[r.status];
          const arrived = r.status === 'Arrived';
          return <div key={r.ref} style={{ display: 'grid', gridTemplateColumns: '120px 80px 1.2fr 90px 100px 1fr 110px 130px 90px', gap: 8, padding: '11px 14px', borderBottom: i < filtered.length - 1 ? '1px solid #e8ecf2' : 'none', alignItems: 'center', cursor: 'pointer', transition: 'background 120ms' }}
            onMouseEnter={e=>e.currentTarget.style.background='#f8fafc'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}
            onClick={()=>arrived && onReceipt && onReceipt(r)}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
              <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 11, color: '#2563eb', fontWeight: 500 }}>{r.ref}</span>
              {r.poRef !== '—' && <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, color: '#94a3b8' }}>{r.poRef}</span>}
              {r.priority === 'High' && <span style={{ fontSize: 9, fontWeight: 600, color: '#dc2626', letterSpacing: '0.05em' }}>HIGH PRIORITY</span>}
            </div>
            <div><span style={{ fontSize: 10, fontWeight: 600, padding: '2px 7px', borderRadius: 4, background: r.kind === 'Transfer' ? 'rgba(217,119,6,0.10)' : 'rgba(37,99,235,0.10)', color: r.kind === 'Transfer' ? '#d97706' : '#2563eb', textTransform: 'uppercase', letterSpacing: '0.04em' }}>{r.kind}</span></div>
            <div style={{ fontSize: 13, color: '#0f172a' }}>{r.desc}</div>
            <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 12, color: '#475569' }}>{r.qty}</div>
            <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 11, color: '#475569' }}>{r.wbs}</div>
            <div style={{ fontSize: 12, color: '#475569' }}>{r.source}<div style={{ fontSize: 10, color: '#94a3b8' }}>{r.mode}</div></div>
            <div style={{ fontSize: 12, color: '#475569', fontFamily: 'JetBrains Mono,monospace' }}>{r.eta}</div>
            <div style={{ fontSize: 12, color: '#475569' }}>{r.destination}</div>
            <div>
              {arrived ? <button onClick={e=>{e.stopPropagation(); onReceipt && onReceipt(r);}} style={{ background: '#16a34a', border: 'none', color: '#fff', fontSize: 11, fontWeight: 600, padding: '4px 10px', borderRadius: 4, cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif' }}>Receipt →</button>
                : <span style={{ fontSize: 10, fontWeight: 500, padding: '3px 8px', borderRadius: 4, background: meta.bg, color: meta.color, whiteSpace: 'nowrap' }}>{meta.label}</span>}
            </div>
          </div>;
        })}
      </div>
    </div>
  );
};

const MCReceiptingScreen = () => {
  const [mode, setMode] = React.useState('register'); // register | wizard
  const [activeReceipt, setActiveReceipt] = React.useState(null);
  if (mode === 'register') return <PendingReceiptsRegister onReceipt={(r)=>{setActiveReceipt(r); setMode('wizard');}} />;
  return <MCReceiptingWizard activeReceipt={activeReceipt} onBack={()=>{setMode('register'); setActiveReceipt(null);}} />;
};

const MCReceiptingWizard = ({ activeReceipt, onBack }) => {
  const [step, setStep] = React.useState(1); // 1=overview, 2=check, 3=location, 4=tccc, 5=complete
  const [showDocs, setShowDocs] = React.useState(false);
  const [discrepancy, setDiscrepancy] = React.useState(false);
  const [location, setLocation] = React.useState('');
  const [tccComplete, setTccComplete] = React.useState(false);

  const inputStyle = { background:'#f8fafc', border:'1px solid #c4cedf', borderRadius:6, padding:'8px 12px', fontSize:14, color:'#0f172a', fontFamily:'IBM Plex Sans,sans-serif', outline:'none', width:'100%', boxSizing:'border-box' };

  const steps = ['Review expected','Physical check','Assign location','TCCC sign-off','Complete'];

  const EXPECTED_ITEMS = [
    { pkg:'PKG-001', desc:'Pressure vessel V-101', qty:1, uom:'EA', dg:false, actual:1 },
    { pkg:'PKG-002', desc:'Pressure vessel V-102', qty:1, uom:'EA', dg:false, actual:1 },
    { pkg:'PKG-003', desc:'Accessories & gaskets pallet', qty:1, uom:'pallet', dg:false, actual:1 },
  ];

  return (
    <div>
      {showDocs && <DocBundlePanel scnRef="SCN-2024-0047" poRef="PO-2024-0112" onClose={()=>setShowDocs(false)} />}

      {/* Header */}
      <div style={{ display:'flex', alignItems:'baseline', justifyContent:'space-between', marginBottom:12 }}>
        <div>
          <h2 style={{ fontSize:20, fontWeight:600, color:'#0f172a', letterSpacing:'-0.02em', margin:0 }}>Receipting</h2>
          <p style={{ fontSize:13, color:'#94a3b8', margin:'3px 0 0' }}>SCN-2024-0047 · PO-2024-0112 · Emerson Process Mgmt</p>
        </div>
        <button onClick={()=>setShowDocs(true)} style={{ background:'#f4f7fb', border:'1px solid #c4cedf', borderRadius:6, padding:'6px 14px', fontSize:12, color:'#475569', cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>📎 Documents</button>
      </div>

      {/* Step indicator */}
      <div style={{ display:'flex', gap:0, marginBottom:20, background:'#fff', border:'1px solid #dde3ed', borderRadius:10, overflow:'hidden', padding:'12px 16px' }}>
        {steps.map((s,i) => (
          <React.Fragment key={s}>
            <div style={{ display:'flex', alignItems:'center', gap:6, cursor: i+1<=step?'pointer':'default' }} onClick={()=>i+1<=step&&setStep(i+1)}>
              <div style={{ width:24, height:24, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:700, flexShrink:0,
                background: i+1<step?'#16a34a':i+1===step?'#2563eb':'#e8ecf2',
                color: i+1<=step?'#fff':'#94a3b8' }}>{i+1<step?'✓':i+1}</div>
              <span style={{ fontSize:12, fontWeight:i+1===step?600:400, color:i+1===step?'#2563eb':i+1<step?'#16a34a':'#94a3b8', whiteSpace:'nowrap' }}>{s}</span>
            </div>
            {i<steps.length-1 && <div style={{ flex:1, height:2, background:i+1<step?'#16a34a':'#e8ecf2', margin:'11px 8px 0', minWidth:10 }}></div>}
          </React.Fragment>
        ))}
      </div>

      {/* Step 1: Review expected */}
      {step===1 && (
        <div style={{ maxWidth:700 }}>
          <div style={{ fontSize:13, color:'#475569', marginBottom:14, lineHeight:1.6 }}>Review the expected shipment contents. Confirm before beginning physical inspection.</div>
          <div style={{ background:'#fff', border:'1px solid #dde3ed', borderRadius:10, overflow:'hidden', marginBottom:14 }}>
            <div style={{ display:'grid', gridTemplateColumns:'80px 1fr 60px 60px 50px', gap:0, padding:'7px 14px', background:'#f4f7fb', borderBottom:'1px solid #dde3ed' }}>
              {['Package','Description','Exp. qty','UOM','DG'].map(h=><div key={h} style={{ fontSize:10, fontWeight:600, color:'#94a3b8', letterSpacing:'0.06em', textTransform:'uppercase' }}>{h}</div>)}
            </div>
            {EXPECTED_ITEMS.map((item,i)=>(
              <div key={item.pkg} style={{ display:'grid', gridTemplateColumns:'80px 1fr 60px 60px 50px', gap:0, padding:'9px 14px', borderBottom:i<EXPECTED_ITEMS.length-1?'1px solid #e8ecf2':'none', alignItems:'center' }}>
                <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:11, color:'#94a3b8' }}>{item.pkg}</div>
                <div style={{ fontSize:13, color:'#0f172a' }}>{item.desc}</div>
                <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:12, fontWeight:600, color:'#0f172a' }}>{item.qty}</div>
                <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:11, color:'#94a3b8' }}>{item.uom}</div>
                <div style={{ fontSize:12, color:item.dg?'#dc2626':'#94a3b8' }}>{item.dg?'⚠ DG':'—'}</div>
              </div>
            ))}
          </div>
          <div style={{ display:'flex', gap:8 }}>
            <div style={{ background:'rgba(37,99,235,0.06)', border:'1px solid rgba(37,99,235,0.2)', borderRadius:8, padding:'10px 14px', flex:1, fontSize:13, color:'#2563eb' }}>3 packages · 8.4 t total · ETD 28 Feb · ETA 14 Apr 2025</div>
            <button onClick={()=>setStep(2)} style={{ background:'#2563eb', border:'none', borderRadius:8, padding:'0 24px', fontSize:13, fontWeight:500, color:'#fff', cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>Begin inspection →</button>
          </div>
        </div>
      )}

      {/* Step 2: Physical check */}
      {step===2 && (
        <div style={{ maxWidth:700 }}>
          <div style={{ fontSize:13, color:'#475569', marginBottom:14 }}>Enter actual quantities received for each package. Flag any discrepancies.</div>
          <div style={{ background:'#fff', border:'1px solid #dde3ed', borderRadius:10, overflow:'hidden', marginBottom:14 }}>
            <div style={{ display:'grid', gridTemplateColumns:'80px 1fr 70px 70px 80px', gap:0, padding:'7px 14px', background:'#f4f7fb', borderBottom:'1px solid #dde3ed' }}>
              {['Package','Description','Expected','Actual','Match'].map(h=><div key={h} style={{ fontSize:10, fontWeight:600, color:'#94a3b8', letterSpacing:'0.06em', textTransform:'uppercase' }}>{h}</div>)}
            </div>
            {EXPECTED_ITEMS.map((item,i)=>(
              <div key={item.pkg} style={{ display:'grid', gridTemplateColumns:'80px 1fr 70px 70px 80px', gap:0, padding:'9px 14px', borderBottom:i<EXPECTED_ITEMS.length-1?'1px solid #e8ecf2':'none', alignItems:'center' }}>
                <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:11, color:'#94a3b8' }}>{item.pkg}</div>
                <div style={{ fontSize:13, color:'#0f172a' }}>{item.desc}</div>
                <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:12, color:'#475569', textAlign:'center' }}>{item.qty}</div>
                <div>
                  <input type="number" defaultValue={item.actual}
                    style={{ width:'100%', textAlign:'center', fontFamily:'JetBrains Mono,monospace', fontSize:13, fontWeight:600, border:'1px solid #c4cedf', borderRadius:5, padding:'4px 6px', outline:'none', background:'#fff' }} />
                </div>
                <div style={{ textAlign:'center' }}>
                  <span style={{ fontSize:14, color: item.actual===item.qty ? '#16a34a':'#ef4444' }}>{item.actual===item.qty?'✓':'✕'}</span>
                </div>
              </div>
            ))}
          </div>
          <div style={{ display:'flex', gap:8 }}>
            <button onClick={()=>{setDiscrepancy(false);setStep(3);}} style={{ flex:1, padding:'10px', borderRadius:8, border:'none', background:'#16a34a', fontSize:13, fontWeight:600, color:'#fff', cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>✓ All match — proceed</button>
            <button onClick={()=>{setDiscrepancy(true);setStep(3);}} style={{ flex:1, padding:'10px', borderRadius:8, border:'1px solid #ef4444', background:'rgba(239,68,68,0.06)', fontSize:13, fontWeight:600, color:'#ef4444', cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>⚠ Flag discrepancy</button>
          </div>
          {discrepancy && (
            <div style={{ marginTop:10, background:'rgba(239,68,68,0.06)', border:'1px solid rgba(239,68,68,0.2)', borderRadius:8, padding:'10px 14px', fontSize:13, color:'#dc2626' }}>
              OS&D report will be auto-raised. Document type, quantity, photos, and description required.
            </div>
          )}
        </div>
      )}

      {/* Step 3: Assign location */}
      {step===3 && (
        <div style={{ maxWidth:500 }}>
          <div style={{ fontSize:13, color:'#475569', marginBottom:14 }}>Assign a warehouse grid location for the received items.</div>
          <div style={{ background:'#fff', border:'1px solid #dde3ed', borderRadius:10, padding:'16px', marginBottom:14 }}>
            <label style={{ fontSize:12, fontWeight:600, color:'#475569', display:'block', marginBottom:8 }}>Grid location</label>
            <input style={{ ...inputStyle, fontFamily:'JetBrains Mono,monospace', fontSize:16, fontWeight:600 }} placeholder="e.g. WH-B · B-02-01" value={location} onChange={e=>setLocation(e.target.value)} />
            <div style={{ fontSize:11, color:'#94a3b8', marginTop:6 }}>Format: WH-[code] · [row]-[bay]-[level]</div>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:6, marginBottom:14 }}>
            {['WH-A · A-04-03','WH-B · B-02-03','WH-C · C-01-03'].map(loc=>(
              <button key={loc} onClick={()=>setLocation(loc)}
                style={{ padding:'8px 6px', borderRadius:6, border:location===loc?'1px solid #2563eb':'1px solid #dde3ed', background:location===loc?'rgba(37,99,235,0.08)':'#fff', fontSize:11, fontFamily:'JetBrains Mono,monospace', color:location===loc?'#2563eb':'#475569', cursor:'pointer' }}>{loc}</button>
            ))}
          </div>
          <button onClick={()=>setStep(4)} disabled={!location} style={{ width:'100%', padding:'10px', borderRadius:8, border:'none', background:location?'#2563eb':'#c4cedf', fontSize:13, fontWeight:500, color:'#fff', cursor:location?'pointer':'default', fontFamily:'IBM Plex Sans,sans-serif' }}>
            Next — TCCC sign-off →
          </button>
        </div>
      )}

      {/* Step 4: TCCC */}
      {step===4 && (
        <div style={{ maxWidth:500 }}>
          <div style={{ fontSize:13, color:'#475569', marginBottom:14 }}>Both the Materials Controller and the carrier must sign off to close the SCN.</div>
          <ProofOfCustodyScreen scnRef="SCN-2024-0047" mode="tccc" onComplete={()=>{setTccComplete(true);setStep(5);}} />
        </div>
      )}

      {/* Step 5: Complete */}
      {step===5 && (
        <div style={{ maxWidth:500, textAlign:'center', padding:'40px 20px' }}>
          <div style={{ fontSize:56, marginBottom:16 }}>✓</div>
          <h2 style={{ fontSize:20, fontWeight:600, color:'#16a34a', marginBottom:8 }}>SCN closed</h2>
          <div style={{ fontSize:14, color:'#475569', lineHeight:1.6, marginBottom:24 }}>
            SCN-2024-0047 has been closed. 3 packages receipted at {location}. TCCC signed off. Stock register updated.
          </div>
          <div style={{ display:'flex', gap:8, justifyContent:'center' }}>
            <button style={{ background:'#f4f7fb', border:'1px solid #c4cedf', borderRadius:6, padding:'8px 20px', fontSize:13, color:'#475569', cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>View stock entry</button>

};

  const LogSortHdr = ({ label, field, align }) => <SortableHeader label={label} field={field} sortField={logSortField} sortDir={logSortDir} toggleSort={logToggleSort} align={align} />;

  const [forecastDays, setForecastDays] = React.useState(14);

  // Parse "DD Mon YYYY" or "DD Mon" dates to a JS Date (assume 2025 if no year)
  const parseDate = (str) => {
    if (!str || str === 'TBD' || str === '—' || str === 'N/A') return null;
    const months = { Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11 };
    const parts = str.trim().split(' ');
    if (parts.length >= 2) {
      const day = parseInt(parts[0]);
      const mon = months[parts[1]];
      const yr = parts[2] ? parseInt(parts[2]) : 2025;
      if (!isNaN(day) && mon !== undefined) return new Date(yr, mon, day);
    }
    return null;
  };

  const today = new Date(2025, 3, 29); // Mock today = 29 Apr 2025
  const inWindow = (dateStr) => {
    const d = parseDate(dateStr);
    if (!d) return false;
    const diffDays = Math.round((d - today) / 86400000);
    return diffDays >= 0 && diffDays <= forecastDays;

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 110px 1fr', gap: 12 }}>
              <div><Lbl req>Category</Lbl><select style={inputStyle} value={form.category} onChange={(e) => set('category', e.target.value)}>{UOM_CATEGORIES.map((c) => <option key={c}>{c}</option>)}</select></div>
              <div><Lbl>Decimals</Lbl><input type="number" min="0" max="6" style={{ ...inputStyle, fontFamily: 'JetBrains Mono,monospace' }} value={form.decimals} onChange={(e) => set('decimals', parseInt(e.target.value) || 0)} /></div>
              <div><Lbl>Status</Lbl><select style={inputStyle} value={form.status} onChange={(e) => set('status', e.target.value)}><option value="active">Active</option><option value="inactive">Inactive</option></select></div>
            </div>
          </div>
          <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8, padding: '14px 22px', borderTop: '1px solid #e8ecf2', background: '#f8fafc' }}>
            <button onClick={onClose} style={{ background: 'none', border: '1px solid #c4cedf', color: '#475569', fontSize: 12, padding: '6px 14px', borderRadius: 6, cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif' }}>Cancel</button>
            <button onClick={onClose} style={{ background: '#2563eb', border: 'none', color: '#fff', fontSize: 12, fontWeight: 500, padding: '6px 16px', borderRadius: 6, cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif' }}>Save</button>
          </div>
        </div>
      </div>);

  };

  // ── Project modal ──
  const ProjModal = ({ proj, onClose }) => {
    const [form, setForm] = React.useState(proj || { code: '', name: '', client: '', phase: 'Phase 1', startDate: '', endDate: '', pm: '', currency: 'USD', threshold: '500000', status: 'active', description: '' });
    const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));
    const Lbl = ({ children, req }) => <label style={{ ...labelStyle, marginBottom: 4 }}>{children}{req && <span style={{ color: '#ef4444', marginLeft: 2 }}>*</span>}</label>;
    const valid = form.code && form.name && form.client && form.pm;
    return (
      <div style={{ position: 'fixed', inset: 0, background: 'rgba(15,23,42,0.5)', zIndex: 200, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }} onClick={(e) => e.target === e.currentTarget && onClose()}>
        <div style={{ background: '#fff', borderRadius: 10, width: 720, maxWidth: '100%', maxHeight: '92vh', display: 'flex', flexDirection: 'column', boxShadow: '0 12px 40px rgba(15,23,42,0.25)' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 22px', borderBottom: '1px solid #e8ecf2' }}>
            <div>
              <div style={{ fontSize: 15, fontWeight: 600, color: '#0f172a' }}>{proj ? 'Edit project' : 'Add project'}</div>
              <div style={{ fontSize: 11, color: '#94a3b8', marginTop: 2 }}>Identity, client, schedule, governance & approval thresholds</div>
            </div>
            <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 18, color: '#94a3b8', cursor: 'pointer' }}>×</button>
          </div>
          <div style={{ padding: '18px 22px', overflowY: 'auto', flex: 1 }}>
            <div style={{ fontSize: 10, fontWeight: 600, color: '#94a3b8', letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 8 }}>Identity</div>
            <div style={{ display: 'grid', gridTemplateColumns: '160px 2fr 110px', gap: 12, marginBottom: 16 }}>
              <div><Lbl req>Project code</Lbl><input style={{ ...inputStyle, fontFamily: 'JetBrains Mono,monospace' }} value={form.code} onChange={(e) => set('code', e.target.value.toUpperCase())} placeholder="PRJ-2025-001" /></div>
              <div><Lbl req>Project name</Lbl><input style={inputStyle} value={form.name} onChange={(e) => set('name', e.target.value)} placeholder="Pilbara Gas Processing Plant" /></div>
              <div><Lbl>Status</Lbl><select style={inputStyle} value={form.status} onChange={(e) => set('status', e.target.value)}><option value="active">Active</option><option value="planning">Planning</option><option value="onhold">On hold</option><option value="closed">Closed</option></select></div>
              <div style={{ gridColumn: 'span 3' }}><Lbl>Description</Lbl><textarea style={{ ...inputStyle, minHeight: 50, resize: 'vertical' }} value={form.description} onChange={(e) => set('description', e.target.value)} placeholder="Project scope, location, key facts…" /></div>
            </div>

            <div style={{ fontSize: 10, fontWeight: 600, color: '#94a3b8', letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 8 }}>Client & phase</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1.6fr 1fr 1fr', gap: 12, marginBottom: 16 }}>
              <div><Lbl req>Client</Lbl><input style={inputStyle} value={form.client} onChange={(e) => set('client', e.target.value)} placeholder="e.g. NW Resources Pty Ltd" /></div>
              <div><Lbl>Phase</Lbl><select style={inputStyle} value={form.phase} onChange={(e) => set('phase', e.target.value)}>{['Pre-FEED', 'FEED', 'Phase 1', 'Phase 2', 'Phase 3', 'Execution', 'Commissioning', 'Handover'].map(p => <option key={p}>{p}</option>)}</select></div>
              <div><Lbl req>Project Manager</Lbl><select style={inputStyle} value={form.pm} onChange={(e) => set('pm', e.target.value)}><option value="">Select PM…</option><option>J. Hartley</option><option>S. Patel</option><option>R. Chen</option><option>P. Nguyen</option><option>K. Morrison</option></select></div>
            </div>

            <div style={{ fontSize: 10, fontWeight: 600, color: '#94a3b8', letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 8 }}>Schedule</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 16 }}>
              <div><Lbl>Planned start</Lbl><input type="date" style={inputStyle} value={form.startDate} onChange={(e) => set('startDate', e.target.value)} /></div>
              <div><Lbl>Planned end</Lbl><input type="date" style={inputStyle} value={form.endDate} onChange={(e) => set('endDate', e.target.value)} /></div>
            </div>

            <div style={{ fontSize: 10, fontWeight: 600, color: '#94a3b8', letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 8 }}>Commercial & governance</div>
            <div style={{ display: 'grid', gridTemplateColumns: '100px 1fr 1fr', gap: 12 }}>
              <div><Lbl>Currency</Lbl><select style={inputStyle} value={form.currency} onChange={(e) => set('currency', e.target.value)}>{['USD', 'AUD', 'EUR', 'GBP', 'SGD', 'JPY'].map(c => <option key={c}>{c}</option>)}</select></div>
              <div><Lbl>PO approval threshold ({form.currency})</Lbl><input type="number" style={{ ...inputStyle, fontFamily: 'JetBrains Mono,monospace' }} value={form.threshold} onChange={(e) => set('threshold', e.target.value)} placeholder="500000" /></div>
              <div><Lbl>Default approval chain</Lbl><input style={inputStyle} value={form.chain || ''} onChange={(e) => set('chain', e.target.value)} placeholder="Procurement Officer → PM → Client" /></div>
            </div>
          </div>
          <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8, padding: '14px 22px', borderTop: '1px solid #e8ecf2', background: '#f8fafd' }}>
            <button onClick={onClose} style={{ background: 'none', border: '1px solid #c4cedf', color: '#475569', fontSize: 12, padding: '6px 14px', borderRadius: 6, cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif' }}>Cancel</button>
            <button onClick={() => { if (window.__qmatToast) window.__qmatToast(`Project ${form.code} ${proj ? 'updated' : 'added'}`, 'success'); onClose(); }} disabled={!valid} style={{ background: valid ? '#16a34a' : '#c4cedf', border: 'none', color: '#fff', fontSize: 12, fontWeight: 600, padding: '6px 16px', borderRadius: 6, cursor: valid ? 'pointer' : 'not-allowed', fontFamily: 'IBM Plex Sans,sans-serif' }}>{proj ? '✓ Save changes' : '✓ Add project'}</button>
          </div>
        </div>
      </div>);
  };

  // ── Supplier modal ──
  const SupModal = ({ sup, onClose }) => {
    const [form, setForm] = React.useState(sup ? { ...sup, pickupLocations: sup.pickupLocations || [{ id: 1, label: 'Head office', address: '', city: '', state: '', country: 'Australia', contactName: sup.contact?.split('@')[0]?.replace('.', ' ') || '', contactEmail: sup.contact || '', contactPhone: sup.phone || '', hours: '', notes: '', primary: true }] } : { code: '', name: '', avl: 'Approved', categories: '', contact: '', phone: '', pickupLocations: [{ id: 1, label: 'Head office', address: '', city: '', state: '', country: 'Australia', contactName: '', contactEmail: '', contactPhone: '', hours: '', notes: '', primary: true }] });
    const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));
    const updateLoc = (id, k, v) => setForm((f) => ({ ...f, pickupLocations: f.pickupLocations.map((l) => l.id === id ? { ...l, [k]: v } : l) }));
    const addLoc = () => setForm((f) => ({ ...f, pickupLocations: [...f.pickupLocations, { id: Date.now(), label: `Pickup location ${f.pickupLocations.length + 1}`, address: '', city: '', state: '', country: 'Australia', contactName: '', contactEmail: '', contactPhone: '', hours: '', notes: '', primary: false }] }));
    const removeLoc = (id) => setForm((f) => {
      if (f.pickupLocations.length === 1) return f;
      const remaining = f.pickupLocations.filter((l) => l.id !== id);
      if (!remaining.some((l) => l.primary)) remaining[0].primary = true;
      return { ...f, pickupLocations: remaining };
    });
    const setPrimary = (id) => setForm((f) => ({ ...f, pickupLocations: f.pickupLocations.map((l) => ({ ...l, primary: l.id === id })) }));
    return (
      <div style={{ position: 'fixed', inset: 0, background: 'rgba(15,23,42,0.4)', zIndex: 200, display: 'flex', alignItems: 'center', justifyContent: 'center', backdropFilter: 'blur(4px)' }} onClick={(e) => e.target === e.currentTarget && onClose()}>
        <div style={{ background: '#fff', borderRadius: 12, boxShadow: '0 20px 60px rgba(0,0,0,0.15)', width: 760, maxWidth:'100%', maxHeight:'92vh', display:'flex', flexDirection:'column', overflow: 'hidden' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 20px', borderBottom: '1px solid #e8ecf2' }}>
            <div style={{ fontSize: 15, fontWeight: 600, color: '#0f172a' }}>{sup ? 'Edit supplier' : 'Add supplier'}</div>
            <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 18, color: '#94a3b8', cursor: 'pointer' }}>✕</button>
          </div>
          <div style={{ padding: '20px', overflowY:'auto', flex:1 }}>
            <div style={{ fontSize:10, fontWeight:600, color:'#94a3b8', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:8 }}>Company</div>
            <div style={{ display:'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom:18 }}>
              <div><label style={labelStyle}>Supplier code</label><input style={{...inputStyle, fontFamily:'JetBrains Mono,monospace'}} value={form.code} onChange={(e) => set('code', e.target.value.toUpperCase())} placeholder="SUP-007" /></div>
              <div><label style={labelStyle}>AVL status</label>
                <select style={inputStyle} value={form.avl} onChange={(e) => set('avl', e.target.value)}>
                  <option>Approved</option><option>Conditional</option><option>Rejected</option><option>Pending</option>
                </select>
              </div>
              <div style={{ gridColumn: '1/-1' }}><label style={labelStyle}>Company name</label><input style={inputStyle} value={form.name} onChange={(e) => set('name', e.target.value)} placeholder="Company Pty Ltd" /></div>
              <div style={{ gridColumn: '1/-1' }}><label style={labelStyle}>Categories (comma separated)</label><input style={inputStyle} value={form.categories} onChange={(e) => set('categories', e.target.value)} placeholder="Pumps, Valves" /></div>
              <div><label style={labelStyle}>Primary contact email</label><input style={inputStyle} value={form.contact} onChange={(e) => set('contact', e.target.value)} placeholder="contact@supplier.com" /></div>
              <div><label style={labelStyle}>Primary phone</label><input style={inputStyle} value={form.phone} onChange={(e) => set('phone', e.target.value)} placeholder="+61 2 0000 0000" /></div>
            </div>

            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
              <div>
                <div style={{ fontSize:10, fontWeight:600, color:'#94a3b8', letterSpacing:'0.06em', textTransform:'uppercase' }}>Pickup locations / warehouses</div>
                <div style={{ fontSize:11, color:'#64748b', marginTop:2 }}>Add every warehouse, factory or yard the freight forwarder can collect from. One must be marked primary.</div>
              </div>
              <button onClick={addLoc} style={{ background: 'rgba(37,99,235,0.08)', border: '1px solid rgba(37,99,235,0.3)', color: '#2563eb', borderRadius: 5, padding: '4px 10px', fontSize: 12, fontWeight: 500, cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif' }}>+ Add pickup location</button>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {form.pickupLocations.map((loc, idx) => (
                <div key={loc.id} style={{ border: loc.primary ? '1px solid rgba(37,99,235,0.4)' : '1px solid #dde3ed', borderRadius: 8, background: loc.primary ? 'rgba(37,99,235,0.03)' : '#fafbfc', padding: '12px 14px' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
                    <div style={{ width: 22, height: 22, borderRadius: '50%', background: loc.primary ? '#2563eb' : '#c4cedf', color: '#fff', fontSize: 11, fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>{idx + 1}</div>
                    <input value={loc.label} onChange={(e) => updateLoc(loc.id, 'label', e.target.value)} placeholder="Location label (e.g. Houston factory)" style={{ flex: 1, padding: '5px 8px', fontSize: 13, fontWeight: 600, color: '#0f172a', border: '1px solid transparent', background: 'transparent', borderRadius: 4, outline: 'none', fontFamily: 'IBM Plex Sans,sans-serif' }} onFocus={(e) => { e.target.style.background = '#fff'; e.target.style.borderColor = '#c4cedf'; }} onBlur={(e) => { e.target.style.background = 'transparent'; e.target.style.borderColor = 'transparent'; }} />
                    {loc.primary ? <span style={{ fontSize: 10, fontWeight: 600, color: '#2563eb', background: 'rgba(37,99,235,0.1)', padding: '2px 8px', borderRadius: 10, letterSpacing: '0.04em', textTransform: 'uppercase' }}>Primary</span> : <button onClick={() => setPrimary(loc.id)} style={{ fontSize: 11, color: '#64748b', background: 'transparent', border: '1px solid #c4cedf', borderRadius: 10, padding: '2px 8px', cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif' }}>Set primary</button>}
                    {form.pickupLocations.length > 1 && <button onClick={() => removeLoc(loc.id)} title="Remove location" style={{ width: 22, height: 22, border: '1px solid #fecaca', borderRadius: 5, background: '#fef2f2', color: '#dc2626', fontSize: 13, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>×</button>}
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1.6fr 1fr 1fr 0.8fr', gap: 8, marginBottom: 8 }}>
                    <div><label style={{...labelStyle, marginBottom:4}}>Street address</label><input style={inputStyle} value={loc.address} onChange={(e) => updateLoc(loc.id, 'address', e.target.value)} placeholder="Lot / street" /></div>
                    <div><label style={{...labelStyle, marginBottom:4}}>City</label><input style={inputStyle} value={loc.city} onChange={(e) => updateLoc(loc.id, 'city', e.target.value)} /></div>
                    <div><label style={{...labelStyle, marginBottom:4}}>State / region</label><input style={inputStyle} value={loc.state} onChange={(e) => updateLoc(loc.id, 'state', e.target.value)} /></div>
                    <div><label style={{...labelStyle, marginBottom:4}}>Country</label><select style={inputStyle} value={loc.country} onChange={(e) => updateLoc(loc.id, 'country', e.target.value)}><option>Australia</option><option>Singapore</option><option>Japan</option><option>South Korea</option><option>China</option><option>Germany</option><option>Italy</option><option>France</option><option>UK</option><option>USA</option><option>UAE</option><option>India</option><option>Mexico</option><option>Switzerland</option><option>Finland</option><option>Other</option></select></div>
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.2fr 1fr 1.2fr', gap: 8 }}>
                    <div><label style={{...labelStyle, marginBottom:4}}>Site contact</label><input style={inputStyle} value={loc.contactName} onChange={(e) => updateLoc(loc.id, 'contactName', e.target.value)} placeholder="Shipping coord." /></div>
                    <div><label style={{...labelStyle, marginBottom:4}}>Contact email</label><input style={inputStyle} value={loc.contactEmail} onChange={(e) => updateLoc(loc.id, 'contactEmail', e.target.value)} placeholder="shipping@..." /></div>
                    <div><label style={{...labelStyle, marginBottom:4}}>Phone</label><input style={inputStyle} value={loc.contactPhone} onChange={(e) => updateLoc(loc.id, 'contactPhone', e.target.value)} placeholder="+..." /></div>
                    <div><label style={{...labelStyle, marginBottom:4}}>Pickup hours</label><input style={inputStyle} value={loc.hours} onChange={(e) => updateLoc(loc.id, 'hours', e.target.value)} placeholder="Mon–Fri 08:00–16:00" /></div>
                  </div>
                  <div style={{ marginTop: 8 }}><label style={{...labelStyle, marginBottom:4}}>Notes <span style={{ color: '#94a3b8', fontWeight: 400 }}>· access, dock numbers, DG handling…</span></label><input style={inputStyle} value={loc.notes} onChange={(e) => updateLoc(loc.id, 'notes', e.target.value)} placeholder="e.g. Use Dock 3, photo ID required" /></div>
                </div>
              ))}
              <div style={{ fontSize: 11, color: '#94a3b8', marginTop: 2 }}>{form.pickupLocations.length} pickup location{form.pickupLocations.length === 1 ? '' : 's'} on file. Forwarders will be able to choose any of these when issuing an SCN.</div>
            </div>
          </div>
          <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8, padding: '12px 20px', borderTop: '1px solid #e8ecf2', background: '#f8fafc' }}>
            <button onClick={onClose} style={{ padding: '7px 16px', borderRadius: 6, border: '1px solid #c4cedf', background: '#fff', fontSize: 13, color: '#475569', cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif' }}>Cancel</button>
            <button onClick={onClose} style={{ padding: '7px 16px', borderRadius: 6, border: 'none', background: '#16a34a', fontSize: 13, fontWeight: 500, color: '#fff', cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif' }}>{sup ? '✓ Save changes' : '✓ Add supplier'}</button>
          </div>
        </div>
      </div>);

  };

  return (
    <div>
      {showUserModal && <UserModal user={editUser} onClose={() => {setShowUserModal(false);setEditUser(null);}} />}
      {showWHModal && <WHModal wh={editWH} onClose={() => {setShowWHModal(false);setEditWH(null);}} />}
      {showUOMModal && <UOMModal uom={editUOM} onClose={() => {setShowUOMModal(false);setEditUOM(null);}} />}
      {showSupModal && <SupModal sup={editSup} onClose={() => {setShowSupModal(false);setEditSup(null);}} />}
      {showProjModal && <ProjModal onClose={() => setShowProjModal(false)} />}

      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 14 }}>
        <div>
          <h2 style={{ fontSize: 20, fontWeight: 600, color: '#0f172a', letterSpacing: '-0.02em', margin: 0 }}>Admin</h2>
          <p style={{ fontSize: 13, color: '#94a3b8', margin: '3px 0 0' }}>System administration — accessible by System Admin and authorised roles</p>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: 'flex', borderBottom: '1px solid #dde3ed', background: '#fff', border: '1px solid #dde3ed', borderBottom: '1px solid #dde3ed', borderRadius: '8px 8px 0 0', marginBottom: 0 }}>
        <AdminTab id="users" label="Users & Roles" count={MOCK_USERS.length} />
        <AdminTab id="suppliers" label="Suppliers" count={MOCK_SUPPLIERS_ADMIN.length} />
        <AdminTab id="warehouses" label="Warehouses" count={MOCK_WAREHOUSES.length} />
        <AdminTab id="uoms" label="Units of Measure" count={MOCK_UOMS.length} />
        <AdminTab id="acronyms" label="Acronyms" count={Object.keys(window.__qmatAbbr || {}).length} />
        <AdminTab id="projects" label="Projects" />
      </div>

      {/* Search + action bar */}
      <div style={{ display: 'flex', gap: 8, padding: '8px 12px', background: '#f4f7fb', border: '1px solid #dde3ed', borderTop: 'none', alignItems: 'center' }}>
        <input value={search} onChange={(e) => setSearch(e.target.value)}
        placeholder={tab === 'users' ? 'Search name, email, role…' : tab === 'suppliers' ? 'Search code, name, category…' : 'Search code, name, location…'}
        style={{ flex: 1, background: '#fff', border: '1px solid #c4cedf', borderRadius: 6, padding: '5px 10px', fontSize: 12, color: '#0f172a', outline: 'none', fontFamily: 'IBM Plex Sans,sans-serif', height: 30 }} />
        <button
          onClick={() => {if (tab === 'users') {setEditUser(null);setShowUserModal(true);} else if (tab === 'warehouses') {setEditWH(null);setShowWHModal(true);} else if (tab === 'uoms') {setEditUOM(null);setShowUOMModal(true);} else if (tab === 'suppliers') {setEditSup(null);setShowSupModal(true);} else if (tab === 'projects') {setShowProjModal(true);}}}
          style={{ background: '#2563eb', border: 'none', borderRadius: 6, padding: '5px 16px', fontSize: 12, fontWeight: 500, color: '#fff', cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif', height: 30, whiteSpace: 'nowrap' }}>
          + {tab === 'users' ? 'Add user' : tab === 'warehouses' ? 'Add warehouse' : tab === 'uoms' ? 'Add UoM' : tab === 'suppliers' ? 'Add supplier' : 'Add project'}
        </button>
      </div>

      {/* ── Users tab ── */}
      {tab === 'users' && (() => {
        const rows = MOCK_USERS.filter((u) => !search || u.name.toLowerCase().includes(search.toLowerCase()) || u.email.toLowerCase().includes(search.toLowerCase()) || u.role.toLowerCase().includes(search.toLowerCase()));
        return (
          <div style={{ background: '#fff', border: '1px solid #dde3ed', borderTop: 'none', borderRadius: '0 0 10px 10px', overflow: 'hidden' }}>
            <div style={{ display: 'grid', gridTemplateColumns: '160px 200px 1fr 120px auto 120px 80px', gap: 8, padding: '6px 14px', background: '#f4f7fb', borderBottom: '1px solid #dde3ed' }}>
              {['Name', 'Email', 'Role', 'Projects', 'Status', 'Last login', ''].map((h) =>
              <div key={h} style={{ fontSize: 10, fontWeight: 600, color: '#94a3b8', letterSpacing: '0.06em', textTransform: 'uppercase', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{h}</div>
              )}
            </div>
            {rows.map((u, i) =>
            <div data-tblrow="1" key={u.id} style={{ display: 'grid', gridTemplateColumns: '160px 200px 1fr 120px auto 120px 80px', gap: 8, padding: '9px 14px', borderBottom: i < rows.length - 1 ? '1px solid #e8ecf2' : 'none', alignItems: 'center', transition: 'background 120ms' }}
            onMouseEnter={(e) => e.currentTarget.style.background = '#f8fafc'} onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
                <div style={{ fontSize: 13, fontWeight: 500, color: '#0f172a' }}>{u.name}</div>
                <TruncatedCell text={u.email} style={{ fontSize: 12, color: '#475569' }} />
                <div style={{ fontSize: 12, color: '#475569' }}>{u.role}</div>
                <div style={{ fontSize: 11, color: '#94a3b8' }}>{u.projects.length > 0 ? `${u.projects.length} project${u.projects.length > 1 ? 's' : ''}` : '—'}</div>
                <div>

const PODetailProcurement = ({ po, onBack, onApprove, onUpdate }) => {
  const fmtVal = (v, ccy) => `${ccy} ${v.toLocaleString()}`;
  const isLocked = po.approved;
  const [editing, setEditing] = React.useState(false);
  const [draft, setDraft] = React.useState(po);
  React.useEffect(() => { setDraft(po); }, [po.id]);

  const startEdit = () => { setDraft(po); setEditing(true); };
  const cancelEdit = () => { setDraft(po); setEditing(false); };
  const saveEdit = () => {
    // recompute totals from line items
    const lines = draft.lines.map((l) => ({ ...l, totalValue: Number(l.uomQty || 0) * Number(l.unitValue || 0) }));
    const value = lines.reduce((s, l) => s + l.totalValue, 0);
    const updated = { ...draft, lines, value };
    onUpdate?.(updated);
    setEditing(false);
  };

  const setHdr = (k, v) => setDraft((d) => ({ ...d, [k]: v }));
  const setLine = (i, k, v) => setDraft((d) => ({ ...d, lines: d.lines.map((l, idx) => idx === i ? { ...l, [k]: k === 'uomQty' || k === 'unitValue' ? Number(v) || 0 : v } : l) }));
  const addLine = () => setDraft((d) => ({ ...d, lines: [...d.lines, { no: String(d.lines.length + 1).padStart(3, '0'), desc: '', uomQty: 0, uom: 'EA', unitValue: 0, wbs: d.lines[0]?.wbs || '', ros: d.ros, totalValue: 0, cdd: '' }] }));
  const delLine = (i) => setDraft((d) => ({ ...d, lines: d.lines.filter((_, idx) => idx !== i) }));

  const view = editing ? draft : po;
  const liveTotal = editing ? draft.lines.reduce((s, l) => s + Number(l.uomQty || 0) * Number(l.unitValue || 0), 0) : po.value;

  // shared input style
  const inpStyle = { width: '100%', padding: '5px 8px', fontSize: 13, border: '1px solid #c4cedf', borderRadius: 4, background: '#fff', fontFamily: 'IBM Plex Sans,sans-serif', color: '#0f172a', outline: 'none', boxSizing: 'border-box' };

          <React.Fragment>
            <h2 style={{ fontSize: 20, fontWeight: 600, color: '#0f172a', letterSpacing: '-0.02em', margin: '0 0 4px' }}>{po.poName}</h2>
            <div style={{ fontSize: 13, color: '#475569', maxWidth: 560, lineHeight: 1.5 }}>{po.desc}</div>
