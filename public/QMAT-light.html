    notes: ''
  });
  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));
  const valid = form.type && form.linkId;

  const DOC_TYPE_GROUPS = [
    { group:'Shipping / Logistics', items:['Packing list','Commercial invoice','Bill of Lading / Air Waybill','Certificate of Origin','Inspection release note','Forwarder release','Customs entry','Insurance certificate'] },
    { group:'Certificates',         items:['Mill Test Cert (EN10204 3.1)','Mill Test Cert (EN10204 2.2)','Heat number cert','Batch / lot cert','PWHT chart','Hydrostatic test cert','Certificate of Conformity','Calibration cert'] },
    { group:'Engineering / Drawings', items:['Fabrication drawing','GA drawing','Detail drawing','Datasheet','Calculation pack','WPS / NDT plan','FAT report','SAT report','O&M manual'] },
    { group:'Dangerous Goods',      items:['⚠ MSDS / SDS','⚠ DG Declaration (IMO/IATA)','⚠ DG manifest'] },
    { group:'Procurement / Commercial', items:['Signed PO','PO acknowledgement','Quote','Variation request','Liquidated damages notice'] },
    { group:'Receipt / Issue',      items:['Receipt proof of delivery','Goods receipt note','Signed FMR docket','Transfer docket','Stock-take variance form'] },
    { group:'Other',                items:['Photo / image evidence','MoM / minutes','Email correspondence','Other'] }
  ];

  const LINK_TYPES = [
    { id:'po',       label:'Purchase Order',     placeholder:'e.g. PO-2024-0112' },
    { id:'po-line',  label:'PO + Line item',     placeholder:'e.g. PO-2024-0112 · Line 001' },
    { id:'scn',      label:'SCN (Shipment)',     placeholder:'e.g. SCN-2024-0047' },
    { id:'fmr',      label:'FMR (Field Material Request)', placeholder:'e.g. FMR-2025-0038' },
    { id:'mto',      label:'MTO Register',       placeholder:'e.g. MTO-2025-Civ · Rev C' },
    { id:'mto-line', label:'MTO line item',      placeholder:'e.g. MTO-2025-Civ · Line 0006' },
    { id:'wbs',      label:'WBS node',           placeholder:'e.g. 02.01.01' },
    { id:'item',     label:'Commodity / Equipment code', placeholder:'e.g. V-101 or CS-001' },
    { id:'project',  label:'Project (no specific record)', placeholder:'Pilbara Gas Processing Plant' }
  ];

  const isCert = form.type && /cert|MTC|PWHT|Hydro|CoC|CoA/i.test(form.type);
  const isShipping = form.type && /packing|commercial invoice|bill of lading|origin|forwarder|customs|inspection/i.test(form.type);
  const isDG = form.type && /^⚠/.test(form.type);
  const SUGGESTED_TAGS_BY_TYPE = { cert:['MTC','EN10204 3.1','Heat','Verified'], shipping:['SCN','Shipping','Customs'], dg:['DG','IMO','SDS','Hazmat'] };
  const suggestedTags = isDG ? SUGGESTED_TAGS_BY_TYPE.dg : isCert ? SUGGESTED_TAGS_BY_TYPE.cert : isShipping ? SUGGESTED_TAGS_BY_TYPE.shipping : [];
  const linkSpec = LINK_TYPES.find((l) => l.id === form.linkType);

  const toggleTag = (t) => set('tags', form.tags.includes(t) ? form.tags.filter((x) => x !== t) : [...form.tags, t]);

  const Lbl = ({ children, req }) => <label style={{ fontSize:11, fontWeight:500, color:'#475569', marginBottom:4, display:'block' }}>{children}{req && <span style={{ color:'#dc2626', marginLeft:2 }}>*</span>}</label>;
  const inp = { width:'100%', padding:'7px 10px', fontSize:13, border:'1px solid #c4cedf', borderRadius:5, background:'#fff', fontFamily:'IBM Plex Sans,sans-serif', color:'#0f172a', outline:'none', boxSizing:'border-box' };

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(15,23,42,0.5)', zIndex:9999, display:'flex', alignItems:'center', justifyContent:'center', padding:20 }} onClick={onClose}>
      <div onClick={(e)=>e.stopPropagation()} style={{ background:'#fff', borderRadius:12, width:820, maxWidth:'100%', maxHeight:'92vh', display:'flex', flexDirection:'column', boxShadow:'0 20px 60px rgba(0,0,0,0.25)' }}>
        <div style={{ padding:'16px 22px', borderBottom:'1px solid #e8ecf2', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div>
            <h3 style={{ margin:0, fontSize:16, fontWeight:600, color:'#0f172a' }}>📥 Classify uploaded document</h3>
            <p style={{ margin:'3px 0 0', fontSize:12, color:'#94a3b8' }}>{file ? `${file.name} · ${file.size}` : 'Tag and link the file so it appears in the right module'}</p>
          </div>
          <button onClick={onClose} style={{ background:'transparent', border:'none', fontSize:20, color:'#94a3b8', cursor:'pointer' }}>×</button>
        </div>

        <div style={{ padding:22, overflowY:'auto', flex:1 }}>
          <div style={{ fontSize:11, fontWeight:600, color:'#94a3b8', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:8 }}>1. Document type</div>
          <select style={inp} value={form.type} onChange={(e)=>set('type', e.target.value)}>
            <option value="">— Select type —</option>
            {DOC_TYPE_GROUPS.map((g) => (<optgroup key={g.group} label={g.group}>{g.items.map((t) => <option key={t}>{t}</option>)}</optgroup>))}
          </select>
          {isDG && <div style={{ marginTop:6, padding:'6px 10px', background:'rgba(220,38,38,0.05)', border:'1px solid rgba(220,38,38,0.2)', borderRadius:4, fontSize:11, color:'#7f1d1d' }}>⚠ Dangerous Goods document — will inherit DG flag and tag automatically.</div>}

          <div style={{ fontSize:11, fontWeight:600, color:'#94a3b8', letterSpacing:'0.06em', textTransform:'uppercase', marginTop:18, marginBottom:8 }}>2. Link to record</div>
          <div style={{ display:'grid', gridTemplateColumns:'200px 1fr', gap:10 }}>
            <select style={inp} value={form.linkType} onChange={(e)=>set('linkType', e.target.value)}>{LINK_TYPES.map((l) => <option key={l.id} value={l.id}>{l.label}</option>)}</select>
            <div style={{ position:'relative' }}>
              <input style={inp} value={form.linkId} onChange={(e)=>set('linkId', e.target.value)} placeholder={linkSpec?.placeholder} />
              <div style={{ position:'absolute', right:8, top:8, fontSize:10, color:'#94a3b8', pointerEvents:'none' }}>🔍 type to search</div>
            </div>
          </div>
          {form.linkType === 'po' && (
            <div style={{ marginTop:8, display:'flex', flexWrap:'wrap', gap:4 }}>
              <span style={{ fontSize:10, color:'#94a3b8', marginRight:4, alignSelf:'center' }}>Suggested:</span>
              {['PO-2024-0112','PO-2024-0098','PO-2024-0134','PO-2024-0087'].map((p) => (
                <button key={p} onClick={()=>set('linkId', p)} style={{ background: form.linkId===p?'rgba(37,99,235,0.10)':'#fff', border:'1px solid #c4cedf', color: form.linkId===p?'#2563eb':'#475569', fontSize:11, padding:'3px 9px', borderRadius:4, cursor:'pointer', fontFamily:'JetBrains Mono,monospace' }}>{p}</button>
              ))}
            </div>
          )}
          {form.linkType === 'scn' && (
            <div style={{ marginTop:8, display:'flex', flexWrap:'wrap', gap:4 }}>
              <span style={{ fontSize:10, color:'#94a3b8', marginRight:4, alignSelf:'center' }}>Suggested:</span>
              {['SCN-2024-0047','SCN-2024-0051','SCN-2024-0061'].map((s) => (
                <button key={s} onClick={()=>set('linkId', s)} style={{ background: form.linkId===s?'rgba(37,99,235,0.10)':'#fff', border:'1px solid #c4cedf', color: form.linkId===s?'#2563eb':'#475569', fontSize:11, padding:'3px 9px', borderRadius:4, cursor:'pointer', fontFamily:'JetBrains Mono,monospace' }}>{s}</button>
              ))}
            </div>
          )}

          {isCert && (
            <>
              <div style={{ fontSize:11, fontWeight:600, color:'#94a3b8', letterSpacing:'0.06em', textTransform:'uppercase', marginTop:18, marginBottom:8 }}>3. Certificate scope</div>
              <div style={{ display:'grid', gridTemplateColumns:'180px 1fr', gap:10 }}>
                <div><Lbl>Heat / batch ref</Lbl><input style={{ ...inp, fontFamily:'JetBrains Mono,monospace' }} value={form.heatRef} onChange={(e)=>set('heatRef', e.target.value.toUpperCase())} placeholder="A24-887" /></div>
                <div><Lbl>Applies to (qty / scope)</Lbl><input style={inp} value={form.appliesTo} onChange={(e)=>set('appliesTo', e.target.value)} placeholder="e.g. 1240 m of 4800 m, Drums 1–3, Shell plate only" /></div>
              </div>
            </>
          )}

          <div style={{ fontSize:11, fontWeight:600, color:'#94a3b8', letterSpacing:'0.06em', textTransform:'uppercase', marginTop:18, marginBottom:8 }}>{isCert ? '4' : '3'}. Tags (optional)</div>
          {suggestedTags.length > 0 && (
            <div style={{ marginBottom:8 }}>
              <span style={{ fontSize:10, color:'#94a3b8', marginRight:6 }}>Suggested:</span>
              {suggestedTags.map((t) => (
                <button key={t} onClick={()=>toggleTag(t)} style={{ background: form.tags.includes(t)?'rgba(13,148,136,0.10)':'#fff', border:'1px solid #c4cedf', color: form.tags.includes(t)?'#0d9488':'#475569', fontSize:11, padding:'3px 10px', borderRadius:9999, marginRight:4, cursor:'pointer', fontWeight: form.tags.includes(t)?600:400, fontFamily:'IBM Plex Sans,sans-serif' }}>{form.tags.includes(t)?'✓ ':''}{t}</button>
              ))}
            </div>
          )}
          <input style={inp} placeholder="Type and press Enter to add custom tags…" onKeyDown={(e)=>{ if (e.key === 'Enter' && e.target.value.trim()) { toggleTag(e.target.value.trim()); e.target.value = ''; } }} />
          {form.tags.length > 0 && (
            <div style={{ marginTop:6, display:'flex', flexWrap:'wrap', gap:4 }}>
              {form.tags.map((t) => (
                <span key={t} style={{ fontSize:11, color:'#0d9488', background:'rgba(13,148,136,0.08)', padding:'3px 10px', borderRadius:9999, display:'flex', alignItems:'center', gap:6 }}>{t}<button onClick={()=>toggleTag(t)} style={{ background:'transparent', border:'none', color:'#0d9488', cursor:'pointer', fontSize:13, padding:0 }}>×</button></span>
              ))}
            </div>
          )}

          <div style={{ fontSize:11, fontWeight:600, color:'#94a3b8', letterSpacing:'0.06em', textTransform:'uppercase', marginTop:18, marginBottom:8 }}>{isCert ? '5' : '4'}. Notes (optional)</div>
          <textarea style={{ ...inp, minHeight:60, resize:'vertical' }} value={form.notes} onChange={(e)=>set('notes', e.target.value)} placeholder="Spec references, sign-off context, related items…" />
        </div>

        <div style={{ padding:'12px 22px', borderTop:'1px solid #e8ecf2', background:'#f8fafd', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <span style={{ fontSize:11, color:'#94a3b8' }}>{valid ? <span style={{ color:'#16a34a' }}>✓ Ready · will be filed under {form.linkType.toUpperCase()} {form.linkId}</span> : 'Required: type and link'}</span>
          <div style={{ display:'flex', gap:8 }}>
            <button onClick={onClose} style={{ background:'transparent', border:'1px solid #c4cedf', color:'#475569', padding:'7px 14px', fontSize:12, borderRadius:5, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>Skip — file later</button>
            <button onClick={()=>{ onConfirm(form); if (window.__qmatToast) window.__qmatToast(`Document filed under ${form.linkType.toUpperCase()} ${form.linkId} · ${form.type}`, 'success'); onClose(); }} disabled={!valid} style={{ background: valid?'#16a34a':'#c4cedf', border:'none', color:'#fff', padding:'7px 18px', fontSize:12, fontWeight:600, borderRadius:5, cursor: valid?'pointer':'not-allowed', fontFamily:'IBM Plex Sans,sans-serif' }}>✓ File document</button>
          </div>
        </div>
      </div>
    </div>);
};

const DocInboxScreen = () => {
  const [search, setSearch] = React.useState('');
  const [modFilter, setModFilter] = React.useState('All');
  const [classifyQueue, setClassifyQueue] = React.useState([]);
  const popNext = () => setClassifyQueue((q) => q.slice(1));
  const [statusFilter, setStatusFilter] = React.useState('all');
  const [dateRange, setDateRange] = React.useState('30');
  const [groupBy, setGroupBy] = React.useState('none');
  const [mineOnly, setMineOnly] = React.useState(false);
  const [uploadOpen, setUploadOpen] = React.useState(false);

  const statusMeta = {
    verified:       { label:'Verified',     color:'#0d9488', bg:'rgba(13,148,136,0.10)' },
    available:      { label:'Available',    color:'#16a34a', bg:'rgba(22,163,74,0.10)'  },
    'under-review': { label:'Under review', color:'#2563eb', bg:'rgba(37,99,235,0.10)'  },
    missing:        { label:'Missing',      color:'#dc2626', bg:'rgba(220,38,38,0.10)'  },
    rejected:       { label:'Rejected',     color:'#dc2626', bg:'rgba(220,38,38,0.10)'  }
  };

  const filtered = MOCK_DOC_INBOX.filter((d) => {
    if (modFilter !== 'All' && d.module !== modFilter) return false;
    if (statusFilter !== 'all' && d.status !== statusFilter) return false;
    if (mineOnly && !/QMAT/i.test(d.uploadedBy)) return false;
    if (search) {
      const q = search.toLowerCase();
      return d.file.toLowerCase().includes(q) || d.type.toLowerCase().includes(q) || d.source.toLowerCase().includes(q) || d.uploadedBy.toLowerCase().includes(q) || d.tags.some((t) => t.toLowerCase().includes(q));
    }
    return true;
  });

  const grouped = (() => {
    if (groupBy === 'none') return { 'All documents': filtered };
    const map = {};
    filtered.forEach((d) => {
      const k = groupBy === 'module' ? d.module : groupBy === 'source' ? d.source : groupBy === 'type' ? d.type : groupBy === 'uploadedBy' ? d.uploadedBy : 'All';
      if (!map[k]) map[k] = [];
      map[k].push(d);
    });
    return map;
  })();

  const counts = {
    total: MOCK_DOC_INBOX.length,
    missing: MOCK_DOC_INBOX.filter((d) => d.status === 'missing').length,
    review: MOCK_DOC_INBOX.filter((d) => d.status === 'under-review').length,
    verified: MOCK_DOC_INBOX.filter((d) => d.status === 'verified').length,
    last7: 9
  };

  const Pill = ({ status }) => { const m = statusMeta[status] || statusMeta.available; return <span style={{ fontSize:10, fontWeight:600, color:m.color, background:m.bg, padding:'2px 8px', borderRadius:9999, whiteSpace:'nowrap' }}>{m.label}</span>; };
  const Chip = ({ children, active, onClick, color }) => (
    <button onClick={onClick} style={{ padding:'4px 10px', fontSize:11, borderRadius:6, height:28, border: active ? `1px solid ${color || '#2563eb'}` : '1px solid #c4cedf', background: active ? `${color || '#2563eb'}18` : '#fff', color: active ? (color || '#2563eb') : '#475569', fontWeight: active ? 600 : 400, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif', whiteSpace:'nowrap' }}>{children}</button>
  );

  return (
    <div>
      {classifyQueue.length > 0 && <DocClassifyModal file={classifyQueue[0]} onClose={popNext} onConfirm={popNext} />}
      {/* Header */}
      <div style={{ display:'flex', alignItems:'baseline', justifyContent:'space-between', marginBottom:8 }}>
        <h2 style={{ fontSize:20, fontWeight:600, color:'#0f172a', letterSpacing:'-0.02em', margin:0 }}>📥 Document Inbox</h2>
        <div style={{ display:'flex', gap:8 }}>
          <button onClick={()=>{ if(window.__qmatToast) window.__qmatToast('Document register exported · QMAT-Documents.xlsx', 'success'); }} style={{ background:'#fff', border:'1px solid #c4cedf', padding:'7px 14px', fontSize:12, color:'#475569', borderRadius:6, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>↓ Export register</button>
          <button onClick={()=>setUploadOpen(true)} style={{ background:'#2563eb', border:'none', padding:'7px 16px', fontSize:12, fontWeight:600, color:'#fff', borderRadius:6, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>↑ Upload document</button>
        </div>
      </div>
      <p style={{ fontSize:13, color:'#94a3b8', margin:'0 0 14px' }}>Every document across the project · single point of search · click any row to jump to its source record.</p>

      {/* KPI strip */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:10, marginBottom:14 }}>
        {[
          { l:'Total documents',           v:counts.total,    c:'#0f172a' },
          { l:'Uploaded last 7 days',      v:counts.last7,    c:'#2563eb' },
          { l:'Under review',              v:counts.review,   c:'#2563eb' },
          { l:'Verified',                  v:counts.verified, c:'#0d9488' },
          { l:'Missing — action required', v:counts.missing,  c:'#dc2626' }
        ].map((s) => (
          <div key={s.l} style={{ background:'#fff', border:'1px solid #dde3ed', borderRadius:8, padding:'10px 14px' }}>
            <div style={{ fontSize:22, fontWeight:700, fontFamily:'JetBrains Mono,monospace', color:s.c, lineHeight:1 }}>{s.v}</div>
            <div style={{ fontSize:11, color:'#94a3b8', marginTop:3 }}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* Upload drop zone — collapsible */}
      {uploadOpen && (
        <div style={{ marginBottom:14, padding:'22px', border:'2px dashed #2563eb', borderRadius:10, background:'rgba(37,99,235,0.04)', textAlign:'center' }} onClick={()=>window.__qmatPickFile && window.__qmatPickFile({multiple:true, onPicked:(files)=>{ const meta = files.map(f => ({ name: f.name, size: f.size > 1024*1024 ? (f.size/1024/1024).toFixed(1)+' MB' : (f.size/1024).toFixed(0)+' KB' })); setClassifyQueue(meta); setUploadOpen(false); }})}>
          <div style={{ fontSize:32 }}>☁⬆</div>
          <div style={{ fontSize:14, fontWeight:600, color:'#2563eb', marginTop:6 }}>Drop files here or click to browse</div>
          <div style={{ fontSize:11, color:'#475569', marginTop:4 }}>PDF, Excel, Word, DWG, images · multiple files supported · you'll choose where to file each one</div>
          <button onClick={(e)=>{ e.stopPropagation(); setUploadOpen(false); }} style={{ marginTop:12, background:'#fff', border:'1px solid #c4cedf', color:'#475569', padding:'5px 14px', fontSize:11, borderRadius:5, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>Cancel</button>
        </div>
      )}

      {/* Filters */}
      <div style={{ display:'flex', flexWrap:'wrap', alignItems:'center', gap:8, marginBottom:8, padding:'10px 12px', background:'#f8fafd', border:'1px solid #e8ecf2', borderRadius:8 }}>
        <input value={search} onChange={(e)=>setSearch(e.target.value)} placeholder="🔍 Search filename, source, tag, type, uploader…" style={{ flex:'1 1 280px', padding:'6px 10px', fontSize:12, border:'1px solid #c4cedf', borderRadius:6, fontFamily:'IBM Plex Sans,sans-serif', outline:'none', height:30 }} />
        <select value={modFilter} onChange={(e)=>setModFilter(e.target.value)} style={{ padding:'5px 10px', fontSize:12, border:'1px solid #c4cedf', borderRadius:6, background:'#fff', height:30, fontFamily:'IBM Plex Sans,sans-serif', color:'#475569' }}>{DOC_MODULES.map((m) => <option key={m}>{m}</option>)}</select>
        <select value={statusFilter} onChange={(e)=>setStatusFilter(e.target.value)} style={{ padding:'5px 10px', fontSize:12, border:'1px solid #c4cedf', borderRadius:6, background:'#fff', height:30, fontFamily:'IBM Plex Sans,sans-serif', color:'#475569' }}>
          <option value="all">All statuses</option><option value="verified">Verified</option><option value="available">Available</option><option value="under-review">Under review</option><option value="missing">Missing</option>
        </select>
        <select value={dateRange} onChange={(e)=>setDateRange(e.target.value)} style={{ padding:'5px 10px', fontSize:12, border:'1px solid #c4cedf', borderRadius:6, background:'#fff', height:30, fontFamily:'IBM Plex Sans,sans-serif', color:'#475569' }}>
          <option value="7">Last 7 days</option><option value="30">Last 30 days</option><option value="90">Last 90 days</option><option value="all">All time</option>
        </select>
        <Chip active={mineOnly} onClick={()=>setMineOnly((v)=>!v)} color="#7c3aed">👤 My uploads only</Chip>
        <span style={{ marginLeft:8, fontSize:11, color:'#94a3b8' }}>Group by</span>
        {[{ id:'none', l:'None' }, { id:'module', l:'Module' }, { id:'source', l:'Source' }, { id:'type', l:'Type' }, { id:'uploadedBy', l:'Uploader' }].map((g) => <Chip key={g.id} active={groupBy === g.id} onClick={()=>setGroupBy(g.id)}>{g.l}</Chip>)}
        <span style={{ marginLeft:'auto', fontSize:11, color:'#94a3b8' }}>{filtered.length} of {MOCK_DOC_INBOX.length} documents</span>
      </div>

      {/* Document list */}
      {Object.keys(grouped).map((gk) => (
        <div key={gk} style={{ marginBottom:12 }}>
          {groupBy !== 'none' && (
            <div style={{ padding:'6px 14px', background:'#f0f3f9', borderRadius:'6px 6px 0 0', border:'1px solid #dde3ed', borderBottom:'none', display:'flex', alignItems:'baseline', gap:10 }}>
              <span style={{ fontSize:12, fontWeight:700, color:'#334155' }}>{gk}</span>
              <span style={{ fontSize:11, fontFamily:'JetBrains Mono,monospace', color:'#94a3b8' }}>{grouped[gk].length} doc{grouped[gk].length !== 1 ? 's' : ''}</span>
            </div>
          )}
          <div style={{ background:'#fff', border:'1px solid #dde3ed', borderTop: groupBy === 'none' ? '1px solid #dde3ed' : 'none', borderRadius: groupBy === 'none' ? 8 : '0 0 8px 8px', overflow:'hidden' }}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 140px 120px 140px 130px 100px 96px', gap:10, padding:'8px 14px', background:'#f4f7fb', borderBottom:'1px solid #dde3ed', fontSize:10, fontWeight:600, color:'#94a3b8', letterSpacing:'0.06em', textTransform:'uppercase' }}>
              <div>File / Type</div><div>Module</div><div>Source</div><div>Uploaded by</div><div>Date</div><div>Status</div><div></div>
            </div>
            {grouped[gk].map((d, i, arr) => {
              const isDG = /^⚠/.test(d.type);
              const isMissing = d.status === 'missing';
              return (
                <div key={d.id} data-tblrow="1" style={{ display:'grid', gridTemplateColumns:'1fr 140px 120px 140px 130px 100px 96px', gap:10, padding:'10px 14px', borderBottom: i < arr.length - 1 ? '1px solid #f0f3f9' : 'none', alignItems:'center', background: isMissing ? 'rgba(220,38,38,0.04)' : isDG ? 'rgba(220,38,38,0.02)' : 'transparent', cursor:'pointer' }} onMouseEnter={(e)=>e.currentTarget.style.background = isMissing ? 'rgba(220,38,38,0.08)' : '#f8fafc'} onMouseLeave={(e)=>e.currentTarget.style.background = isMissing ? 'rgba(220,38,38,0.04)' : isDG ? 'rgba(220,38,38,0.02)' : 'transparent'}>
                  <div>
                    <div style={{ fontSize:13, fontWeight:500, color: isDG ? '#dc2626' : '#0f172a' }}>{d.type}</div>
                    <div style={{ fontSize:11, fontFamily:'JetBrains Mono,monospace', color:'#94a3b8', marginTop:1 }}>{d.file} <span style={{ marginLeft:6, color:'#c4cedf' }}>· {d.size}</span></div>
                    {d.tags && <div style={{ marginTop:4, display:'flex', gap:4 }}>{d.tags.map((t) => <span key={t} style={{ fontSize:9, fontWeight:600, color:'#475569', background:'#f0f3f9', padding:'1px 6px', borderRadius:9999 }}>{t}</span>)}</div>}
                  </div>
                  <div style={{ fontSize:11, fontWeight:500, color:'#475569' }}>{d.module}</div>
                  <div style={{ fontSize:11, color:'#2563eb', fontFamily:'JetBrains Mono,monospace' }}>{d.source}</div>
                  <div style={{ fontSize:11, color:'#475569' }}>{d.uploadedBy}</div>
                  <div style={{ fontSize:11, color:'#94a3b8', fontFamily:'JetBrains Mono,monospace' }}>{d.uploadedAt}</div>
                  <div data-pill="1" style={{ overflow:'visible', minWidth:0 }}><Pill status={d.status} /></div>
                  <div style={{ display:'flex', gap:3, justifyContent:'flex-end' }}>
                    {isMissing ? (
                      <button onClick={()=>{ if(window.__qmatToast) window.__qmatToast(`Upload prompted for ${d.type}`, 'info'); }} style={{ background:'#2563eb', border:'none', color:'#fff', fontSize:10, fontWeight:600, padding:'3px 8px', borderRadius:4, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>↑ Upload</button>
                    ) : (
                      <>
                        <button title="Preview" style={{ background:'#f4f7fb', border:'1px solid #c4cedf', color:'#475569', fontSize:11, padding:'3px 7px', borderRadius:4, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>👁</button>
                        <button title="Download" style={{ background:'#f4f7fb', border:'1px solid #c4cedf', color:'#475569', fontSize:11, padding:'3px 7px', borderRadius:4, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>↓</button>
                        <button title="Open source record" style={{ background:'#f4f7fb', border:'1px solid #c4cedf', color:'#2563eb', fontSize:11, padding:'3px 7px', borderRadius:4, cursor:'pointer', fontFamily:'IBM Plex Sans,sans-serif' }}>↗</button>
                      </>
                    )}
                  </div>
                </div>);
            })}
          </div>
        </div>
      ))}
    </div>);
};

const AuditScreen = () => {
  const [searchState, setSearchState] = React.useState('idle');
  const [searchQuery, setSearchQuery] = React.useState('');
  const [activeQuery, setActiveQuery] = React.useState('');
  const [modFilter, setModFilter] = React.useState('all');
  const RECENT = ['PO-2024-0112', 'WBS 02.01.01', 'V-101', 'SCN-2024-0047', 'PO-2024-0098'];

  const doSearch = () => {if (!searchQuery.trim()) return;setActiveQuery(searchQuery);setSearchState('results');};
  const filtered = MOCK_AUDIT_EVENTS.filter((e) => modFilter === 'all' || e.module === modFilter);

  if (searchState === 'idle') {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', minHeight: '60vh', padding: 40 }}>
        <h2 style={{ fontSize: 24, fontWeight: 600, color: '#0f172a', letterSpacing: '-0.02em', marginBottom: 6 }}>Audit Trail</h2>
        <p style={{ fontSize: 14, color: '#94a3b8', marginBottom: 32, textAlign: 'center', maxWidth: 480 }}>Search for any entity to view its full transaction history from creation to present.</p>
        <div style={{ display: 'flex', gap: 8, width: '100%', maxWidth: 560 }}>
          <input value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && doSearch()}
          placeholder="WBS code, PO number, item code, or equipment tag…"
          style={{ flex: 1, background: '#fff', border: '2px solid #c4cedf', borderRadius: 8, padding: '12px 16px', fontSize: 14, color: '#0f172a', outline: 'none', fontFamily: 'IBM Plex Sans,sans-serif', boxShadow: '0 2px 8px rgba(0,0,0,0.06)' }} autoFocus />
          <button onClick={doSearch} style={{ background: '#2563eb', border: 'none', borderRadius: 8, padding: '0 24px', fontSize: 14, fontWeight: 500, color: '#fff', cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif' }}>Search</button>
        </div>
        <div style={{ marginTop: 20, width: '100%', maxWidth: 560 }}>
          <div style={{ fontSize: 11, color: '#94a3b8', fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 6 }}>Recent searches</div>
          {RECENT.map((r) =>
          <div key={r} onClick={() => {setSearchQuery(r);setActiveQuery(r);setSearchState('results');}}
          style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '7px 12px', background: '#fff', border: '1px solid #e8ecf2', borderRadius: 6, cursor: 'pointer', fontSize: 13, color: '#475569', marginBottom: 4, transition: 'background 120ms' }}
          onMouseEnter={(e) => e.currentTarget.style.background = '#f4f7fb'} onMouseLeave={(e) => e.currentTarget.style.background = '#fff'}>
              <span style={{ fontFamily: 'JetBrains Mono,monospace' }}>{r}</span>
              <span style={{ fontSize: 11, color: '#c4cedf' }}>↵</span>
            </div>
          )}
        </div>
      </div>);

  }

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
        <button onClick={() => setSearchState('idle')} style={{ background: 'none', border: 'none', color: '#2563eb', fontSize: 13, cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif', padding: 0 }}>← New search</button>
        <div style={{ flex: 1, display: 'flex', gap: 8 }}>
          <input value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && doSearch()}
          style={{ flex: 1, background: '#fff', border: '1px solid #c4cedf', borderRadius: 6, padding: '6px 12px', fontSize: 13, color: '#0f172a', outline: 'none', fontFamily: 'JetBrains Mono,monospace' }} />
          <button onClick={doSearch} style={{ background: '#2563eb', border: 'none', borderRadius: 6, padding: '0 16px', fontSize: 13, fontWeight: 500, color: '#fff', cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif' }}>Search</button>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button style={{ background: '#f4f7fb', border: '1px solid #c4cedf', borderRadius: 6, padding: '6px 12px', fontSize: 12, color: '#475569', cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif' }}>↓ PDF</button>
          <button style={{ background: '#f4f7fb', border: '1px solid #c4cedf', borderRadius: 6, padding: '6px 12px', fontSize: 12, color: '#475569', cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif' }}>↓ Excel</button>
        </div>
      </div>

      <div style={{ fontSize: 13, color: '#475569', marginBottom: 12 }}>
        <strong style={{ color: '#0f172a' }}>{filtered.length} events</strong> · Entity: <span style={{ fontFamily: 'JetBrains Mono,monospace', color: '#2563eb' }}>{activeQuery}</span> · Project: Pilbara Gas Processing Plant
      </div>

      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 14 }}>
        {['all', 'foundational', 'mto', 'procurement', 'expediting', 'logistics', 'matcontrol', 'traceability', 'admin', 'system'].map((m) => {
          const meta = MOD_BADGE[m];
          const isActive = modFilter === m;
          return (
            <button key={m} onClick={() => setModFilter(m)}
            style={{ padding: '4px 12px', borderRadius: 9999, fontSize: 12, fontWeight: isActive ? 600 : 400, border: '1px solid ' + (isActive && meta ? meta.color : '#dde3ed'), background: isActive && meta ? meta.bg : '#fff', color: isActive && meta ? meta.color : '#475569', cursor: 'pointer', fontFamily: 'IBM Plex Sans,sans-serif' }}>
              {m === 'all' ? 'All modules' : meta?.label}
            </button>);

        })}
      </div>

      <div style={{ background: '#fff', border: '1px solid #dde3ed', borderRadius: 10, overflow: 'hidden' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '140px 110px 1fr 220px', gap: 12, padding: '6px 16px', background: '#f4f7fb', borderBottom: '1px solid #dde3ed' }}>
          {['Timestamp', 'Module', 'Event', 'Operator'].map((h) =>
          <div key={h} style={{ fontSize: 10, fontWeight: 600, color: '#94a3b8', letterSpacing: '0.06em', textTransform: 'uppercase', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{h}</div>
          )}
        </div>
        {filtered.map((ev, i) => {
          const mm = MOD_BADGE[ev.module] || MOD_BADGE.system;
          return (
            <div key={i} style={{ display: 'grid', gridTemplateColumns: '140px 110px 1fr 220px', gap: 12, padding: '12px 16px', borderBottom: i < filtered.length - 1 ? '1px solid #e8ecf2' : 'none', alignItems: 'start', background: ev.system ? '#fafafa' : '#fff' }}>
              <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 11, color: '#94a3b8', lineHeight: 1.5 }}>{ev.ts.split(' ')[0]}<br />{ev.ts.split(' ')[1]} UTC+8</div>
              <div><span style={{ display: 'inline-block', padding: '2px 8px', borderRadius: 4, fontSize: 11, fontWeight: 700, color: mm.color, background: mm.bg }}>{mm.label}</span></div>
              <div>
                <div style={{ fontSize: 13, fontWeight: 600, color: ev.system ? '#475569' : '#0f172a', marginBottom: 2 }}>{ev.title}</div>
                <div style={{ fontSize: 12, color: '#94a3b8', lineHeight: 1.5 }}>{ev.detail}</div>
                {ev.proof && <div style={{ fontSize: 11, color: '#2563eb', marginTop: 4, cursor: 'pointer' }}>↓ Download proof PDF</div>}
              </div>
              <div style={{ fontSize: 12 }}>
                {ev.system ?
                <div><div style={{ fontWeight: 600, color: '#94a3b8' }}>QMAT System</div><span style={{ fontSize: 10, background: '#f0f3f9', color: '#94a3b8', padding: '1px 6px', borderRadius: 3, fontWeight: 600 }}>Automated</span></div> :

                <>
                    <div style={{ fontWeight: 600, color: '#0f172a' }}>{ev.operator}</div>
                    <div style={{ color: '#94a3b8', fontSize: 11, marginTop: 1 }}>{ev.email}</div>
                    <div style={{ color: '#94a3b8', fontSize: 11, fontStyle: 'italic', marginTop: 1 }}>{ev.role}</div>
                    <div style={{ color: '#94a3b8', fontSize: 11 }}>{ev.org}</div>
                    <div style={{ color: '#c4cedf', fontSize: 10, fontFamily: 'JetBrains Mono,monospace', marginTop: 2 }}>{ev.ip}</div>
                  </>
                }
              </div>
            </div>);

        })}
      </div>
    </div>);

};

const PlaceholderScreen = ({ title }) =>
<div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', flexDirection: 'column', gap: 12 }}>
    <div style={{ fontSize: 40, opacity: 0.15 }}>⊠</div>
    <div style={{ fontSize: 16, fontWeight: 600, color: '#8899aa' }}>{title}</div>
    <div style={{ fontSize: 13, color: '#8899aa' }}>This module is not yet prototyped</div>
  </div>;


// ── Main App ───────────────────────────────────────────────────
const App = () => {
  const [screen, _setScreenRaw] = React.useState(SCREENS.DASHBOARD);
  const [history, setHistory] = React.useState([]);
  const setScreen = React.useCallback((s) => {
    _setScreenRaw((prev) => { if (prev !== s) setHistory((h) => [...h.slice(-19), prev]); return s; });
  }, []);
  const goBack = () => {
    setHistory((h) => {
      if (h.length === 0) return h;
      const prev = h[h.length - 1];
      _setScreenRaw(prev);
      return h.slice(0, -1);
    });
  };
  const canGoBack = history.length > 0;
  const [selectedProject, setSelectedProject] = React.useState(null);
  const [selectedWBS, setSelectedWBS] = React.useState(null);
  const [selectedPO, setSelectedPO] = React.useState(null);
  const [selectedMTO, setSelectedMTO] = React.useState(null);
  const [sidebarOpen, setSidebarOpen] = React.useState(true);

  const navigate = (s) => {
    if (s === 'mto' && selectedProject) {setScreen(SCREENS.MTO_LIST);return;}
    if (s === 'found-wbs' && selectedProject) {setScreen(SCREENS.FOUND_WBS);return;}
    if (s === 'found-commodity' && selectedProject) {setScreen(SCREENS.FOUND_COMMODITY);return;}
    if (s === 'found-equipment' && selectedProject) {setScreen(SCREENS.FOUND_EQUIPMENT);return;}
    if (s === 'found-avl') {setScreen(SCREENS.ADMIN);return;}
    if (s === 'mc-receipting' && selectedProject) {setScreen(SCREENS.MC_RECEIPTING);return;}
    if (s === 'mc-warehouse' && selectedProject) {setScreen(SCREENS.MC_WAREHOUSE);return;}
    if (s === 'mc-fmr' && selectedProject) {setScreen(SCREENS.MC_FMR);return;}
    if (s === 'mc-transfers' && selectedProject) {setScreen(SCREENS.MC_TRANSFERS);return;}
    if (s === 'logistics' && selectedProject) {setScreen(SCREENS.LOGISTICS);return;}
    if (s === 'procurement' && selectedProject) {setScreen(SCREENS.PROCUREMENT);return;}
    if (s === 'vdrl' && selectedProject) {setScreen(SCREENS.VDRL);return;}
    if (s === 'traceability' && selectedProject) {setScreen(SCREENS.TRACEABILITY);return;}
    if (s === 'doc-inbox') {setScreen(SCREENS.DOC_INBOX);return;}
    if (s === 'audit') {setScreen(SCREENS.AUDIT);return;}
    if (s === 'admin') {setScreen(SCREENS.ADMIN);return;}
    setScreen(s);
  };

  const selectProject = (p) => {
    setSelectedProject(p);
    setSelectedWBS(null);
    setSelectedPO(null);
    setScreen(SCREENS.PROJECT);
  };

  // Breadcrumb items
  const breadcrumbItems = () => {
    const items = [{ label: 'Dashboard', onClick: () => {setScreen(SCREENS.DASHBOARD);setSelectedProject(null);} }];
    if (selectedProject) items.push({ label: selectedProject.name, onClick: () => {setScreen(SCREENS.PROJECT);setSelectedWBS(null);setSelectedPO(null);} });
    if ([SCREENS.WBS_DRILL, SCREENS.PO].includes(screen) && selectedWBS) items.push({ label: `${selectedWBS.code} ${selectedWBS.label}`, onClick: () => {setScreen(SCREENS.WBS_DRILL);setSelectedPO(null);} });
    if (screen === SCREENS.PO && selectedPO) items.push({ label: selectedPO.ref });
    if (screen === SCREENS.EXPEDITING) items.push({ label: 'Expediting' });
    if (screen === SCREENS.VDRL) items.push({ label: 'Expediting', onClick: () => setScreen(SCREENS.EXPEDITING) }, { label: 'VDRL' });
    if (screen === SCREENS.MTO_LIST) items.push({ label: 'MTO Register' });
    if (screen === SCREENS.MTO_DETAIL && selectedMTO) {items.push({ label: 'MTO Register', onClick: () => setScreen(SCREENS.MTO_LIST) });items.push({ label: selectedMTO.ref });}
    if (screen === SCREENS.FOUND_WBS) items.push({ label: 'Foundational' }, { label: 'WBS' });
    if (screen === SCREENS.FOUND_COMMODITY) items.push({ label: 'Foundational' }, { label: 'Commodity Library' });
    if (screen === SCREENS.FOUND_EQUIPMENT) items.push({ label: 'Foundational' }, { label: 'Equipment List' });
    if (screen === SCREENS.FOUND_AVL) items.push({ label: 'Foundational' }, { label: 'Suppliers (AVL)' });
    if (screen === SCREENS.MC_RECEIPTING) items.push({ label: 'Material Control' }, { label: 'Receipting' });
    if (screen === SCREENS.MC_WAREHOUSE) items.push({ label: 'Material Control' }, { label: 'Stock Register' });
    if (screen === SCREENS.MC_FMR) items.push({ label: 'Material Control' }, { label: 'FMR Register' });
    if (screen === SCREENS.MC_TRANSFERS) items.push({ label: 'Material Control' }, { label: 'Transfers' });
    if (screen === SCREENS.DOC_INBOX) items.push({ label: 'Document Inbox' });
    if (screen === SCREENS.AUDIT) items.push({ label: 'Audit' });
    if (screen === SCREENS.TRACEABILITY) items.push({ label: 'Traceability' });
    if (screen === SCREENS.LOGISTICS) items.push({ label: 'Logistics' });
    if (screen === SCREENS.PROCUREMENT) items.push({ label: 'Procurement' });
    if (screen === SCREENS.ADMIN) items.push({ label: 'Admin' });
    return items;
  };

  // Main content per screen
  const renderContent = () => {
    switch (screen) {
      case SCREENS.DASHBOARD:return <DashboardHome onSelectProject={selectProject} />;
      case SCREENS.PROJECT:return <ProjectView project={selectedProject} onSelectWBS={(w) => {setSelectedWBS(w);setSelectedPO(null);setScreen(SCREENS.WBS_DRILL);}} />;
      case SCREENS.WBS_DRILL:return <POListView wbsNode={selectedWBS} onSelectPO={(po) => {setSelectedPO(po);setScreen(SCREENS.PO);}} />;
      case SCREENS.PO:return <PODetailView po={selectedPO} />;
      case SCREENS.EXPEDITING:return <ExpeditingScreen />;
      case SCREENS.VDRL:return <VDRLScreen />;
      case SCREENS.PROCUREMENT:return <ProcurementScreen />;
      case SCREENS.LOGISTICS:return <LogisticsScreen />;
      case SCREENS.MTO_LIST:return <MTOListScreen onSelectMTO={(m) => {setSelectedMTO(m);setScreen(SCREENS.MTO_DETAIL);}} />;
      case SCREENS.MTO_DETAIL:return <MTODetailScreen mto={selectedMTO} onBack={() => setScreen(SCREENS.MTO_LIST)} />;
      case SCREENS.FOUND_WBS:return <FoundWBSScreen />;
      case SCREENS.FOUND_COMMODITY:return <FoundCommodityScreen />;
      case SCREENS.FOUND_EQUIPMENT:return <FoundEquipmentScreen />;
      case SCREENS.FOUND_AVL:return <FoundAVLScreen />;
      case SCREENS.MC_RECEIPTING:return <MCReceiptingScreen />;
      case SCREENS.MC_WAREHOUSE:return <MCWarehouseScreen />;
      case SCREENS.MC_FMR:return <MCFMRScreen />;
      case SCREENS.MC_TRANSFERS:return <MCTransferScreen />;
      case SCREENS.AUDIT:return <AuditScreen />;
      case SCREENS.DOC_INBOX:return <DocInboxScreen />;
      case SCREENS.TRACEABILITY:return <TraceabilityScreen />;
      case SCREENS.ADMIN:return <AdminScreen />;
      default:return <PlaceholderScreen title={screen.split('-').map((w) => w.charAt(0).toUpperCase() + w.slice(1)).join(' ')} />;
    }
  };

  const projectName = selectedProject ? selectedProject.name : null;
  const alertCount = 8;
  const mtoScreens = [SCREENS.MTO_LIST, SCREENS.MTO_DETAIL];
  const foundScreens = [SCREENS.FOUND_WBS, SCREENS.FOUND_COMMODITY, SCREENS.FOUND_EQUIPMENT];
  const mcScreens = [SCREENS.MC_RECEIPTING, SCREENS.MC_WAREHOUSE, SCREENS.MC_FMR, SCREENS.MC_TRANSFERS];
  const activeNav = mtoScreens.includes(screen) ? 'mto' :
  foundScreens.includes(screen) ? 'found-wbs' :
  mcScreens.includes(screen) ? 'mc-receipting' :
  screen === SCREENS.LOGISTICS ? 'logistics' :
  screen === SCREENS.PROCUREMENT ? 'procurement' :
  screen === SCREENS.ADMIN ? 'admin' :
  screen;

  return (
    <div style={{ display: 'flex', height: '100vh', width: '100vw', overflow: 'hidden' }}>
      {/* Sidebar — slides in/out */}
      <div style={{ width: sidebarOpen ? 224 : 0, flexShrink: 0, overflow: 'hidden', transition: 'width 200ms ease' }}>
        <Nav activeScreen={activeNav} projectName={projectName} onNavigate={navigate} alertCount={alertCount} />
      </div>

      {/* Main column — always fills remaining width */}
      <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', overflow: 'hidden', background: '#f1f4f8' }}>
        {/* Top bar */}
        <div style={{ height: 46, background: '#fff', borderBottom: '1px solid #dde3ed', display: 'flex', alignItems: 'center', padding: '0 12px 0 16px', gap: 10, flexShrink: 0 }}>
          <button onClick={() => setSidebarOpen((o) => !o)}
          title={sidebarOpen ? 'Collapse sidebar' : 'Expand sidebar'}
          style={{ width: 28, height: 28, border: '1px solid #dde3ed', borderRadius: 6, background: '#f4f7fb', color: '#64748b', fontSize: 13, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, transition: 'all 150ms', fontFamily: 'inherit' }}
          onMouseEnter={(e) => {e.currentTarget.style.background = '#e8ecf2';e.currentTarget.style.borderColor = '#c4cedf';}}
          onMouseLeave={(e) => {e.currentTarget.style.background = '#f4f7fb';e.currentTarget.style.borderColor = '#dde3ed';}}>
            {sidebarOpen ? '◂' : '▸'}
          </button>
          <button onClick={goBack} disabled={!canGoBack} title={canGoBack ? 'Go back to previous screen' : 'No previous screen'}
          style={{ height: 28, padding: '0 12px', border: '1px solid #dde3ed', borderRadius: 6, background: canGoBack ? '#fff' : '#f4f7fb', color: canGoBack ? '#475569' : '#c4cedf', fontSize: 12, fontWeight: 500, cursor: canGoBack ? 'pointer' : 'not-allowed', display: 'flex', alignItems: 'center', gap: 5, flexShrink: 0, transition: 'all 150ms', fontFamily: 'IBM Plex Sans,sans-serif' }}
          onMouseEnter={(e) => {if (canGoBack) {e.currentTarget.style.background = '#f4f7fb';e.currentTarget.style.borderColor = '#c4cedf';}}}
          onMouseLeave={(e) => {if (canGoBack) {e.currentTarget.style.background = '#fff';e.currentTarget.style.borderColor = '#dde3ed';}}}>
            ← Back
          </button>
          <div style={{ flex: 1, minWidth: 0, overflow: 'hidden' }}>
            <Breadcrumb items={breadcrumbItems()} />
          </div>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexShrink: 0 }}>
            <div style={{ fontSize: 11, fontFamily: 'JetBrains Mono,monospace', color: '#8899aa' }}>29 Apr 2026 · 09:41</div>
            <div style={{ background: 'rgba(220,38,38,0.10)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: 9999, padding: '3px 10px', fontSize: 11, fontWeight: 600, color: '#ef4444', display: 'flex', alignItems: 'center', gap: 5, cursor: 'pointer' }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#ef4444', display: 'inline-block' }}></span>
              8 critical
            </div>
          </div>
        </div>
        {/* Scrollable content area */}
        <div style={{ flex: 1, overflowY: 'auto', overflowX: 'auto', padding: 20, minWidth: 0 }}>
          {renderContent()}
        </div>
      </div>
    </div>);

};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
